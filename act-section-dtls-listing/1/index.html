e":"CHAPTER II OF TRANSFERS OF PROPERTY BY ACT OF PARTIES","bareAct":"Transfer contingent on happening of specified uncertain event.","meaning":"If property is transferred on the condition that a particular uncertain event must happen within a fixed period, the beneficiary acquires the property only if the event occurs within that period. If the event does not occur within the prescribed time, the interest fails.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 23 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     regulate contingent transfers where a time limit is prescribed. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     give effect to the transferor's intention. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide certainty regarding the duration of contingent interests. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     determine when a contingent interest comes to an end.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Marriage Within Five Years\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B if B marries within five years.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B marries after three years.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Valid. The interest becomes vested.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Marriage After Time\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B marries after seven years.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The interest fails.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Examination\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to C if C passes the judicial\nexamination within three years.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C passes within two years.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The interest becomes vested.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Event During Lifetime\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to D if D returns to India during E's\nlifetime.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">E dies before D returns.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The interest fails.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Event Never Happens\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B if B starts a hospital within ten\nyears.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Ten years expire without the hospital being established.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The interest fails.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"112","actId":"3","sectionNo":"24","chapterName":"CHAPTER II OF TRANSFERS OF PROPERTY BY ACT OF PARTIES","bareAct":"Transfer to such of certain persons as survive at some period not specified.","meaning":"If property is transferred on the condition that a particular uncertain event must not happen within a fixed period, the beneficiary gets the property if the event does not happen within that period, or if it becomes impossible for the event to happen before the period expires.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 24 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     regulate contingent interests based on the \u003Cb>non-occurrence\u003C\u002Fb> of an\n     uncertain event. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     determine when such interests become vested. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     give effect to the transferor's intention. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide certainty regarding contingent transfers.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Marriage Does Not Occur\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B if C does not marry within five\nyears.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C remains unmarried for five years.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B acquires the property.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Event Becomes Impossible\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B if C does not become a judge\nwithin ten years.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C dies after two years.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B's interest becomes vested immediately.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Event Occurs Within Time\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B if C does not marry within five\nyears.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C marries after two years.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B's interest fails.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Lifetime Condition\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B if C does not return to India\nduring D's lifetime.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">D dies before C returns.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B acquires the property.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Event Impossible Before Expiry\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B if C does not qualify as a pilot\nwithin eight years.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C permanently loses eligibility due to a disqualifying\ncircumstance during the third year.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B's interest becomes vested because the event\nhas become impossible.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"113","actId":"3","sectionNo":"25","chapterName":"CHAPTER II OF TRANSFERS OF PROPERTY BY ACT OF PARTIES","bareAct":"Conditional transfer.","meaning":"If a transfer of property is made subject to a condition that is impossible, illegal, fraudulent, immoral, injurious to others, or against public policy, the condition is void.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 25 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     prevent unlawful or impossible conditions in property transfers. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that transfers do not violate law or public policy. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect morality and public interest. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     invalidate transfers founded upon illegal or impossible conditions.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Impossible Act\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B if B walks to the moon.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Illegal Act\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property if B commits an offence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Fraud\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property if B forges a document.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Injury\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property if B burns C's factory.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Immoral Condition\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property if B maintains an immoral relationship.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"114","actId":"3","sectionNo":"26","chapterName":"CHAPTER II OF TRANSFERS OF PROPERTY BY ACT OF PARTIES","bareAct":"Fulfilment of condition precedent.","meaning":"\u003Cblockquote data-start=\"918\" data-end=\"1243\">\u003Cp data-start=\"920\" data-end=\"1243\" class=\"PDq2pG_selectionAnchorContainer\">\u003Cstrong data-start=\"920\" data-end=\"1243\">If a transfer requires a person to fulfil a condition before acquiring the property, the law does not insist on literal or perfect compliance. Substantial compliance is sufficient. Moreover, if someone fraudulently prevents the fulfilment of the condition, the law treats the condition as fulfilled against that person.\u003C\u002Fstrong>\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003C\u002Fblockquote>\n\u003Cp data-start=\"1245\" data-end=\"1289\">The section is based on the equitable maxim:\u003C\u002Fp>\n\u003Cblockquote data-start=\"1291\" data-end=\"1342\">\n\u003Cp data-start=\"1293\" data-end=\"1342\">\u003Cstrong data-start=\"1293\" data-end=\"1342\">\"No one can take advantage of his own wrong.\"\u003C\u002Fstrong>\u003C\u002Fp>\u003C\u002Fblockquote>","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 26 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     prevent injustice caused by rigid interpretation of conditions precedent. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     recognise substantial compliance with conditions. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent fraud by interested persons. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure fairness in the enforcement of conditional transfers.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Educational Qualification\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B if B passes the LL.B. examination.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B passes.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The condition is fulfilled.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Substantial Compliance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A requires B to complete a specified professional\nqualification.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B completes an equivalent qualification that satisfies the\nintended purpose.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The condition may be regarded as\nsubstantially complied with.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Fraud\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B if B marries C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">D fraudulently prevents the marriage.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The condition is deemed fulfilled as against\nD.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – No Time Specified\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B if B starts a charitable school.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">No period is mentioned.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B starts the school within a reasonable time.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The condition is fulfilled.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Unreasonable Delay\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A imposes a condition but B waits for an unreasonably long\nperiod without justification.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The condition may be treated as unfulfilled.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"115","actId":"3","sectionNo":"27","chapterName":"CHAPTER II OF TRANSFERS OF PROPERTY BY ACT OF PARTIES","bareAct":"Conditional transfer to one person coupled with transfer to another on failure of prior disposition.","meaning":"If property is first transferred to one person, and the same transfer provides that if the first transfer fails, the property should go to another person, then the second (ulterior) transfer will take effect whenever the first transfer fails—even if it fails for a reason different from what the transferor expected.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 27 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     give effect to an alternative gift made by the transferor. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid failure of the property disposition where the primary gift fails. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that property passes according to the transferor's secondary\n     intention. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     reduce uncertainty in conditional transfers.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Refusal by Beneficiary\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B does not take it, then to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B refuses the transfer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C acquires the property.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Invalid Prior Gift\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B's interest fails, then to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B's transfer is held invalid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C takes under the ulterior disposition.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Unexpected Failure\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A expects B's gift to fail because B may die.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Instead, B becomes legally disqualified from taking the\nproperty.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The ulterior disposition in favour of C still\ntakes effect.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Acceptance by B\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B's interest fails, then to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B validly accepts and retains the property.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C gets nothing because the prior disposition\nhas not failed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Disclaimer\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B fails to take the property, then to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B disclaims the gift.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C becomes entitled.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"116","actId":"3","sectionNo":"28","chapterName":"CHAPTER II OF TRANSFERS OF PROPERTY BY ACT OF PARTIES","bareAct":"Ulterior transfer conditional on happening or not happening of specified event.","meaning":"A transferor may give property to one person, but provide that if a specified uncertain event happens (or does not happen), the property shall shift to another person.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 28 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     recognize \u003Cb>conditional or shifting interests\u003C\u002Fb>. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     permit alternative transfers based on future contingencies. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that such transfers comply with the general rules of the Act. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent unlawful or invalid conditional transfers.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Insolvency\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B becomes insolvent, the property shall go to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B becomes insolvent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C acquires the property.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Marriage\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B marries X, the property shall pass to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B marries X.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C becomes entitled.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Failure to Marry\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B does not marry before 35 years, the property shall go\nto C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B remains unmarried till 35.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Property passes to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Impossible Condition\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B brings the moon to Earth, the property shall pass to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The condition is impossible.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The condition is void under Section 25.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Illegal Condition\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B commits theft, the property shall pass to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The condition is unlawful.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The condition is void under Section 25.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"117","actId":"3","sectionNo":"29","chapterName":"CHAPTER II OF TRANSFERS OF PROPERTY BY ACT OF PARTIES","bareAct":"Fulfilment of condition subsequent.","meaning":"An ulterior transfer (a later gift) is valid only if it complies with the provisions of the Transfer of Property Act. If the prior interest fails in a manner that does not satisfy the conditions laid down by law or the transfer, the ulterior disposition cannot take effect.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 29 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     regulate ulterior transfers. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure certainty in conditional dispositions. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent invalid future interests. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     harmonize ulterior dispositions with Sections 27 and 28.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Valid Alternative Gift\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B refuses, then to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B refuses.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C takes the property.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Invalid Future Interest\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B's interest fails, then to a person whose interest is\nvoid under Section 13 or 14.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The ulterior transfer is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Illegal Condition\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B commits an offence, then to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The condition is unlawful.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The ulterior disposition fails because of\nSection 25.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Rule Against Perpetuity\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B's interest fails after an impermissible period, then to\nC.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The ulterior disposition is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Lawful Ulterior Gift\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B for life.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B dies without children, then to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The contingency occurs validly.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C acquires the property.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"118","actId":"3","sectionNo":"30","chapterName":"CHAPTER II OF TRANSFERS OF PROPERTY BY ACT OF PARTIES","bareAct":"Prior disposition not affected by invalidity of ulterior disposition.","meaning":"If a transfer first creates a valid interest in one person and then creates a subsequent (ulterior) interest which is invalid, the invalidity of the ulterior interest does not affect the validity of the prior interest.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 30 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     protect valid transfers from being invalidated by an invalid subsequent\n     disposition. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     uphold the transferor's lawful intention as far as possible. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     apply the principle of \u003Cb>severability\u003C\u002Fb> in property transfers. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure certainty in future interests.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Rule Against Perpetuity\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B for life and thereafter to a\nperson in violation of Section 14.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B's life interest remains valid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Illegal Condition\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B commits an offence, the property shall pass to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The ulterior transfer to C is void; B's\ninterest continues.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Impossible Condition\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B brings the moon to Earth, the property shall pass to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The condition is void. B's transfer is\nunaffected.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Invalid Gift to an Unborn Person\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B for life and then to an unborn\nperson in a manner contrary to Section 13.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B's interest remains valid; the later\ndisposition is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Valid Prior Interest\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to B absolutely and then creates an\ninvalid future interest in favour of C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B's ownership is unaffected.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"119","actId":"1","sectionNo":"300","chapterName":"CHAPTER XVI OF OFFENCES RELATING TO RELIGION","bareAct":"Whoever voluntarily causes disturbance to any assembly lawfully engaged in the performance of religious worship, or religious ceremonies, shall be punished with imprisonment of either description for a term which may extend to one year, or with fine, or with both.","meaning":"Section 300 lays down the legal framework governing the specified offence or legal principle under the BNS. It defines the essential ingredients that must be proved for liability and the circumstances in which the provision applies.","objective":"\u003Cp data-start=\"1223\" data-end=\"1258\" class=\"PDq2pG_selectionAnchorContainer\">The objective of Section 300 is to:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"1260\" data-end=\"1461\">\n\u003Cli data-section-id=\"1l6y8yr\" data-start=\"1260\" data-end=\"1314\">\nprotect the legal interest covered by the provision;\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1vytmzx\" data-start=\"1315\" data-end=\"1369\">\nprescribe criminal liability for prohibited conduct;\n\u003C\u002Fli>\n\u003Cli data-section-id=\"xehtsq\" data-start=\"1370\" data-end=\"1425\">\nensure consistency in prosecution and punishment; and\n\u003C\u002Fli>\n\u003Cli data-section-id=\"14dtlor\" data-start=\"1426\" data-end=\"1461\">\npromote public order and justice.\u003C\u002Fli>\u003C\u002Ful>","illustration":"\u003Cp data-start=\"1480\" data-end=\"1492\" class=\"PDq2pG_selectionAnchorContainer\">\u003Cstrong data-start=\"1480\" data-end=\"1492\">Example:\u003C\u002Fstrong>\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cp data-start=\"1494\" data-end=\"1664\">Suppose Person A intentionally engages in conduct prohibited under Section 300. If all statutory ingredients are satisfied, the act attracts liability under this section.\u003C\u002Fp>","exception":"The applicability of exceptions depends on the facts of each case. Where a statutory exception, general exception under Chapter III of the BNS, or judicially recognized defence applies, criminal liability may be excluded or reduced.","caseStudyId":"0"},{"sectionId":"120","actId":"1","sectionNo":"302","chapterName":"CHAPTER XVI OF OFFENCES RELATING TO RELIGION","bareAct":"Whoever, with the deliberate intention of wounding the religious feelings of any person, utters any word or makes any sound in the hearing of that person or makes any gesture in the sight of that person or places any object in the sight of that person, shall be punished with imprisonment of either description for a term which may extend to one year, or with fine, or with both.","meaning":"Section 302 specifies the offence, its essential elements, and the legal consequences where those elements are established.","objective":"\u003Cp data-start=\"2307\" data-end=\"2330\" class=\"PDq2pG_selectionAnchorContainer\">Its objectives include:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"2332\" data-end=\"2493\">\n\u003Cli data-section-id=\"1alw445\" data-start=\"2332\" data-end=\"2363\">\ndeterring prohibited conduct;\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1pb1xpz\" data-start=\"2364\" data-end=\"2401\">\nprotecting individuals and society;\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1k5wxej\" data-start=\"2402\" data-end=\"2446\">\nensuring accountability for offenders; and\n\u003C\u002Fli>\n\u003Cli data-section-id=\"pzr3a\" data-start=\"2447\" data-end=\"2493\">\nproviding a statutory basis for prosecution.\u003C\u002Fli>\u003C\u002Ful>","illustration":"\u003Cp data-start=\"2512\" data-end=\"2524\" class=\"PDq2pG_selectionAnchorContainer\">\u003Cstrong data-start=\"2512\" data-end=\"2524\">Example:\u003C\u002Fstrong>\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cp data-start=\"2526\" data-end=\"2689\">If a person knowingly commits the prohibited act described in Section 302 and all legal ingredients are proved, that person may be prosecuted under this provision.\u003C\u002Fp>","exception":"General exceptions under the BNS—such as acts done in private defence, infancy, unsoundness of mind, accident, or necessity—may apply where the statutory requirements are met.","caseStudyId":"0"},{"sectionId":"121","actId":"4","sectionNo":"5","chapterName":"CHAPTER I OF EASEMENTS GENERALLY","bareAct":"Continuous and discontinuous, apparent and non-apparent, easements.—Easements are either continuous or discontinuous, apparent or non-apparent. A continuous easement is one whose enjoyment is, or may be, continual without the act of man. A discontinuous easement is one that needs the act of man for its enjoyment. An apparent easement is one the existence of which is shown by some permanent sign which, upon careful inspection by a competent person, would be visible to him. A non-apparent easement is one that has no such sign.","meaning":"\u003Ch2 data-section-id=\"1warzky\" data-start=\"212\" data-end=\"222\" class=\"PDq2pG_selectionAnchorContainer\">Meaning\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fh2>\n\u003Cp data-start=\"224\" data-end=\"477\">Section 5 defines an \u003Cstrong data-start=\"245\" data-end=\"257\">easement\u003C\u002Fstrong> as a legal right that the owner or occupier of one piece of land (called the \u003Cstrong data-start=\"335\" data-end=\"356\">dominant heritage\u003C\u002Fstrong>) enjoys over another piece of land (called the \u003Cstrong data-start=\"404\" data-end=\"425\">servient heritage\u003C\u002Fstrong>) for the beneficial enjoyment of the dominant land.\u003C\u002Fp>\n\u003Cp data-start=\"479\" data-end=\"658\">An easement does \u003Cstrong data-start=\"496\" data-end=\"503\">not\u003C\u002Fstrong> transfer ownership of the servient land. It merely grants a limited right, such as the right of way, right to light, right to water, or right to drainage.\u003C\u002Fp>\n\u003Ch3 data-section-id=\"ao41p1\" data-start=\"660\" data-end=\"682\">Essential Elements\u003C\u002Fh3>\n\u003Cul data-start=\"684\" data-end=\"955\">\n\u003Cli data-section-id=\"11mwut4\" data-start=\"684\" data-end=\"724\">\nThere must be two separate properties.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"yfc9bv\" data-start=\"725\" data-end=\"769\">\nOne property benefits (dominant heritage).\n\u003C\u002Fli>\n\u003Cli data-section-id=\"3giyob\" data-start=\"770\" data-end=\"819\">\nThe other bears the burden (servient heritage).\n\u003C\u002Fli>\n\u003Cli data-section-id=\"5iznef\" data-start=\"820\" data-end=\"893\">\nThe right exists for the beneficial enjoyment of the dominant heritage.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1nl7xnv\" data-start=\"894\" data-end=\"955\">\nThe owners of the two properties must be different persons.\u003C\u002Fli>\u003C\u002Ful>","objective":"\u003Cp data-start=\"976\" data-end=\"1008\" class=\"PDq2pG_selectionAnchorContainer\">The objectives of Section 5 are:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"1010\" data-end=\"1258\">\n\u003Cli data-section-id=\"1esnq2x\" data-start=\"1010\" data-end=\"1079\">\nTo legally recognize rights enjoyed over another person's property.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"gei9gv\" data-start=\"1080\" data-end=\"1137\">\nTo facilitate the beneficial use and enjoyment of land.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1wkspon\" data-start=\"1138\" data-end=\"1191\">\nTo prevent disputes between neighboring landowners.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1w49qzl\" data-start=\"1192\" data-end=\"1258\">\nTo balance property rights while protecting lawful user of land.\u003C\u002Fli>\u003C\u002Ful>","illustration":"\u003Ch3 data-section-id=\"3znm2\" data-start=\"1282\" data-end=\"1310\" class=\"PDq2pG_selectionAnchorContainer\">Example 1 – Right of Way\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fh3>\n\u003Cp data-start=\"1312\" data-end=\"1370\">A owns a house that has no direct access to a public road.\u003C\u002Fp>\n\u003Cp data-start=\"1372\" data-end=\"1398\">B owns the adjoining land.\u003C\u002Fp>\n\u003Cp data-start=\"1400\" data-end=\"1483\">A has a legally recognized right to pass through B's land to reach the public road.\u003C\u002Fp>\n\u003Cp data-start=\"1485\" data-end=\"1490\">Here:\u003C\u002Fp>\n\u003Cul data-start=\"1492\" data-end=\"1587\">\n\u003Cli data-section-id=\"joxhhv\" data-start=\"1492\" data-end=\"1526\">\nDominant Heritage ? A's property\n\u003C\u002Fli>\n\u003Cli data-section-id=\"h8sgy6\" data-start=\"1527\" data-end=\"1561\">\nServient Heritage ? B's property\n\u003C\u002Fli>\n\u003Cli data-section-id=\"upwmcc\" data-start=\"1562\" data-end=\"1587\">\nEasement ? Right of Way\n\u003C\u002Fli>\n\u003C\u002Ful>\n\u003Chr data-start=\"1589\" data-end=\"1592\">\n\u003Ch3 data-section-id=\"jdtb0q\" data-start=\"1594\" data-end=\"1624\">Example 2 – Right to Light\u003C\u002Fh3>\n\u003Cp data-start=\"1626\" data-end=\"1676\">A's building has windows overlooking B's property.\u003C\u002Fp>\n\u003Cp data-start=\"1678\" data-end=\"1762\">By law or long use, A has acquired the right to receive light through those windows.\u003C\u002Fp>\n\u003Cp data-start=\"1764\" data-end=\"1847\">B cannot construct a wall that unlawfully blocks that light if the easement exists.\u003C\u002Fp>","exception":"\u003Cp data-start=\"1869\" data-end=\"1963\" class=\"PDq2pG_selectionAnchorContainer\">Section 5 itself does not contain express exceptions. However, an easement cannot exist where:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"1965\" data-end=\"2179\">\n\u003Cli data-section-id=\"gj71lu\" data-start=\"1965\" data-end=\"2008\">\nBoth properties belong to the same owner.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1ifrc5j\" data-start=\"2009\" data-end=\"2054\">\nThere is no dominant and servient heritage.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"67qqi8\" data-start=\"2055\" data-end=\"2130\">\nThe claimed right is not connected with the beneficial enjoyment of land.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"pfabqu\" data-start=\"2131\" data-end=\"2179\">\nThe right is contrary to law or public policy.\u003C\u002Fli>\u003C\u002Ful>","caseStudyId":"0"},{"sectionId":"122","actId":"4","sectionNo":"6","chapterName":"CHAPTER I OF EASEMENTS GENERALLY","bareAct":"Easement for limited time or on condition.—An easement may be permanent, or for a term of years or other limited period, or subject to periodical interruption, or exercisable only at a certain place or at certain times, or between certain hours, or for a particular purpose, or on condition that it shall commence or become void or voidable on the happening of a specified event or the performance or non-performance of a specified act.","meaning":"\u003Cp data-start=\"2239\" data-end=\"2319\" class=\"PDq2pG_selectionAnchorContainer\">Section 6 specifies the kinds of rights that \u003Cstrong data-start=\"2284\" data-end=\"2294\">cannot\u003C\u002Fstrong> be claimed as easements.\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cp data-start=\"2321\" data-end=\"2455\">It distinguishes genuine easements from rights that are merely personal, commercial, or unrelated to the beneficial enjoyment of land.\u003C\u002Fp>","objective":"\u003Cp data-start=\"2476\" data-end=\"2508\" class=\"PDq2pG_selectionAnchorContainer\">The objectives of Section 6 are:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"2510\" data-end=\"2736\">\n\u003Cli data-section-id=\"1jcvc6v\" data-start=\"2510\" data-end=\"2552\">\nTo prevent misuse of easementary rights.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"ta8wwo\" data-start=\"2553\" data-end=\"2630\">\nTo ensure easements remain connected with land and not personal privileges.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"ooo2yb\" data-start=\"2631\" data-end=\"2683\">\nTo protect ownership rights of the servient owner.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1g8go1d\" data-start=\"2684\" data-end=\"2736\">\nTo clarify the legal limits of easementary claims.\u003C\u002Fli>\u003C\u002Ful>","illustration":"\u003Ch3 data-section-id=\"1yghsz7\" data-start=\"2761\" data-end=\"2802\" class=\"PDq2pG_selectionAnchorContainer\">Illustration 1 – Personal Convenience\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fh3>\n\u003Cp data-start=\"2804\" data-end=\"2882\">A claims the right to enter B's land every evening merely to enjoy the sunset.\u003C\u002Fp>\n\u003Cp data-start=\"2884\" data-end=\"3001\">This is \u003Cstrong data-start=\"2892\" data-end=\"2911\">not an easement\u003C\u002Fstrong>, as it is a personal pleasure and not necessary for the beneficial enjoyment of A's land.\u003C\u002Fp>\n\u003Chr data-start=\"3003\" data-end=\"3006\">\n\u003Ch3 data-section-id=\"1yyfp6h\" data-start=\"3008\" data-end=\"3069\">Illustration 2 – Commercial Benefit Unconnected with Land\u003C\u002Fh3>\n\u003Cp data-start=\"3071\" data-end=\"3159\">A claims the right to park customers' vehicles on B's land to increase business profits.\u003C\u002Fp>\n\u003Cp data-start=\"3161\" data-end=\"3369\">Unless such a right is legally created by agreement or another recognized legal mechanism, it is \u003Cstrong data-start=\"3258\" data-end=\"3277\">not an easement\u003C\u002Fstrong> under Section 6 because it is not a right attached to the beneficial enjoyment of A's land.\u003C\u002Fp>\n\u003Chr data-start=\"3371\" data-end=\"3374\">\n\u003Ch3 data-section-id=\"1o88efn\" data-start=\"3376\" data-end=\"3409\">Illustration 3 – Right to Air\u003C\u002Fh3>\n\u003Cp data-start=\"3411\" data-end=\"3582\">If A's building legally enjoys uninterrupted airflow through B's land for the beneficial use of A's property, such a right may constitute an easement if recognized by law.\u003C\u002Fp>","exception":"\u003Cp data-start=\"3604\" data-end=\"3703\" class=\"PDq2pG_selectionAnchorContainer\">Section 6 does not prescribe exceptions in the traditional sense. Instead, it excludes claims that:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"3705\" data-end=\"3936\">\n\u003Cli data-section-id=\"1nivfbl\" data-start=\"3705\" data-end=\"3734\">\nAre merely personal rights.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1vf6uoh\" data-start=\"3735\" data-end=\"3793\">\nExist solely for commercial advantage unrelated to land.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"m8b02z\" data-start=\"3794\" data-end=\"3869\">\nAre not connected with the beneficial enjoyment of the dominant heritage.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"ymz46f\" data-start=\"3870\" data-end=\"3936\">\nAre inconsistent with the nature of an easement under Section 5.\u003C\u002Fli>\u003C\u002Ful>","caseStudyId":"0"},{"sectionId":"123","actId":"5","sectionNo":"17","chapterName":"CHAPTER III OF THE DUTIES AND LIABILITIES OF TRUSTEES","bareAct":"Where there are more beneficiaries than one, the trustee is bound to be impartial, and must not execute the trust for the advantage of one at the expense of another. Where the trustee has a discretionary power, nothing in this section shall be deemed to authorize the Court to control the exercise reasonably and in good faith of such discretion.","meaning":"\u003Cp data-start=\"294\" data-end=\"541\">Section 17 imposes a duty on the trustee to act \u003Cstrong data-start=\"342\" data-end=\"357\">impartially\u003C\u002Fstrong> when there are multiple beneficiaries under a trust. The trustee must not unfairly favor one beneficiary over another unless the trust instrument expressly authorizes such preference.\u003C\u002Fp>\n\u003Cp data-start=\"543\" data-end=\"657\">The trustee must balance the interests of all beneficiaries and administer the trust property fairly and honestly.\u003C\u002Fp>","objective":"\u003Cp data-start=\"678\" data-end=\"711\" class=\"PDq2pG_selectionAnchorContainer\">The objectives of Section 17 are:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"713\" data-end=\"966\">\n\u003Cli data-section-id=\"11x6c2c\" data-start=\"713\" data-end=\"767\">\nTo ensure equal and fair treatment of beneficiaries.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"hyg9sf\" data-start=\"768\" data-end=\"825\">\nTo prevent discrimination or favoritism by the trustee.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1mtnr1d\" data-start=\"826\" data-end=\"881\">\nTo uphold the fiduciary nature of a trustee's office.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"161l93o\" data-start=\"882\" data-end=\"966\">\nTo protect the interests of all beneficiaries according to the terms of the trust.\u003C\u002Fli>\u003C\u002Ful>","illustration":"\u003Ch3 data-section-id=\"1nq108e\" data-start=\"990\" data-end=\"1040\" class=\"PDq2pG_selectionAnchorContainer\">Example 1 – Income and Remainder Beneficiaries\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fh3>\n\u003Cp data-start=\"1042\" data-end=\"1198\">A creates a trust stating that the income from the trust property shall be paid to B during B's lifetime, and after B's death, the property shall pass to C.\u003C\u002Fp>\n\u003Cp data-start=\"1200\" data-end=\"1217\">The trustee must:\u003C\u002Fp>\n\u003Cul data-start=\"1218\" data-end=\"1316\">\n\u003Cli data-section-id=\"1k7dccz\" data-start=\"1218\" data-end=\"1252\">\nPay the income to B as directed.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1f6ybvn\" data-start=\"1253\" data-end=\"1316\">\nPreserve the trust property so that C ultimately receives it.\n\u003C\u002Fli>\n\u003C\u002Ful>\n\u003Cp data-start=\"1318\" data-end=\"1414\">The trustee cannot sacrifice C's interest solely to benefit B, nor deny B the income to favor C.\u003C\u002Fp>\n\u003Chr data-start=\"1416\" data-end=\"1419\">\n\u003Ch3 data-section-id=\"19mxipm\" data-start=\"1421\" data-end=\"1459\">Example 2 – Multiple Beneficiaries\u003C\u002Fh3>\n\u003Cp data-start=\"1461\" data-end=\"1520\">A trust is created for the equal benefit of three siblings.\u003C\u002Fp>\n\u003Cp data-start=\"1522\" data-end=\"1623\">The trustee distributes all trust income to only one sibling without any authority in the trust deed.\u003C\u002Fp>\n\u003Cp data-start=\"1625\" data-end=\"1683\">This would amount to a breach of the duty of impartiality.\u003C\u002Fp>","exception":"\u003Cp data-start=\"1705\" data-end=\"1751\" class=\"PDq2pG_selectionAnchorContainer\">The duty of impartiality does not apply where:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"1753\" data-end=\"1965\">\n\u003Cli data-section-id=\"1ybk9i5\" data-start=\"1753\" data-end=\"1814\">\nThe trust deed expressly authorizes preferential treatment.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"y0pzv3\" data-start=\"1815\" data-end=\"1871\">\nThe settlor has clearly directed unequal distribution.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"15498m1\" data-start=\"1872\" data-end=\"1965\">\nA court permits deviation in exceptional circumstances consistent with the trust's purpose.\u003C\u002Fli>\u003C\u002Ful>","caseStudyId":"0"},{"sectionId":"124","actId":"5","sectionNo":"18","chapterName":"CHAPTER III OF THE DUTIES AND LIABILITIES OF TRUSTEES","bareAct":"Trustee to prevent waste.—Where the trust is created for the benefit of several persons in succession and one of them is in possession of the trust-property, if he commits, or threatens to commit, any act which is destructive or permanently injurious thereto, the trustee is bound to take measures to prevent such act.","meaning":"\u003Cp data-start=\"2025\" data-end=\"2177\" class=\"PDq2pG_selectionAnchorContainer\">Section 18 requires a trustee to take reasonable steps to \u003Cstrong data-start=\"2083\" data-end=\"2126\">protect and preserve the trust property\u003C\u002Fstrong> from destruction, deterioration, misuse, or waste.\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cp data-start=\"2179\" data-end=\"2281\">A trustee must act prudently to ensure that the trust assets retain their value for the beneficiaries.\u003C\u002Fp>","objective":"\u003Cp data-start=\"2302\" data-end=\"2335\" class=\"PDq2pG_selectionAnchorContainer\">The objectives of Section 18 are:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"2337\" data-end=\"2523\">\n\u003Cli data-section-id=\"1ci6rdq\" data-start=\"2337\" data-end=\"2366\">\nTo preserve trust property.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1wiz3eg\" data-start=\"2367\" data-end=\"2418\">\nTo prevent loss or deterioration of trust assets.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"on8v0n\" data-start=\"2419\" data-end=\"2463\">\nTo safeguard the beneficiaries' interests.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"kuv08b\" data-start=\"2464\" data-end=\"2523\">\nTo ensure responsible and prudent management by trustees.\u003C\u002Fli>\u003C\u002Ful>","illustration":"\u003Ch3 data-section-id=\"tffx6a\" data-start=\"2547\" data-end=\"2580\" class=\"PDq2pG_selectionAnchorContainer\">Example 1 – Agricultural Land\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fh3>\n\u003Cp data-start=\"2582\" data-end=\"2613\">A trust owns agricultural land.\u003C\u002Fp>\n\u003Cp data-start=\"2615\" data-end=\"2713\">The trustee notices that unauthorized persons are illegally cultivating and damaging the property.\u003C\u002Fp>\n\u003Cp data-start=\"2715\" data-end=\"2833\">The trustee must take reasonable legal and practical measures to stop the encroachment and protect the trust property.\u003C\u002Fp>\n\u003Chr data-start=\"2835\" data-end=\"2838\">\n\u003Ch3 data-section-id=\"d8jzq1\" data-start=\"2840\" data-end=\"2871\">Example 2 – Rental Building\u003C\u002Fh3>\n\u003Cp data-start=\"2873\" data-end=\"2909\">A trust owns a residential building.\u003C\u002Fp>\n\u003Cp data-start=\"2911\" data-end=\"2955\">The roof develops serious structural damage.\u003C\u002Fp>\n\u003Cp data-start=\"2957\" data-end=\"3039\">The trustee ignores the problem despite having sufficient trust funds for repairs.\u003C\u002Fp>\n\u003Cp data-start=\"3041\" data-end=\"3093\">Eventually, the building deteriorates substantially.\u003C\u002Fp>\n\u003Cp data-start=\"3095\" data-end=\"3172\">The trustee may be liable for failing to prevent waste of the trust property.\u003C\u002Fp>","exception":"\u003Cp data-start=\"3194\" data-end=\"3228\" class=\"PDq2pG_selectionAnchorContainer\">A trustee may not be liable where:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"3230\" data-end=\"3482\">\n\u003Cli data-section-id=\"1dmjpr0\" data-start=\"3230\" data-end=\"3299\">\nThe loss occurred despite exercising reasonable care and diligence.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1nv9f9g\" data-start=\"3300\" data-end=\"3396\">\nThe damage resulted from unavoidable natural disasters or events beyond the trustee's control.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"195jubg\" data-start=\"3397\" data-end=\"3482\">\nThe trustee acted honestly, prudently, and in accordance with the trust instrument.\u003C\u002Fli>\u003C\u002Ful>","caseStudyId":"0"},{"sectionId":"125","actId":"7","sectionNo":"4","chapterName":"PART II LIMITATION OF SUITS, APPEALS AND APPLICATIONS","bareAct":"Expiry of prescribed period when court is closed.—Where the prescribed period for any suit, appeal or application expires on a day when the court is closed, the suit, appeal or application may be instituted, preferred or made on the day when the court re-opens.","meaning":"\u003Cp data-start=\"299\" data-end=\"495\">Section 4 provides that if the \u003Cstrong data-start=\"330\" data-end=\"404\">prescribed limitation period expires on a day when the court is closed\u003C\u002Fstrong>, the suit, appeal, or application may be filed on the \u003Cstrong data-start=\"459\" data-end=\"494\">next day when the court reopens\u003C\u002Fstrong>.\u003C\u002Fp>\n\u003Cp data-start=\"497\" data-end=\"677\">This provision ensures that a litigant does not lose the right to institute legal proceedings merely because the court was not functioning on the last day of the limitation period.\u003C\u002Fp>","objective":"\u003Cp data-start=\"698\" data-end=\"730\" class=\"PDq2pG_selectionAnchorContainer\">The objectives of Section 4 are:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"732\" data-end=\"1022\">\n\u003Cli data-section-id=\"v88aiu\" data-start=\"732\" data-end=\"794\">\nTo protect litigants from hardship caused by court holidays.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"444oxm\" data-start=\"795\" data-end=\"872\">\nTo ensure access to justice when filing is impossible due to court closure.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"zc4qcz\" data-start=\"873\" data-end=\"958\">\nTo prevent injustice arising from circumstances beyond the control of the litigant.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"zgq4t3\" data-start=\"959\" data-end=\"1022\">\nTo provide certainty regarding the computation of limitation.\u003C\u002Fli>\u003C\u002Ful>","illustration":"\u003Ch3 data-section-id=\"kkiu43\" data-start=\"1046\" data-end=\"1076\" class=\"PDq2pG_selectionAnchorContainer\">Example 1 – Public Holiday\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fh3>\n\u003Cp data-start=\"1078\" data-end=\"1176\">A person has time to file an appeal until \u003Cstrong data-start=\"1120\" data-end=\"1133\">15 August\u003C\u002Fstrong>, but that day is a declared court holiday.\u003C\u002Fp>\n\u003Cp data-start=\"1178\" data-end=\"1213\">The court reopens on \u003Cstrong data-start=\"1199\" data-end=\"1212\">16 August\u003C\u002Fstrong>.\u003C\u002Fp>\n\u003Cp data-start=\"1215\" data-end=\"1310\">The appeal filed on \u003Cstrong data-start=\"1235\" data-end=\"1248\">16 August\u003C\u002Fstrong> is treated as having been filed within the limitation period.\u003C\u002Fp>\n\u003Chr data-start=\"1312\" data-end=\"1315\">\n\u003Ch3 data-section-id=\"1m52opl\" data-start=\"1317\" data-end=\"1347\">Example 2 – Court Vacation\u003C\u002Fh3>\n\u003Cp data-start=\"1349\" data-end=\"1420\">The last day for filing a civil suit falls during the court's vacation.\u003C\u002Fp>\n\u003Cp data-start=\"1422\" data-end=\"1495\">The plaintiff files the suit on the first working day after the vacation.\u003C\u002Fp>\n\u003Cp data-start=\"1497\" data-end=\"1573\">The filing is considered to be within the prescribed period under Section 4.\u003C\u002Fp>","exception":"\u003Cp data-start=\"1595\" data-end=\"1630\" class=\"PDq2pG_selectionAnchorContainer\">Section 4 does \u003Cstrong data-start=\"1610\" data-end=\"1617\">not\u003C\u002Fstrong> apply where:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"1632\" data-end=\"1833\">\n\u003Cli data-section-id=\"1ygb4rx\" data-start=\"1632\" data-end=\"1696\">\nThe limitation period expired \u003Cstrong data-start=\"1664\" data-end=\"1674\">before\u003C\u002Fstrong> the court was closed.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"b6w5ad\" data-start=\"1697\" data-end=\"1774\">\nThe filing is delayed beyond the first working day after the court reopens.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1pr5pqg\" data-start=\"1775\" data-end=\"1833\">\nThe law expressly excludes the application of Section 4.\u003C\u002Fli>\u003C\u002Ful>","caseStudyId":"0"},{"sectionId":"126","actId":"7","sectionNo":"5","chapterName":"PART II LIMITATION OF SUITS, APPEALS AND APPLICATIONS","bareAct":"Extension of prescribed period in certain cases.—Any appeal or any application, other than an application under any of the provisions of Order XXI of the Code of Civil Procedure, 1908 (5 of 1908), may be admitted after the prescribed period if the appellant or the applicant satisfies the court that he had sufficient cause for not preferring the appeal or making the application within such period.","meaning":"\u003Cp data-start=\"1915\" data-end=\"2119\" class=\"PDq2pG_selectionAnchorContainer\">Section 5 empowers the court to \u003Cstrong data-start=\"1947\" data-end=\"1964\">condone delay\u003C\u002Fstrong> in filing an \u003Cstrong data-start=\"1978\" data-end=\"2012\">appeal or certain applications\u003C\u002Fstrong> if the applicant demonstrates \u003Cstrong data-start=\"2043\" data-end=\"2063\">sufficient cause\u003C\u002Fstrong> for not filing within the prescribed limitation period.\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cp data-start=\"2121\" data-end=\"2276\">Importantly, \u003Cstrong data-start=\"2134\" data-end=\"2171\">Section 5 does not apply to suits\u003C\u002Fstrong>. It generally applies only to appeals and applications, subject to the provisions of the Limitation Act.\u003C\u002Fp>","objective":"\u003Cp data-start=\"2297\" data-end=\"2329\" class=\"PDq2pG_selectionAnchorContainer\">The objectives of Section 5 are:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"2331\" data-end=\"2597\">\n\u003Cli data-section-id=\"10tohf7\" data-start=\"2331\" data-end=\"2384\">\nTo advance substantial justice over technicalities.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"xka3eu\" data-start=\"2385\" data-end=\"2470\">\nTo prevent genuine litigants from being denied relief because of unavoidable delay.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"hqxj9q\" data-start=\"2471\" data-end=\"2547\">\nTo grant courts discretionary power where sufficient cause is established.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"9u9oyp\" data-start=\"2548\" data-end=\"2597\">\nTo balance procedural discipline with fairness.\u003C\u002Fli>\u003C\u002Ful>","illustration":"\u003Ch3 data-section-id=\"161wjy\" data-start=\"2621\" data-end=\"2654\" class=\"PDq2pG_selectionAnchorContainer\">Example 1 – Medical Emergency\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fh3>\n\u003Cp data-start=\"2656\" data-end=\"2780\">A litigant is hospitalized due to a serious illness and is unable to file an appeal within the prescribed limitation period.\u003C\u002Fp>\n\u003Cp data-start=\"2782\" data-end=\"2898\">After recovery, the appeal is filed along with an application explaining the delay and supported by medical records.\u003C\u002Fp>\n\u003Cp data-start=\"2900\" data-end=\"3014\">If the court is satisfied that the illness constituted sufficient cause, it may condone the delay under Section 5.\u003C\u002Fp>\n\u003Chr data-start=\"3016\" data-end=\"3019\">\n\u003Ch3 data-section-id=\"1xbv0hk\" data-start=\"3021\" data-end=\"3057\">Example 2 – Certified Copy Delay\u003C\u002Fh3>\n\u003Cp data-start=\"3059\" data-end=\"3187\">A party applies for a certified copy of the judgment in time, but administrative delays contribute to late filing of the appeal.\u003C\u002Fp>\n\u003Cp data-start=\"3189\" data-end=\"3290\">If the delay is satisfactorily explained, the court may extend the limitation period under Section 5.\u003C\u002Fp>","exception":"\u003Cp data-start=\"3312\" data-end=\"3347\" class=\"PDq2pG_selectionAnchorContainer\">Section 5 does \u003Cstrong data-start=\"3327\" data-end=\"3334\">not\u003C\u002Fstrong> apply where:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"3349\" data-end=\"3645\">\n\u003Cli data-section-id=\"1hk96j3\" data-start=\"3349\" data-end=\"3437\">\nThe proceeding is a \u003Cstrong data-start=\"3371\" data-end=\"3379\">suit\u003C\u002Fstrong> (unless another statute specifically provides otherwise).\n\u003C\u002Fli>\n\u003Cli data-section-id=\"16qmfd9\" data-start=\"3438\" data-end=\"3492\">\nThe applicant fails to establish \"sufficient cause.\"\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1jca6lq\" data-start=\"3493\" data-end=\"3572\">\nThe delay results from negligence, lack of diligence, or deliberate inaction.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1064mci\" data-start=\"3573\" data-end=\"3645\">\nThe governing statute expressly excludes the application of Section 5.\u003C\u002Fli>\u003C\u002Ful>","caseStudyId":"0"},{"sectionId":"127","actId":"6","sectionNo":"154","chapterName":"CHAPTER XII INFORMATION TO THE POLICE AND THEIR POWERS TO INVESTIGATE","bareAct":"Information in cognizable cases.—(1) Every information relating to the commission of a cognizable offence, if given orally to an officer in charge of a police station, shall be reduced to writing by him or under his direction, and be read over to the informant; and every such information, whether given in writing or reduced to writing as aforesaid, shall be signed by the person giving it, and the substance thereof shall be entered in a book to be kept by such officer in such form as the State Government may prescribe in this behalf:","meaning":"Section 154 provides the procedure for recording information relating to the commission of a \u003Cstrong data-start=\"777\" data-end=\"799\">cognizable offence\u003C\u002Fstrong>. When such information is given to the officer in charge of a police station, it must be recorded in writing, read over to the informant, and signed by the informant. This recorded information is commonly known as the \u003Cstrong data-start=\"1018\" data-end=\"1052\">First Information Report (FIR)\u003C\u002Fstrong>.","objective":"\u003Cp data-start=\"1074\" data-end=\"1108\" class=\"PDq2pG_selectionAnchorContainer\">The objectives of Section 154 are:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"1110\" data-end=\"1357\">\n\u003Cli data-section-id=\"1tkcbrd\" data-start=\"1110\" data-end=\"1162\">\nTo ensure prompt reporting of cognizable offences.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"15otc10\" data-start=\"1163\" data-end=\"1226\">\nTo initiate criminal investigation without unnecessary delay.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"593hw9\" data-start=\"1227\" data-end=\"1278\">\nTo preserve the earliest version of the incident.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"6fgdzp\" data-start=\"1279\" data-end=\"1357\">\nTo protect the rights of victims and maintain transparency in police action.\u003C\u002Fli>\u003C\u002Ful>","illustration":"\u003Ch3 data-section-id=\"3ilztz\" data-start=\"1381\" data-end=\"1402\" class=\"PDq2pG_selectionAnchorContainer\">Example 1 – Theft\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fh3>\n\u003Cp data-start=\"1404\" data-end=\"1505\">A discovers that his motorcycle has been stolen and reports the incident to the local police station.\u003C\u002Fp>\n\u003Cp data-start=\"1507\" data-end=\"1577\">The police record his complaint as an FIR and begin the investigation.\u003C\u002Fp>\n\u003Chr data-start=\"1579\" data-end=\"1582\">\n\u003Ch3 data-section-id=\"11o4in6\" data-start=\"1584\" data-end=\"1607\">Example 2 – Assault\u003C\u002Fh3>\n\u003Cp data-start=\"1609\" data-end=\"1675\">B reports that he has been seriously assaulted by unknown persons.\u003C\u002Fp>\n\u003Cp data-start=\"1677\" data-end=\"1748\">The police register an FIR and commence investigation into the offence.\u003C\u002Fp>","exception":"\u003Cp data-start=\"1770\" data-end=\"1803\" class=\"PDq2pG_selectionAnchorContainer\">Section 154 does not apply where:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"1805\" data-end=\"2098\">\n\u003Cli data-section-id=\"11fbwwy\" data-start=\"1805\" data-end=\"1960\">\nThe information relates to a \u003Cstrong data-start=\"1836\" data-end=\"1862\">non-cognizable offence\u003C\u002Fstrong> (such matters are generally dealt with under separate provisions requiring different procedures).\n\u003C\u002Fli>\n\u003Cli data-section-id=\"wh3rg6\" data-start=\"1961\" data-end=\"2048\">\nThe information is vague or does not disclose the commission of a cognizable offence.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"zry2el\" data-start=\"2049\" data-end=\"2098\">\nA special law prescribes a different procedure.\u003C\u002Fli>\u003C\u002Ful>","caseStudyId":"0"},{"sectionId":"128","actId":"6","sectionNo":"167","chapterName":"CHAPTER XII INFORMATION TO THE POLICE AND THEIR POWERS TO INVESTIGATE","bareAct":"Procedure when investigation cannot be completed in twenty-four hours.—(1) Whenever any person is arrested and detained in custody, and it appears that the investigation cannot be completed within the period of twenty-four hours fixed by section 57, and there are grounds for believing that the accusation or information is wellfounded, the officer in charge of the police station or the police officer making the investigation, if he is not below the rank of sub-inspector, shall forthwith transmit to the nearest Judicial Magistrate a copy of the entries in the d","meaning":"\u003Cp data-start=\"2208\" data-end=\"2428\" class=\"PDq2pG_selectionAnchorContainer\">Section 167 applies when the police cannot complete the investigation within \u003Cstrong data-start=\"2285\" data-end=\"2297\">24 hours\u003C\u002Fstrong> after arrest. The investigating officer must produce the accused before a Magistrate and seek authorization for further detention.\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cp data-start=\"2430\" data-end=\"2540\">The Magistrate may authorize police custody or judicial custody according to law, subject to statutory limits.\u003C\u002Fp>","objective":"\u003Cp data-start=\"2561\" data-end=\"2595\" class=\"PDq2pG_selectionAnchorContainer\">The objectives of Section 167 are:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"2597\" data-end=\"2857\">\n\u003Cli data-section-id=\"1mrwlnl\" data-start=\"2597\" data-end=\"2666\">\nTo protect individuals from unlawful or prolonged police detention.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1l1btmv\" data-start=\"2667\" data-end=\"2716\">\nTo ensure judicial oversight of investigations.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"qppw5d\" data-start=\"2717\" data-end=\"2798\">\nTo balance the rights of the accused with the needs of effective investigation.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1ddhbse\" data-start=\"2799\" data-end=\"2857\">\nTo uphold constitutional guarantees of personal liberty.\u003C\u002Fli>\u003C\u002Ful>","illustration":"\u003Ch3 data-section-id=\"sic6jl\" data-start=\"2881\" data-end=\"2912\" class=\"PDq2pG_selectionAnchorContainer\">Example 1 – Financial Fraud\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fh3>\n\u003Cp data-start=\"2914\" data-end=\"3008\">A person is arrested in a large financial fraud case involving extensive documentary evidence.\u003C\u002Fp>\n\u003Cp data-start=\"3010\" data-end=\"3167\">Since the investigation cannot be completed within 24 hours, the police produce the accused before the Magistrate and seek further custody under Section 167.\u003C\u002Fp>\n\u003Chr data-start=\"3169\" data-end=\"3172\">\n\u003Ch3 data-section-id=\"11x1kns\" data-start=\"3174\" data-end=\"3205\">Example 2 – Organized Crime\u003C\u002Fh3>\n\u003Cp data-start=\"3207\" data-end=\"3291\">The police arrest several individuals suspected of participating in organized crime.\u003C\u002Fp>\n\u003Cp data-start=\"3293\" data-end=\"3459\">Because additional investigation is required, the Magistrate considers the request for continued custody after examining the case diary and the reasons for the delay.\u003C\u002Fp>","exception":"\u003Cp data-start=\"3481\" data-end=\"3514\" class=\"PDq2pG_selectionAnchorContainer\">Section 167 does not apply where:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"3516\" data-end=\"3783\">\n\u003Cli data-section-id=\"gzpznc\" data-start=\"3516\" data-end=\"3565\">\nThe investigation is completed within 24 hours.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"10hl1hj\" data-start=\"3566\" data-end=\"3692\">\nThe accused is entitled to statutory (default) bail because the investigation is not completed within the prescribed period.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1dxp07j\" data-start=\"3693\" data-end=\"3783\">\nAnother special statute prescribes a different procedure for detention or investigation.\u003C\u002Fli>\u003C\u002Ful>","caseStudyId":"0"},{"sectionId":"129","actId":"8","sectionNo":"17","chapterName":"PART III OF REGISTRABLE DOCUMENTS","bareAct":"Documents of which registration is compulsory.—(1) The following documents shall be registered, if the property to which they relate is situate in a district in which, and if they have been executed on or after the date on which, Act No. XVI of 1864, or the Indian Registration Act, 1866, or the Indian Registration Act, 1871, or the Indian Registration Act, 1877, or this Act came or comes into force","meaning":"\u003Cp data-start=\"227\" data-end=\"480\" class=\"PDq2pG_selectionAnchorContainer\">Section 17 specifies the categories of documents that \u003Cstrong data-start=\"281\" data-end=\"316\">must be compulsorily registered\u003C\u002Fstrong>. It primarily applies to documents that create, declare, assign, limit, or extinguish rights or interests in \u003Cstrong data-start=\"426\" data-end=\"448\">immovable property\u003C\u002Fstrong> of the value prescribed by law.\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cp data-start=\"482\" data-end=\"603\">Failure to register such documents may render them inadmissible as evidence or ineffective for transferring legal rights.\u003C\u002Fp>","objective":"\u003Cp data-start=\"624\" data-end=\"657\" class=\"PDq2pG_selectionAnchorContainer\">The objectives of Section 17 are:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"659\" data-end=\"920\">\n\u003Cli data-section-id=\"1rgjz2h\" data-start=\"659\" data-end=\"723\">\nTo ensure certainty and authenticity in property transactions.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1cli5y5\" data-start=\"724\" data-end=\"764\">\nTo prevent fraud and forged documents.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"95op2x\" data-start=\"765\" data-end=\"840\">\nTo maintain a public record of transactions affecting immovable property.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1q7k0xo\" data-start=\"841\" data-end=\"920\">\nTo protect the rights of purchasers, creditors, and other interested parties.\u003C\u002Fli>\u003C\u002Ful>","illustration":"\u003Ch3 data-section-id=\"4tjuey\" data-start=\"944\" data-end=\"973\" class=\"PDq2pG_selectionAnchorContainer\">Example 1 – Sale of House\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fh3>\n\u003Cp data-start=\"975\" data-end=\"1044\">A sells his residential house to B through a duly executed sale deed.\u003C\u002Fp>\n\u003Cp data-start=\"1046\" data-end=\"1152\">Since the sale deed transfers ownership of immovable property, it must be \u003Cstrong data-start=\"1120\" data-end=\"1134\">registered\u003C\u002Fstrong> under Section 17.\u003C\u002Fp>\n\u003Chr data-start=\"1154\" data-end=\"11

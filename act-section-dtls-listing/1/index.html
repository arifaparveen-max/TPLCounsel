<script id="ng-state" type="application/json">{"80fbdf67f44de1ae063a3b0b6abb902157de065dbd6b1d90d5873b7633c5a78e":{"b":[{"actId":"1","actName":"Bhartiya Nagrik Sanghita","alias":"BNS","dateOfEffect":"2026-07-11T00:00:00","actDetails":"The Bharatiya Nagarik Suraksha Sanhita (BNSS), 2023, is the foundational law governing criminal procedure in India. It came into effect on July 1, 2024, replacing the colonial-era Code of Criminal Procedure (CrPC) to modernize trials, make FIR registration easier, and mandate forensic evidence for severe crimes","imagePath":"\u002Fuploads\u002Fact-masters\u002F8344b95075df41fe82b75657d5377e5f_BNS.jpg","actImage":"null","legalCategoryId":"6","createdOn":"2026-07-11T15:27:13.4562721","createdBy":"API","modifiedOn":"2026-07-19T13:39:35.5256579","modifiedBy":"API"},{"actId":"2","actName":"Indian Contract Act","alias":"ICA","dateOfEffect":"1872-04-25T00:00:00","actDetails":"The Indian Contract Act, 1872 is the law that governs contracts and agreements in India. It lays down the rules for how contracts are made, enforced, and discharged.","imagePath":"\u002Fuploads\u002Fact-masters\u002F70dc19ee82b34f60a5918b0e711ed3fc_ICA.jpg","actImage":"null","legalCategoryId":"6","createdOn":"2026-07-12T06:16:47.2477649","createdBy":"API","modifiedOn":"2026-07-19T14:17:59.1052562","modifiedBy":"API"},{"actId":"3","actName":"Transfer of Property Act","alias":"TPA","dateOfEffect":"1872-07-01T00:00:00","actDetails":"Like\r\n\r\nDislike\r\nThe Transfer of Property Act, 1882 regulates the transfer of property between living persons in India, providing clear rules for sale, mortgage, lease, gift, and other property transactions. The Act was enacted to codify and regulate property transfers, replacing uncertain customs and scattered practices. It primarily applies to immovable property, though some provisions also cover movable property.","imagePath":"\u002Fuploads\u002Fact-masters\u002F4e618e51786b42ee9ab2fb9fb2e8e422_TPA.jpg","actImage":"null","legalCategoryId":"6","createdOn":"2026-07-12T07:21:49.9523035","createdBy":"API","modifiedOn":"2026-07-20T10:09:09.0883067","modifiedBy":"API"},{"actId":"4","actName":"Indian Easements Act","alias":"IEA","dateOfEffect":"1880-07-01T00:00:00","actDetails":"Defines easement rights such as rights of way, light, air, and water.The Indian Easements Act, 1882 governs the legal rights of a property owner (the dominant heritage) to use or access another person's land (the servient heritage) for beneficial enjoyment. It outlines crucial rules for rights of way, light, and air, and dictates that peaceable enjoyment of a right without interruption for 20 years makes it an absolute righ","imagePath":"\u002Fuploads\u002Fact-masters\u002Ffe69e0f4757b4d9a97af5886c9fd8273_IEA.jpg","actImage":"null","legalCategoryId":"6","createdOn":"2026-07-12T07:38:05.1241731","createdBy":"API","modifiedOn":"2026-07-19T14:25:14.1320776","modifiedBy":"API"},{"actId":"5","actName":"Indian Trusts Act,","alias":"ITA","dateOfEffect":"1882-03-01T00:00:00","actDetails":"The Indian Trusts Act, 1882, governs private trusts and trustees in India. It establishes a legal framework where an owner transfers property to a trustee to hold for the benefit of a third-party beneficiary. The Act outlines the creation of trusts, trustee duties, and beneficiary right","imagePath":"\u002Fuploads\u002Fact-masters\u002Fa4e13850b85744b3aec93eae09572774_ITA.jpg","actImage":"null","legalCategoryId":"6","createdOn":"2026-07-12T10:55:41.9141303","createdBy":"API","modifiedOn":"2026-07-19T14:41:45.9469461","modifiedBy":"API"},{"actId":"6","actName":"Code of Civil Procedure","alias":"CPC","dateOfEffect":"1909-01-01T00:00:00","actDetails":"Prescribes the procedure for filing and conducting civil suits in courts. The Code of Civil Procedure, 1908 (CPC) is the primary procedural law governing civil administration in India. It outlines the processes for filing lawsuits, hearing disputes, and executing decrees. It ensures that substantive civil rights are enforced fairly and consistently across the country.","imagePath":"\u002Fuploads\u002Fact-masters\u002F7cbd7d3691304878ac10e492f03e851e_CPC.jpg","actImage":"null","legalCategoryId":"6","createdOn":"2026-07-12T10:57:42.9971265","createdBy":"API","modifiedOn":"2026-07-20T10:16:10.5874089","modifiedBy":"API"},{"actId":"7","actName":"Limitation Act, 1963","alias":"Limitation Act,","dateOfEffect":"1964-01-01T00:00:00","actDetails":"The law of limitation has been prescribed as the time limit which is given for different suits & proceedings to the aggrieved person within which they can approach the court for redress or justice. The basic concept of limitation is relating to fixing or prescribing of the time period for barring legal actions.","imagePath":"\u002Fuploads\u002Fact-masters\u002F5cbc04c26b1e43ea85d16a1cc8646e7c_LA.jpg","actImage":"null","legalCategoryId":"6","createdOn":"2026-07-12T10:59:39.3725923","createdBy":"API","modifiedOn":"2026-07-20T10:20:24.7690446","modifiedBy":"API"},{"actId":"8","actName":"Registration Act, 1908","alias":"Registration Act","dateOfEffect":"1908-01-01T00:00:00","actDetails":"The Registration Act, 1908 is a consolidated Indian law that regulates the official recording of legal documents to ensure their authenticity, prevent property fraud, and maintain an accessible public record of rights and titles .Provides for compulsory registration of certain documents relating to immovable property.","imagePath":"\u002Fuploads\u002Fact-masters\u002F5eabb3d1b8744b8bb8bceab75ceb96f4_fundamental_of_reg_act1.jpg","actImage":"null","legalCategoryId":"6","createdOn":"2026-07-12T11:00:59.1996443","createdBy":"API","modifiedOn":"2026-07-20T10:43:13.7527534","modifiedBy":"API"},{"actId":"9","actName":"The Arbitration and Conciliation Act, 1996","alias":"ADR","dateOfEffect":"1996-08-16T00:00:00","actDetails":"The Arbitration and Conciliation Act, 1996 is India’s primary legislation governing Alternative Dispute Resolution (ADR). It provides a framework for domestic arbitration, international commercial arbitration, the enforcement of foreign arbitral awards, and non-binding conciliation to help parties settle disputes outside of traditional courts","imagePath":"\u002Fuploads\u002Fact-masters\u002F0f31febd521447d2a788b7bffcd9f875_ADRJ.jpg","actImage":"null","legalCategoryId":"6","createdOn":"2026-07-17T06:39:09.6672973","createdBy":"API","modifiedOn":"2026-07-20T11:02:59.2260623","modifiedBy":"API"}],"h":{},"s":200,"st":"OK","u":"https:\u002F\u002Femployeesapi.runasp.net\u002Fapi\u002FActMasters","rt":"json"},"3cd652065797c5af8eca51be21dcd585e5e5da19e3b4e90b6cd4dd23edd8f0ad":{"b":[{"sectionId":"6","actId":"2","sectionNo":"3","chapterName":"CHAPTER I OF THE COMMUNICATION, ACCEPTANCE AND REVOCATION OF PROPOSALS","bareAct":"Communication, acceptance and revocation of proposals.","meaning":"\u003Cblockquote>\u003Cp class=\"PDq2pG_selectionAnchorContainer\">Whenever a person makes an offer, accepts an offer, or withdraws (revokes) an offer or acceptance, it must be communicated by words, writing, conduct, or any act or omission that shows an intention to communicate or actually communicates it to the other person.\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003C\u002Fblockquote>\n\u003Cp>\u003C\u002Fp>","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 3 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     prescribe the legal mode of communicating an offer, acceptance, or\n     revocation. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that both parties are aware of each other's intentions. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid misunderstandings and disputes in the formation of contracts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     recognize that communication may occur through words, writing, or conduct,\n     not only by formal documents.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Communication of Proposal\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sends a letter to B offering to sell his car for\n?5,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The letter is the communication of the proposal.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Communication of Acceptance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B receives the letter and sends a reply accepting the offer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B's reply communicates the acceptance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Communication by Conduct\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A enters a self-service restaurant.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">He selects food and pays at the counter.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">His conduct communicates acceptance of the restaurant's\noffer to sell the food.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Communication of Revocation\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sends an offer to B on Monday.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">On Tuesday, A sends another letter withdrawing the offer\nbefore B accepts it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The withdrawal is a communication of revocation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"7","actId":"2","sectionNo":"4","chapterName":"CHAPTER I OF THE COMMUNICATION, ACCEPTANCE AND REVOCATION OF PROPOSALS","bareAct":"Communication when complete.","meaning":"An offer, acceptance, or revocation does not become legally effective merely because it is made. It becomes effective only when the law considers the communication complete.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 4 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     determine the precise moment when communications become legally effective.\n     \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     identify when contractual rights and obligations arise. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     clarify when an offer, acceptance, or revocation can be withdrawn. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     reduce uncertainty and disputes regarding contract formation.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Communication of Proposal\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A posts a letter to B offering to sell his motorcycle.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B receives the letter on Friday.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The communication of the proposal is complete\n\u003Cb>when B receives the letter\u003C\u002Fb>, not when A posts it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Communication of Acceptance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sends an offer to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B posts a letter accepting the offer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">Against\n     A (the proposer): Acceptance is complete \u003Cb>when B posts the acceptance\n     letter\u003C\u002Fb>. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Against\n     B (the acceptor): Acceptance is complete \u003Cb>when A receives the acceptance\n     letter\u003C\u002Fb>. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Communication of Revocation of Offer\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sends an offer to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Before B accepts, A sends a telegram or email withdrawing\nthe offer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B receives the revocation before posting acceptance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The offer stands revoked because the\nrevocation reached B before acceptance was dispatched.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Communication of Revocation of\nAcceptance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B posts a letter accepting A's offer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Before A receives the acceptance, B sends a faster\ncommunication (such as email or courier) revoking the acceptance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the revocation reaches A before or at the same time as\nthe acceptance letter, the revocation is effective.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"8","actId":"2","sectionNo":"5","chapterName":"CHAPTER I OF THE COMMUNICATION, ACCEPTANCE AND REVOCATION OF PROPOSALS","bareAct":"Revocation of proposals and acceptances.","meaning":"A person who makes an offer can withdraw it any time before the acceptance is dispatched by the other party. Similarly, the person accepting the offer can withdraw the acceptance before it reaches the offeror.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 5 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     give parties a fair opportunity to withdraw their offer or acceptance\n     before a contract becomes final. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     determine the last moment when revocation is legally permitted. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent uncertainty regarding the formation of contracts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     balance the rights of both the proposer and the acceptor.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Revocation of Proposal\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">On \u003Cb>1 January\u003C\u002Fb>, A sends a letter offering to sell his\ncar to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">On \u003Cb>3 January\u003C\u002Fb>, before B posts his acceptance, A sends\na letter revoking the offer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B receives the revocation before posting acceptance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The revocation is valid because the offer was\nwithdrawn before acceptance was dispatched.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Proposal Cannot Be Revoked\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sends an offer to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B posts a letter accepting the offer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">After B posts the acceptance, A tries to withdraw the offer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The revocation is invalid because the\nacceptance had already been dispatched. A contract has been formed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Revocation of Acceptance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A offers to sell his laptop to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B posts a letter accepting the offer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Before A receives the acceptance letter, B sends an email\nwithdrawing his acceptance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The email reaches A before the acceptance letter.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The acceptance is validly revoked.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Acceptance Cannot Be Revoked\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B posts an acceptance letter.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The acceptance reaches A.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Afterwards, B attempts to withdraw the acceptance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The revocation is ineffective because the\nacceptance has already become complete against B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"9","actId":"2","sectionNo":"6","chapterName":"CHAPTER I OF THE COMMUNICATION, ACCEPTANCE AND REVOCATION OF PROPOSALS","bareAct":"Revocation how made.","meaning":"An offer does not remain open forever. It can end if the offer is withdrawn, if the time for acceptance expires, if required conditions are not fulfilled, or if the offeror dies or becomes mentally incapable and the other party learns of it before accepting.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 6 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\u003Cp class=\"MsoNormal\">\n\n\u003C\u002Fp>\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     specify the legal circumstances in which an offer comes to an end. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent offers from remaining open indefinitely. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect both the offeror and the offeree by providing certainty. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that contracts are formed only while a valid offer is still in\n     existence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\u003Cul type=\"disc\">\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Revocation by Notice\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The offeror may withdraw the offer by giving notice to the\nother party \u003Cb>before the offer is accepted\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A offers to sell his house to B for ?50 lakh.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Before B accepts, A sends a letter or email withdrawing the\noffer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The offer is revoked.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Revocation by Lapse of Time\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the offer specifies a time for acceptance, it\nautomatically expires after that time.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If no time is mentioned, the offer expires after a \u003Cb>reasonable\ntime\u003C\u002Fb>, depending on the circumstances.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A offers to sell his car and states that the offer is valid\nuntil \u003Cb>10 June\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B accepts on \u003Cb>15 June\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The offer has already lapsed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A offers to sell fresh fruits without specifying a time.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B accepts after one month.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Since fresh fruits are perishable, the offer\nhas lapsed after a reasonable time.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Revocation by Failure of a Condition Precedent\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the offer requires a condition to be fulfilled before\nacceptance, and the condition is not fulfilled, the offer is revoked.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A offers to employ B provided B submits a medical fitness\ncertificate before acceptance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B accepts without submitting the certificate.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The offer stands revoked because the\ncondition precedent was not fulfilled.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(D) Revocation by Death or Insanity of the Proposer\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the offeror dies or becomes of unsound mind, and the\nofferee knows this before accepting, the offer comes to an end.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A offers to sell his land to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Before B accepts, A dies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B learns of A's death and still sends acceptance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> No contract is formed because the offer was\nrevoked by death.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"10","actId":"2","sectionNo":"7","chapterName":"CHAPTER I OF THE COMMUNICATION, ACCEPTANCE AND REVOCATION OF PROPOSALS","bareAct":"Acceptance must be absolute.","meaning":"A person accepting an offer must agree to all its terms exactly as they are, without making any changes. The acceptance should also be communicated in the manner required by the offer, or in a usual and reasonable manner if no specific mode is prescribed.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 7 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     ensure that both parties agree to the same terms (\u003Cb>consensus ad idem\u003C\u002Fb>,\n     or \"meeting of minds\"). \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid disputes arising from conditional or altered acceptances. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide certainty regarding the manner in which acceptance should be\n     communicated. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     distinguish a valid acceptance from a counter-offer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Absolute Acceptance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A offers to sell his car to B for ?5,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B replies,\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\"I accept your offer.\"\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A valid contract is formed because the\nacceptance is absolute and unconditional.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Conditional Acceptance (Counter-Offer)\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A offers to sell his car to B for ?5,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B replies,\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\"I accept, provided you reduce the price to\n?4,80,000.\"\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is \u003Cb>not an acceptance\u003C\u002Fb>. It is a \u003Cb>counter-offer\u003C\u002Fb>,\nand no contract is formed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Acceptance in the Prescribed Manner\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A offers to sell his land to B and asks B to send acceptance\n\u003Cb>only by registered post\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B sends the acceptance by ordinary post.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A immediately objects and asks B to accept by registered\npost.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> No contract is formed until the prescribed\nmode is followed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(D) Failure to Object\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Using the same facts, if A receives the acceptance sent by\nordinary post but does \u003Cb>not object within a reasonable time\u003C\u002Fb>, A is deemed\nto have accepted that mode of communication.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A valid contract is formed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"11","actId":"2","sectionNo":"8","chapterName":"CHAPTER I OF THE COMMUNICATION, ACCEPTANCE AND REVOCATION OF PROPOSALS","bareAct":"Acceptance by performing conditions, or receiving consideration.","meaning":"If an offer asks you to do a particular act, and you perform that act, your conduct itself amounts to acceptance. No separate communication of acceptance is necessary.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 8 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     recognize acceptance by conduct or performance. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     facilitate contracts where acceptance is implied by actions rather than\n     words. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid unnecessary formalities when performance clearly indicates assent. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     give legal effect to unilateral offers, such as reward offers.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Reward for Finding Lost Property\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A publishes a notice:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\"?10,000 reward to anyone who finds and returns my lost\nlaptop.\"\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B finds the laptop and returns it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> By performing the required act, B has\naccepted the offer. A must pay the reward.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Reward for Information\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A announces a reward of ?50,000 for information leading to\nthe recovery of stolen jewellery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B provides the information, and the jewellery is recovered.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B accepts the offer by performance and is\nentitled to the reward.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Acceptance by Receiving Consideration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A offers to deliver goods to B on credit.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B receives and uses the goods without objection.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> By accepting the goods (the consideration), B\nis deemed to have accepted the proposal.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(D) Public Transport\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A bus operator offers transportation for a fare.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B boards the bus and pays the fare.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B accepts the offer through conduct, and a\ncontract is formed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"12","actId":"2","sectionNo":"9","chapterName":"CHAPTER I OF THE COMMUNICATION, ACCEPTANCE AND REVOCATION OF PROPOSALS","bareAct":"Promises, express and implied.","meaning":"If the parties clearly state or write their offer and acceptance, it is an express promise. If their actions or conduct show that they intended to make a contract, it is an implied promise.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 9 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     recognize both express and implied contracts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     give legal effect to agreements formed through conduct. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     facilitate everyday commercial and social transactions where no formal\n     words are used. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that genuine intentions of the parties are legally enforceable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Ch3 data-section-id=\"shyx9q\" data-start=\"2244\" data-end=\"2274\" class=\"PDq2pG_selectionAnchorContainer\">Illustration 1 – Taxi Ride\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fh3>\n\u003Cp data-start=\"2276\" data-end=\"2312\">A taxi driver parks at a taxi stand.\u003C\u002Fp>\n\u003Cp data-start=\"2314\" data-end=\"2376\">B enters the taxi and asks to be taken to the railway station.\u003C\u002Fp>\n\u003Cp data-start=\"2378\" data-end=\"2424\">The driver takes B there, and B pays the fare.\u003C\u002Fp>\n\u003Cp data-start=\"2426\" data-end=\"2494\">\u003Cstrong data-start=\"2426\" data-end=\"2437\">Result:\u003C\u002Fstrong> The promise is implied from the conduct of both parties.\u003C\u002Fp>\n\u003Chr data-start=\"2496\" data-end=\"2499\">\n\u003Ch3 data-section-id=\"1kd7f40\" data-start=\"2501\" data-end=\"2540\">Illustration 2 – Self-Service Store\u003C\u002Fh3>\n\u003Cp data-start=\"2542\" data-end=\"2621\">A customer picks up groceries in a supermarket and pays at the billing counter.\u003C\u002Fp>\n\u003Cp data-start=\"2623\" data-end=\"2652\">No express agreement is made.\u003C\u002Fp>\n\u003Cp data-start=\"2654\" data-end=\"2701\">\u003Cstrong data-start=\"2654\" data-end=\"2665\">Result:\u003C\u002Fstrong> The contract is implied by conduct.\u003C\u002Fp>\n\u003Chr data-start=\"2703\" data-end=\"2706\">\n\u003Ch3 data-section-id=\"1q4oxf\" data-start=\"2708\" data-end=\"2746\">Illustration 3 – Written Agreement\u003C\u002Fh3>\n\u003Cp data-start=\"2748\" data-end=\"2797\">A signs a written agreement to lease a shop to B.\u003C\u002Fp>\n\u003Cp data-start=\"2799\" data-end=\"2826\">B signs the same agreement.\u003C\u002Fp>\n\u003Cp data-start=\"2828\" data-end=\"2867\">\u003Cstrong data-start=\"2828\" data-end=\"2839\">Result:\u003C\u002Fstrong> This is an express promise.\u003C\u002Fp>\n\u003Chr data-start=\"2869\" data-end=\"2872\">\n\u003Ch3 data-section-id=\"13o7y4x\" data-start=\"2874\" data-end=\"2910\">Illustration 4 – Online Purchase\u003C\u002Fh3>\n\u003Cp data-start=\"2912\" data-end=\"2980\">A places an order on an e-commerce website and clicks \"Place Order.\"\u003C\u002Fp>\n\u003Cp data-start=\"2982\" data-end=\"3026\">The seller accepts and dispatches the goods.\u003C\u002Fp>\n\u003Cp data-start=\"3028\" data-end=\"3181\">\u003Cstrong data-start=\"3028\" data-end=\"3039\">Result:\u003C\u002Fstrong> Although the communication is electronic, the promises are generally \u003Cstrong data-start=\"3109\" data-end=\"3120\">express\u003C\u002Fstrong>, as they are conveyed through written digital communication.\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"13","actId":"2","sectionNo":"10","chapterName":"CHAPTER II OF CONTRACTS, VOIDABLE CONTRACTS AND VOID AGREEMENTS","bareAct":"What agreements are contracts.","meaning":"Every agreement is not a contract. An agreement becomes a contract only if it satisfies all the legal requirements laid down in the Indian Contract Act.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 10 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     specify the essential requirements of a valid contract. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     distinguish an agreement from a legally enforceable contract. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that contracts are entered into fairly and lawfully. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect parties from illegal, fraudulent, or void agreements.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Valid Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell his motorcycle to B for ?80,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B accepts the offer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Both are majors, act freely, and the sale is lawful.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A valid contract is formed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Minor's Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A, aged 17, agrees to sell his laptop to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The agreement is void because A is not\ncompetent to contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Illegal Object\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to pay B for supplying prohibited narcotic drugs.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The agreement is void because the object is\nunlawful.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – No Free Consent\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A threatens B to sell his property.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B signs due to fear.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract is voidable because the consent\nwas not free.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Contracts Requiring a Particular Form\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Some laws require contracts to be:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">In\n     writing, \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Registered,\n     or \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Attested\n     (witnessed). \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">Even if all the conditions of Section 10 are satisfied,\nfailure to comply with those statutory requirements may make the contract\nunenforceable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example:\u003C\u002Fb>\u003Cbr>\nCertain transfers of immovable property require registration under the \u003Cb>Registration\nAct, 1908\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Agreements Expressly Declared Void\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Even if there is free consent and lawful consideration,\nagreements specifically declared void by the Contract Act are not enforceable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example:\u003C\u002Fb> A wagering agreement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Agreements Forbidden by Law\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the consideration or object is illegal or opposed to\npublic policy, Section 10 does not validate the agreement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"14","actId":"2","sectionNo":"11","chapterName":"CHAPTER II  OF CONTRACTS, VOIDABLE CONTRACTS AND VOID   AGREEMENTS","bareAct":"Who are competent to contract.","meaning":"Not everyone can make a legally binding contract. A person can enter into a valid contract only if they are an adult (major), of sound mind, and not prohibited by law from contracting.","objective":"&nbsp; &nbsp; The objectives of Section 11 are:\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     ensure that only persons capable of understanding and performing\n     contractual obligations can enter into contracts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect minors, persons of unsound mind, and persons disqualified by law\n     from exploitation. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     promote fairness and certainty in contractual dealings. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     define the legal capacity required for a valid contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Minor's Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A (17 years old) agrees to purchase a laptop from B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The agreement is \u003Cb>void from the beginning\n(void ab initio)\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Person of Sound Mind\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A (25 years old), mentally healthy, agrees to sell his car\nto B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A valid contract is formed if the other\nrequirements of Section 10 are satisfied.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Unsound Mind\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A suffers from severe mental illness and is unable to\nunderstand the nature of the transaction.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">He signs an agreement to sell his house.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The agreement is not enforceable because A\nwas not competent at the time of contracting.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Temporary Unsoundness\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A suffers from mental illness but enters into a contract\nduring a period when he fully understands the transaction.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract is valid because competency is\njudged \u003Cb>at the time the contract is made\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"15","actId":"2","sectionNo":"12","chapterName":"CHAPTER II OF CONTRACTS, VOIDABLE CONTRACTS AND VOID AGREEMENTS","bareAct":"What is a sound mind for the purposes of contracting","meaning":"A person is of sound mind if, at the time of making the contract, they understand what they are agreeing to and can make a sensible decision about how it will affect them.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 12 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     ensure that contracts are entered into by persons who understand their\n     actions. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect persons who are mentally incapable of making informed decisions. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent unfair or exploitative contracts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide certainty about mental capacity at the time of contracting.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Valid Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A purchases a house after reading the agreement and\nunderstanding its legal consequences.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A is of sound mind. The contract is valid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Lucid Interval\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A, who has a recurring mental illness, signs a sale deed\nduring a period when doctors certify that he fully understands the transaction.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract is valid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Intoxication\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A consumes excessive alcohol and signs an agreement without\nunderstanding its contents.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract may not be enforceable if A was\nincapable of understanding the transaction.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – High Fever\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A, while suffering from a severe fever causing confusion,\nsigns a loan agreement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> If A could not understand the nature and\neffect of the contract, it is not valid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"16","actId":"2","sectionNo":"13","chapterName":"CHAPTER II :  OF CONTRACTS, VOIDABLE CONTRACTS AND VOID AGREEMENTS","bareAct":"“Consent” defined.","meaning":"Consent means that both parties clearly understand and agree to the same subject matter and the same terms of the contract.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 13 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     ensure that both parties have a common understanding of the contract. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     establish the principle of \u003Cb>consensus ad idem\u003C\u002Fb> (meeting of minds). \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent contracts based on misunderstanding or confusion. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide certainty and fairness in contractual relationships.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Valid Consent\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A offers to sell his \u003Cb>Honda City car (Registration No.\nUP65 AB 1234)\u003C\u002Fb> to B for ?6,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B accepts the offer for the same car at the same price.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Both parties agree on the same thing in the\nsame sense. There is valid consent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) No Consent Due to Mistake About the Subject Matter\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell his horse named \"Black Beauty.\"\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A intends to sell one horse, but B believes A is referring\nto another horse with a similar name.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> There is no agreement on the same subject\nmatter. No contract is formed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) No Consent Due to Misunderstanding\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A offers to sell \u003Cb>100 bags of rice\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B believes the offer is for \u003Cb>100 bags of wheat\u003C\u002Fb> and\naccepts.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The parties are not agreeing to the same\nthing in the same sense. There is no consent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(D) Auction Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">An auctioneer offers a painting for sale.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B bids ?50,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The auctioneer accepts the bid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Both parties agree to the same painting at\nthe same price. Consent exists.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"N\u002FA","caseStudyId":"0"},{"sectionId":"17","actId":"2","sectionNo":"14","chapterName":"CHAPTER II OF CONTRACTS, VOIDABLE CONTRACTS AND VOID AGREEMENTS","bareAct":"“Free consent” defined.","meaning":"Consent is free when a person agrees to a contract voluntarily, without force, pressure, deception, false statements, or mistake.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 14 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     ensure that contracts are entered into voluntarily. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect parties from unfair practices. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     promote honesty and fairness in contractual dealings. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide remedies where consent is obtained improperly.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Free Consent\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A offers to sell his car to B for ?6,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B willingly accepts after inspecting the car.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The consent is free.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Coercion\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A threatens B with physical harm unless B signs a loan\nagreement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract is voidable at B's option.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Fraud\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A knowingly sells a counterfeit painting as an original\nmasterpiece.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B purchases it relying on A's statement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract is voidable due to fraud.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Misrepresentation\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A honestly but incorrectly states that a plot of land\nmeasures 2,000 square metres.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B relies on that statement and purchases it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract is voidable due to\nmisrepresentation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Consent Given Voluntarily\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If none of the factors listed in Section 14 is present, the\nconsent is free.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Mere Commercial Pressure\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Ordinary commercial bargaining or negotiation is not\ncoercion or undue influence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example:\u003C\u002Fb> A refuses to reduce the price unless B\naccepts immediately.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Hard bargaining alone does not amount to lack\nof free consent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Unilateral Mistake\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A mistake by only one party generally does not make the\ncontract void, except in certain recognized situations.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example:\u003C\u002Fb> B miscalculates the market value of goods\nwithout any fault of A.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract generally remains valid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(D) Silence Is Not Fraud (General Rule)\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Silence does not ordinarily amount to fraud unless:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">there\n     is a duty to speak (for example, in contracts requiring utmost good\n     faith), or \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">silence\n     is equivalent to speech because of the circumstances.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","caseStudyId":"0"},{"sectionId":"18","actId":"2","sectionNo":"15","chapterName":"CHAPTER II OF CONTRACTS, VOIDABLE CONTRACTS AND VOID AGREEMENTS","bareAct":"“Coercion” defined.","meaning":"Coercion means forcing or pressuring someone to enter into a contract by threatening them, committing an illegal act, or unlawfully keeping or threatening to keep their property.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 15 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     protect people from being forced into contracts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that agreements are entered into voluntarily. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent the misuse of threats, violence, or unlawful detention of\n     property. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     uphold fairness and justice in contractual relationships.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Threat to Life\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A threatens to kill B unless B transfers his land.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B signs the transfer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The consent is obtained by coercion. The\ncontract is \u003Cb>voidable\u003C\u002Fb> at B's option.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Detention of Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A unlawfully refuses to return B's jewellery until B signs a\nloan agreement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The agreement is induced by coercion.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Threat Against Another Person\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A threatens to harm B's son unless B signs a guarantee.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B signs.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Section 15 applies because the threat was\nintended to induce B to enter into the agreement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – No Coercion\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A negotiates firmly and says,\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\"This is my final price. If you do not agree today, I\nwill sell the goods to someone else.\"\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is hard bargaining, not coercion.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Lawful Pressure\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Pressure that is legally permissible is not coercion.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example:\u003C\u002Fb> A bank lawfully initiates recovery\nproceedings against a borrower who has defaulted.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is not coercion.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Mere Commercial Pressure\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Strong bargaining or refusing to reduce the price is not\ncoercion.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example:\u003C\u002Fb> A refuses to sell below ?5 lakh.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> No coercion.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Moral or Emotional Pressure\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Emotional persuasion or family pressure, without an illegal\nact or threat, does not amount to coercion (though in some circumstances it may\nraise issues of undue influence under Section 16).\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example:\u003C\u002Fb> Parents persuade their adult child to buy a\nfamily business.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Mere persuasion is not coercion.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(D) Lawful Detention of Property\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If property is retained under a legal right (such as a\ncontractual lien), it is not coercion.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example:\u003C\u002Fb> A mechanic retains a vehicle until repair\ncharges are paid, where the law permits such retention.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is not coercion.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"19","actId":"2","sectionNo":"16","chapterName":"CHAPTER II :  OF CONTRACTS, VOIDABLE CONTRACTS AND VOID AGREEMENTS","bareAct":"“Undue influence” defined.","meaning":"\u003Cp class=\"MsoNormal\">\u003Cb>Section 16(1) – Meaning of Undue Influence\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If a person has power, authority, or strong influence over\nsomeone else and uses it to make them agree to a contract that benefits them\nunfairly, it is called \u003Cb>undue influence\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Section 16(2) – When a Person is Considered to be in a\nPosition to Dominate Another's Will\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A person is considered capable of dominating another's will\nin these situations:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(a) Real or Apparent Authority \u002F Fiduciary Relationship\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If one person has legal authority or is in a relationship of\ntrust with another, they can influence the other's decisions.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(b) Mental Capacity Affected\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A person may dominate another's will if the other person\ncannot think properly because of:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">Old\n     age \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Illness\n     \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Mental\n     weakness \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Physical\n     distress \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Intoxication\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Section 16(3) – Burden of Proof\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Col style=\"margin-top:0cm\" start=\"1\" type=\"1\">\n \u003Cli class=\"MsoNormal\">One\n     person was in a position to dominate the other's will, \u003Cb>and\u003C\u002Fb> \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">The\n     contract appears unfair, \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Fol>\n\n\u003Cp class=\"MsoNormal\">then \u003Cb>the law presumes undue influence\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The person who benefited from the contract must prove that\nthere was \u003Cb>no undue influence\u003C\u002Fb> and that the agreement was made freely.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 16 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     protect weaker or vulnerable persons from exploitation. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that contracts are made voluntarily. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent abuse of trust, confidence, or authority. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     maintain fairness and equity in contractual relationships.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Parent and Child\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">An aged father transfers all his property to his son because\nthe son misuses his position of trust.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The transfer may be set aside for undue\ninfluence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Doctor and Patient\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A doctor convinces a critically ill patient to sell valuable\nland for one-fourth of its market value.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract may be voidable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Lawyer and Client\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A lawyer purchases a client's property at a grossly\nundervalued price while advising the client.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This may amount to undue influence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – No Undue Influence\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A wealthy businessman negotiates with another experienced\nbusinessman.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Both bargain equally and voluntarily.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> No undue influence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Equal Bargaining Power\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If both parties negotiate on equal terms, there is no undue\ninfluence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example:\u003C\u002Fb> Two experienced businessmen negotiate a\nsale.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Mere Advice or Persuasion\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Giving honest advice or expressing an opinion does not\namount to undue influence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example:\u003C\u002Fb> A friend recommends buying a particular car.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Natural Love and Affection\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A gift made voluntarily out of affection, without abuse of\ninfluence, is not undue influence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example:\u003C\u002Fb> A father voluntarily gifts a house to his\ndaughter.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(D) Fair Transactions\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Even where a relationship of trust exists, if the contract\nis fair and voluntary, Section 16 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"20","actId":"2","sectionNo":"17","chapterName":"CHAPTER II  OF CONTRACTS, VOIDABLE CONTRACTS AND VOID   AGREEMENTS","bareAct":"“Fraud” defined.","meaning":"Fraud means intentionally deceiving another person so that they enter into a contract.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 17 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     prevent dishonest and deceptive practices in contracts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect parties from intentional misrepresentation. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure contracts are based on honesty and good faith. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide remedies where consent has been obtained by deception.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) False Statement Knowingly Made\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A knowingly makes a false statement as if it were true.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A tells B,\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\"This car has never met with an accident.\"\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A knows that the car has been badly damaged in an accident.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B buys the car.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is fraud.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Active Concealment\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A deliberately hides an important fact.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A paints over serious cracks in the walls of a house before\nselling it, intending to hide the defect.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is fraud.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Promise Without Intention to Perform\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A makes a promise with no intention of keeping it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to supply 1,000 bags of cement even though he\nnever intends to supply them.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This amounts to fraud.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(D) Any Other Deceptive Act\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Any conduct intended to mislead another person.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A changes the odometer reading of a car to show lower\nmileage before selling it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is fraud.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(E) Acts Declared Fraudulent by Law\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Certain acts or omissions are specifically declared\nfraudulent by statute.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A company knowingly issues false fi

nter\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Agreement Capable of Being Made Certain\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell B \u003Cb>100 bags of wheat at the market price\nprevailing on the date of delivery\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The market price can be objectively determined.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The agreement is valid because the price can\nbe made certain.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Trade Usage\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to supply B \u003Cb>one standard truckload of sand\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">In that trade, \"standard truckload\" has a\nwell-understood meaning.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The agreement is valid because the term can\nbe made certain.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Agreement Capable of Being Made Certain\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the uncertainty can be removed by objective evidence, the\nagreement is valid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Trade Usage\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Words having a recognized commercial meaning are not\nuncertain.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Terms like \u003Cb>FOB\u003C\u002Fb>, \u003Cb>CIF\u003C\u002Fb>, or other established\ntrade expressions have accepted legal meanings.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Market Price\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A contract referring to the prevailing market price is valid\nbecause the price can be determined.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(D) Formula for Determination\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the agreement provides a clear formula for fixing the\nprice or quantity, it is not void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\"The price shall be the average market rate published\nby the Agricultural Produce Market Committee on the date of delivery.\"\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"34","actId":"2","sectionNo":"30","chapterName":"CHAPTER II OF CONTRACTS, VOIDABLE CONTRACTS AND VOID AGREEMENTS","bareAct":"Agreements by way of wager, void. Exception in favour of certain prizes for horse-racing. Section 294A of the Indian Penal Code not affected.","meaning":"A wager is an agreement where two persons bet on the outcome of an uncertain future event. The winner receives money or something valuable, and the loser pays it. Such agreements are void.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 30 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     discourage gambling and speculative betting through civil contracts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent courts from enforcing wagering agreements. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     distinguish wagering agreements from genuine commercial contracts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect public interest by denying legal enforcement of bets.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Cricket Match Bet\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A and B bet ?5,000 on the result of a cricket match.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The agreement is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Election Bet\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to pay B ?20,000 if a particular candidate wins an\nelection.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The agreement is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Rainfall Bet\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to pay B ?2,000 if it rains tomorrow.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B promises to pay A ?2,000 if it does not rain.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The agreement is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Insurance Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A purchases a life insurance policy on his own life.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is \u003Cb>not\u003C\u002Fb> a wagering agreement\nbecause A has an \u003Cb>insurable interest\u003C\u002Fb> in his own life.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Share Trading\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A purchases shares expecting their price to increase.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is \u003Cb>not\u003C\u002Fb> a wagering agreement if\nthere is a genuine intention to buy and sell the shares. However, a transaction\nentered into purely as a bet on price movements without any intention of actual\ndelivery may be treated differently depending on the applicable law and facts.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>Horse Race Prize\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A subscription or contribution towards a \u003Cb>horse race prize\nof ?500 or more\u003C\u002Fb> is \u003Cb>not rendered unlawful\u003C\u002Fb> by Section 30.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Several persons contribute money towards a horse race prize\nof ?1,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contribution is valid under the statutory\nexception.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Note:\u003C\u002Fb> The exception is limited. It does \u003Cb>not\u003C\u002Fb> mean\nthat all betting on horse races is enforceable; it only saves certain\nsubscriptions or contributions for prizes.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"35","actId":"2","sectionNo":"31","chapterName":"CHAPTER III OF CONTINGENT CONTRACTS","bareAct":"“Contingent contract” defined.","meaning":"A contingent contract is a contract whose performance depends on the happening or non-happening of a future uncertain event that is collateral (incidental) to the contract.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 31 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     define what constitutes a contingent contract. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     recognize contracts whose performance depends on uncertain future events. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     distinguish contingent contracts from wagering agreements. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide the basis for Sections 32 to 36, which explain when such contracts\n     can be enforced or become void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – House Sale\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell his house to B \u003Cb>if A receives a\ngovernment transfer order\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract depends on an uncertain\ncollateral event and is a contingent contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Insurance Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">An insurance company promises to compensate A \u003Cb>if A's\nfactory is damaged by fire\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is a contingent contract because payment\ndepends on the uncertain event of a fire.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Marriage Event\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to pay B ?5,00,000 \u003Cb>if B marries before the age\nof 30\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract depends on an uncertain future\nevent and is contingent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Export Licence\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to supply machinery to B \u003Cb>if the Government\ngrants an export licence\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The grant of the licence is a collateral\nuncertain event, making it a contingent contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Business Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to purchase goods from B \u003Cb>if B obtains an import\npermit\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract is contingent because\nperformance depends on obtaining the permit.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Absolute Contracts\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Where performance is unconditional and does not depend on\nany uncertain event.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell his car to B for ?6,00,000, payable\ntomorrow.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is an ordinary contract, not a\ncontingent contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Wagering Agreements\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the parties merely bet on an uncertain event without any\ngenuine commercial interest, the agreement is governed by \u003Cb>Section 30\u003C\u002Fb>,\nnot Section 31.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Impossible Events\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the event is impossible from the beginning, the contract\nis governed by \u003Cb>Section 36\u003C\u002Fb>, not Section 31 alone.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"36","actId":"2","sectionNo":"32","chapterName":"CHAPTER III OF CONTINGENT CONTRACTS","bareAct":"Enforcement of contracts contingent on an event happening","meaning":"If a contract depends on a future uncertain event happening, it can be enforced only after that event actually happens.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 32 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     determine when contingent contracts become enforceable. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent enforcement before the agreed contingency occurs. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide certainty regarding the rights and obligations of the parties. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     declare contingent contracts void when the contingent event becomes\n     impossible.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Insurance Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">An insurance company promises to compensate A if his\nwarehouse is damaged by fire.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A fire occurs.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The insurance company must perform the\ncontract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Government Licence\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to purchase machinery from B if B obtains an import\nlicence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The licence is granted.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes enforceable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Impossible Event\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to purchase B's land if B obtains environmental\nclearance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The project is permanently prohibited by law.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Marriage Contingency\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to pay B ?5,00,000 if B marries before reaching\nthe age of 30.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B marries at the age of 28.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A must pay B as agreed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Sporting Event\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to pay B ?2,00,000 if India's cricket team wins the\nWorld Cup.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">India wins the tournament.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes enforceable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Note:\u003C\u002Fb> If this arrangement is merely a bet with no\ngenuine commercial interest, it may instead be a wagering agreement under \u003Cb>Section\n30\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Absolute Contracts\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Contracts that do not depend on any uncertain event are not\ngoverned by Section 32.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell his motorcycle to B for ?80,000 tomorrow.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is an ordinary contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Contracts Dependent on an Event Not Happening\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Such contracts are governed by \u003Cb>Section 33\u003C\u002Fb>, not\nSection 32.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Impossible Event from the Beginning\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the event was impossible at the time the contract was\nmade, \u003Cb>Section 36\u003C\u002Fb> applies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"37","actId":"2","sectionNo":"33","chapterName":"CHAPTER III OF CONTINGENT CONTRACTS","bareAct":"Enforcement of contracts contingent on an event not happening.","meaning":"If a contract says that something will happen only if a certain future event does not happen, the contract becomes enforceable only when it becomes impossible for that event to happen.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 33 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     determine when contracts depending on the \u003Cb>non-happening\u003C\u002Fb> of an\n     uncertain event become enforceable. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide certainty regarding the rights of the parties. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that courts do not enforce contingent contracts before the\n     contingency is finally resolved. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     complement Section 32, which deals with the \u003Cb>happening\u003C\u002Fb> of an\n     uncertain event.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Marriage\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to pay B ?5,00,000 \u003Cb>if C does not marry before\nthe age of 30\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C dies at the age of 28.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Since C can never marry before turning 30, the event becomes\nimpossible.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A must pay B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Government Licence\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to purchase B's factory \u003Cb>if B does not obtain an\nenvironmental clearance\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The Government permanently rejects the application.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes enforceable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Sporting Event\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to pay B ?1,00,000 \u003Cb>if India does not qualify\nfor the World Cup\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">India is officially eliminated from qualification.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes enforceable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Export Permit\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to purchase machinery \u003Cb>if B does not receive an\nexport licence\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The Government finally rejects the licence application.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes enforceable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Contracts Depending on the Happening of an Event\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">These are governed by \u003Cb>Section 32\u003C\u002Fb>, not Section 33.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Absolute Contracts\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Contracts that do not depend on any uncertain event are not\ncontingent contracts.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell his car to B tomorrow.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Section 33 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Impossible Event from the Beginning\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the event was impossible at the time the contract was\nmade, \u003Cb>Section 36\u003C\u002Fb> applies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"38","actId":"2","sectionNo":"34","chapterName":"CHAPTER III OF CONTINGENT CONTRACTS","bareAct":"When event on which contract is contingent to be deemed impossible, if it is the future conduct of a living person","meaning":"If a contract depends on how a particular person will act in the future, and that person does something that makes the expected act impossible, the law treats the event as impossible. As a result, the contingent contract is decided accordingly.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 34 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     determine when a contingent contract becomes enforceable or void if it\n     depends on a person's future conduct. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid unnecessary waiting when the expected act has become impossible. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide certainty in contingent contracts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     complement Sections 32 and 33 by dealing with contingencies involving\n     human conduct.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Marriage\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to pay B ?5,00,000 \u003Cb>if C marries D\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Later, C marries E.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Since C cannot now marry D (during the subsistence of the\nexisting marriage), the event is treated as impossible.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contingent contract is decided as though\nthe event has become impossible.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Employment\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell his car to B \u003Cb>if C joins XYZ Ltd.\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Instead, C permanently joins another company under a\nlong-term contract and makes it impossible to join XYZ Ltd. within the\ncontemplated period.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The event is deemed impossible.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Government Appointment\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to give B ?1,00,000 \u003Cb>if C becomes a District\nMagistrate\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C resigns from the civil services and becomes permanently\nineligible for such appointment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The event becomes impossible.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Sports Selection\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to pay B ?50,000 \u003Cb>if C is selected for the Indian\ncricket team\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C permanently retires from professional cricket.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The event becomes impossible.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Event Still Possible\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the person can still perform the expected act, the\ncontract remains contingent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C has not yet accepted or rejected a job offer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The event is still possible.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Event Not Dependent on Human Conduct\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contingency depends on a natural event or another\nuncertain event instead of a person's conduct, \u003Cb>Sections 32 or 33\u003C\u002Fb> apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Temporary Difficulty\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the person's conduct creates only a temporary obstacle\nand the expected act is still reasonably possible, Section 34 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"39","actId":"2","sectionNo":"35","chapterName":"CHAPTER III OF CONTINGENT CONTRACTS","bareAct":"When contracts become void which are contingent on happening of specified event within fixed time. When contracts may be enforced, which are contingent on specified event not happening within fixed time.","meaning":"\u003Cp class=\"MsoNormal\">There are \u003Cb>two situations\u003C\u002Fb>:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(A) Contract depends on an event happening within a fixed\ntime\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">If\n     the event \u003Cb>happens within the specified time\u003C\u002Fb>, the contract becomes\n     enforceable. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">If\n     the time expires without the event happening, or the event becomes\n     impossible before the time expires, the contract becomes \u003Cb>void\u003C\u002Fb>. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Contract depends on an event not happening within a\nfixed time\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">If\n     the event does \u003Cb>not happen\u003C\u002Fb> within the specified time, the contract\n     becomes enforceable. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">If\n     it becomes certain before the expiry of the time that the event will not\n     happen, the contract can be enforced immediately.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 35 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     determine the enforceability of contingent contracts involving a \u003Cb>fixed\n     time limit\u003C\u002Fb>. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide certainty regarding the rights of the parties. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid unnecessary waiting once it becomes impossible or certain that the\n     event will or will not occur. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     supplement Sections 32, 33, and 34.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Government Approval\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to purchase B's land \u003Cb>if Government approval is\nreceived within six months\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Approval is granted within six months.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes enforceable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Time Expires\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to buy B's factory \u003Cb>if B obtains an export\nlicence within one year\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">One year passes without obtaining the licence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Event Becomes Impossible\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to purchase B's business \u003Cb>if B receives a\nmining licence within one year\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The Government permanently abolishes mining licences after\nthree months.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes void immediately.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Event Does Not Happen\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to pay B ?5,00,000 \u003Cb>if C does not marry within\nthree years\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Three years pass and C remains unmarried.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes enforceable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Impossible Before Time Expires\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to pay B ?5,00,000 \u003Cb>if C does not become a\npilot within five years\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C dies after one year.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes enforceable immediately\nbecause the event can no longer happen.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) No Fixed Time Mentioned\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract does not specify any time limit, \u003Cb>Sections\n32 or 33\u003C\u002Fb> apply instead.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Absolute Contracts\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Contracts that are unconditional are not governed by Section\n35.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell his car to B next week.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is an ordinary contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Impossible Event from the Beginning\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the event was impossible when the contract was made, \u003Cb>Section\n36\u003C\u002Fb> applies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"40","actId":"2","sectionNo":"36","chapterName":"CHAPTER III OF CONTINGENT CONTRACTS","bareAct":"Agreement contingent on impossible events void","meaning":"If a contract depends on an event that is impossible to happen, the agreement is void from the beginning, whether or not the parties knew that the event was impossible.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 36 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     prevent enforcement of contracts based on impossible events. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure certainty in contractual obligations. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid disputes over agreements that can never be performed. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     complete the legal framework governing contingent contracts (Sections\n     31–36).&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Dead Person Returning\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to pay B ?5,00,000 \u003Cb>if a person who has already\ndied comes back to life.\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The agreement is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Sun Rising in the West\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell his house to B \u003Cb>if the sun rises in the\nwest tomorrow.\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The agreement is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Impossible Government Approval\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to buy B's property \u003Cb>if a licence is granted\nunder a law that has already been repealed and can never be granted again.\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The agreement is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Legally Impossible Event\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to pay B ?2,00,000 \u003Cb>if B becomes eligible for\nan office that the Constitution permanently prohibits B from holding.\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The agreement is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Unknown Impossibility\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to pay B ?1,00,000 \u003Cb>if C, who had already died\nbefore the agreement, wins an election.\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Neither A nor B knew that C was already dead.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The agreement is still void because the event\nwas impossible from the beginning.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Possible but Uncertain Events\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the event is uncertain but possible, \u003Cb>Sections 31 to 35\u003C\u002Fb>\napply instead.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to sell his house to B if B obtains a bank loan.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is a valid contingent contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Ordinary Contracts\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Contracts that are not contingent on any uncertain event are\noutside Section 36.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell his motorcycle to B next week.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is an ordinary contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Event Becomes Impossible Later\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the event was possible when the contract was made but\nbecomes impossible later, \u003Cb>Section 32\u003C\u002Fb> or \u003Cb>Section 35\u003C\u002Fb> may apply,\ndepending on the facts.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"41","actId":"2","sectionNo":"37","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Obligation of parties to contracts.","meaning":"If you enter into a valid contract, you are legally bound to perform your promise or at least offer to perform it. If you fail to do so without a legal excuse, you may be liable for breach of contract.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 37 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     make contractual promises legally binding. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that parties perform their obligations. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect the rights of the parties to a contract. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     clarify that contractual obligations generally pass to legal\n     representatives after the death of a promisor, unless the contract is\n     personal in nature.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Sale of Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell 100 bags of rice to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A delivers the goods and B pays the price.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Both parties have performed the contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Loan Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A borrows ?2,00,000 from B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A must repay the amount on the due date.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A is legally bound to perform the promise.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Construction Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A contractor agrees to build a house for B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The contractor completes the work according to the\nagreement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contractor has performed the contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Death of Promisor\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell his land to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Before execution of the sale deed, A dies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A's legal representatives must complete the\nsale, unless the contract indicates otherwise.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Personal Service\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A renowned painter agrees to paint B's portrait.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Before starting the work, A dies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract ends because it required A's\npersonal artistic skill.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>Section 37 recognizes that performance may be dispensed\nwith or excused under the Indian Contract Act or any other law.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Some important situations include:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(A) Novation, Rescission or Alteration (Section 62)\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>The original contract is replaced, cancelled, or altered\nby mutual agreement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result: The original promise need not be performed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\u003Cb>\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fb>\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Waiver or Remission (Section 63)\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>The promisee voluntarily dispenses with or remits\nperformance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result: The promisor is excused to that extent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\u003Cb>\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fb>\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Void or Voidable Contracts\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>If the contract becomes void or is validly rescinded,\nperformance is no longer required.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\u003Cb>\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fb>\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(D) Personal Contracts\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Contracts requiring personal skill, knowledge, or\nqualifications end on the death of the promisor.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\u003Cb>\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fb>\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(E) Supervening Impossibility (Section 56)\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>If performance becomes impossible due to events\nrecognized by law, the parties are excused from performance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"42","actId":"2","sectionNo":"38","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Effect of refusal to accept offer of performance.","meaning":"If a person is ready and willing to perform the contract and makes a proper offer to perform, but the other party refuses to accept it, the person making the offer is not treated as having breached the contract.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 38 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     protect a party who is ready and willing to perform the contract. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent the promisee from taking advantage of their own refusal. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     define the conditions of a valid tender. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid unnecessary disputes where performance is wrongfully refused\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Delivery Refused\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to deliver furniture to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A arrives on the agreed date with the furniture.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B refuses to accept delivery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A is not liable for non-performance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Payment Refused\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A goes to B's office on the due date to repay a loan.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B refuses to accept the money.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A has made a valid tender and is not in\nbreach.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Conditional Offer\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A says, \"I will pay only if you reduce the\namount.\"\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The offer is conditional and is not a valid\ntender.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Wrong Time\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to deliver goods on 15th August but attempts\ndelivery one month earlier without B's consent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The tender may not be valid because it was\nnot made at the agreed time.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Joint Promisees\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes money jointly to B and C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A offers the entire amount to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The offer is legally treated as an offer to\nboth B and C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Invalid Tender\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the offer does not satisfy the legal conditions, Section\n38 does not protect the promisor.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Partial Performance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A tender of only part of the contractual obligation is\ngenerally not a valid tender unless the promisee agrees.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Conditional Offer\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">An offer subject to new conditions is not a valid tender.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(D) Wrong Time or Place\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">An offer made at an improper time or place does not amount\nto a valid tender.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"43","actId":"2","sectionNo":"39","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Effect of refusal of party to perform promise wholly","meaning":"If one party clearly refuses to perform the whole contract or makes it impossible for themselves to perform it, the other party has the right to cancel (terminate) the contract.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 39 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     protect the innocent party when the other party refuses to perform. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     allow the promisee to terminate the contract in case of complete refusal\n     or incapacity. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     recognize the concept of \u003Cb>anticipatory breach\u003C\u002Fb> (repudiation before\n     performance). \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent unnecessary losses by allowing the innocent party to act\n     immediately.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Refusal Before Due Date\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to build a house for B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">One month before work is to begin, A states that he will not\nperform the contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B may immediately terminate the contract and\nsue for damages.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Sale to Another Person\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A contracts to sell a painting to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Before delivery, A sells and delivers the painting to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A has disabled himself from performing. B may\nterminate the contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Employment Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to work for B for one year.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">After one month, A leaves the job permanently without\njustification.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B may treat the contract as terminated.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Promisee Continues Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A delays supplying machinery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B agrees to extend the delivery date.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B has accepted the continuation of the\ncontract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Construction Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A contractor abandons the construction project midway\nwithout lawful excuse.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The employer may terminate the contract and\nclaim damages.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Partial or Minor Breach\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the breach is minor and does not amount to refusal to\nperform the whole contract, Section 39 may not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Promisee Accepts the Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the promisee expressly or impliedly agrees to continue\nthe contract, they cannot later terminate it based on the earlier refusal.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Lawful Excuse\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If performance is excused by law (e.g., frustration under\nSection 56 or other statutory provisions), Section 39 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"44","actId":"2","sectionNo":"40","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Person by whom promise is to be performed.","meaning":"\u003Cp data-start=\"584\" data-end=\"723\">\u003Cstrong data-start=\"584\" data-end=\"723\">If the contract requires the personal skill, talent, or qualifications of the promisor, then only that person must perform the promise.\u003C\u002Fstrong>\u003C\u002Fp>\n\u003Cp data-start=\"728\" data-end=\"906\">\u003Cstrong data-start=\"728\" data-end=\"906\">If the contract does not require personal performance, the promisor or, after their death, their legal representatives may get the work done through another competent person.\u003C\u002Fstrong>\u003C\u002Fp>","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 40 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     determine who is legally required to perform a contract. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     distinguish between \u003Cb>personal contracts\u003C\u002Fb> and \u003Cb>ordinary contracts\u003C\u002Fb>.\n     \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that contracts involving personal skill are performed only by the\n     intended person. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     allow delegation of performance where personal performance is not\n     essential.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Personal Skill\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A renowned surgeon agrees to perform an operation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Another doctor cannot substitute themselves without the\npatient's consent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The surgeon must personally perform the\ncontract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Artistic Work\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A famous painter agrees to paint B's portrait.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A cannot ask another painter to do it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Personal performance is required.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Construction Work\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A contractor agrees to construct a building.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The contractor hires engineers and labourers to complete the\nwork.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract is validly performed because\npersonal performance is not essential.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Sale of Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to deliver 1,000 bags of cement to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A authorizes an employee to deliver them.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The delivery is valid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Sale of Property\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell land to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A dies before registration.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A's legal representatives execute the sale deed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract can be completed by the legal\nrepresentatives.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Personal Skill or Qualifications\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Where the contract depends on the promisor's personal\nability, it cannot be delegated.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Examples\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">Singing\n     \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Acting\n     \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Painting\n     a portrait \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Performing\n     surgery \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Delivering\n     a lecture by a specific expert \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Contract Expressly Requires Personal Performance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract specifically states that the promisor alone\nmust perform, delegation is not permitted.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Death of the Promisor in a Personal Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the promisor dies before performance of a personal\ncontract, the contract comes to an end.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"45","actId":"2","sectionNo":"41","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Effect of accepting performance from third person.","meaning":"If the person entitled to receive performance (promisee) voluntarily accepts the performance from someone other than the promisor, the promisee cannot later demand the same performance again from the original promisor.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 41 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     prevent double recovery by the promisee. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     recognize valid performance made by a third person when accepted by the\n     promisee. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     discharge the promisor once the obligation has been satisfactorily\n     fulfilled. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure fairness in contractual performance.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Payment of Debt\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes ?2,00,000 to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C pays the amount on A's behalf.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B accepts the payment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A is discharged from liability.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Delivery of Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to deliver machinery to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A authorizes C to deliver it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B accepts the machinery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B cannot later insist that A personally\ndeliver the machinery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Rent Paid by Family Member\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A is required to pay rent to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A's son pays the rent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B accepts the payment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B cannot demand the same rent again from A.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Loan Repayment\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A borrows money from B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A's friend repays the loan with B's consent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B accepts the payment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The debt is discharged.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Contractor's Payment\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A contractor owes money to a supplier.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The contractor's guarantor pays the amount.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The supplier accepts it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The supplier cannot recover the same amount\nagain from the contractor, though rights between the contractor and guarantor\nmay continue under other laws.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Performance Not Accepted\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the promisee refuses to accept the third person's\nperformance, Section 41 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C offers to pay A's debt.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B refuses to accept C's payment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A remains liable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Partial Performance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the promisee accepts only part of the obligation, the\nremaining obligation may still be enforceable, depending on the terms of the\ncontract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Performance Without Authority (Where Personal\nPerformance Is Required)\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract requires the promisor's personal performance\n(Section 40), performance by a third person may not discharge the promisor\nunless the promisee agrees.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A famous singer contracts to perform at B's concert.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Another singer performs instead without B's consent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Section 41 does not protect A because the\ncontract required personal performance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"46","actId":"2","sectionNo":"42","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Devolution of joint liabilities.","meaning":"If two or more people jointly promise to do something, they are all responsible for performing it together. If one of them dies, the surviving promisors and the deceased person's legal representative must perform the promise together. If all the promisors die, their legal representatives become jointly responsible for performing the promise.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 42 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     determine the liability of joint promisors. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that contractual obligations continue despite the death of one or\n     more promisors. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect the promisee by

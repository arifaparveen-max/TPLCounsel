57\">\n\u003Ch3 data-section-id=\"racxa5\" data-start=\"1159\" data-end=\"1187\">Example 2 – Gift of Land\u003C\u002Fh3>\n\u003Cp data-start=\"1189\" data-end=\"1251\">A gifts agricultural land to his daughter through a gift deed.\u003C\u002Fp>\n\u003Cp data-start=\"1253\" data-end=\"1327\">The gift deed must be registered for the transfer to be legally effective.\u003C\u002Fp>","exception":"\u003Cp data-start=\"1349\" data-end=\"1398\" class=\"PDq2pG_selectionAnchorContainer\">Registration is generally \u003Cstrong data-start=\"1375\" data-end=\"1393\">not compulsory\u003C\u002Fstrong> for:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"1400\" data-end=\"1640\">\n\u003Cli data-section-id=\"xh7uaf\" data-start=\"1400\" data-end=\"1458\">\nDocuments specifically exempted by the Registration Act.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"5iuobm\" data-start=\"1459\" data-end=\"1533\">\nCertain short-term lease agreements where the law provides an exemption.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"jcr0kw\" data-start=\"1534\" data-end=\"1640\">\nDocuments that do not create or transfer rights in immovable property requiring compulsory registration.\u003C\u002Fli>\u003C\u002Ful>","caseStudyId":"0"},{"sectionId":"130","actId":"8","sectionNo":"18","chapterName":"PART III OF REGISTRABLE DOCUMENTS","bareAct":"Documents of which registration is optional.—Any of the following documents may be registered under this Act","meaning":"Section 18 lists documents for which \u003Cstrong data-start=\"1756\" data-end=\"1784\">registration is optional\u003C\u002Fstrong> rather than compulsory. Although registration is not legally required for these documents, parties may voluntarily register them to strengthen their evidentiary value and maintain a public record.","objective":"\u003Cp data-start=\"2002\" data-end=\"2035\" class=\"PDq2pG_selectionAnchorContainer\">The objectives of Section 18 are:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"2037\" data-end=\"2321\">\n\u003Cli data-section-id=\"1cgeqt1\" data-start=\"2037\" data-end=\"2135\">\nTo provide flexibility for parties in transactions where compulsory registration is unnecessary.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1qpc7q6\" data-start=\"2136\" data-end=\"2202\">\nTo encourage voluntary registration for greater legal certainty.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1sa2pf2\" data-start=\"2203\" data-end=\"2259\">\nTo preserve documentary evidence for future reference.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1fvheeu\" data-start=\"2260\" data-end=\"2321\">\nTo reduce disputes regarding the authenticity of documents.\u003C\u002Fli>\u003C\u002Ful>","illustration":"\u003Ch3 data-section-id=\"1t9h8n7\" data-start=\"2345\" data-end=\"2377\" class=\"PDq2pG_selectionAnchorContainer\">Example 1 – Short-Term Lease\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fh3>\n\u003Cp data-start=\"2379\" data-end=\"2486\">A leases his shop to B for a period that does not require compulsory registration under the applicable law.\u003C\u002Fp>\n\u003Cp data-start=\"2488\" data-end=\"2563\">The parties may choose to register the lease, but registration is optional.\u003C\u002Fp>\n\u003Chr data-start=\"2565\" data-end=\"2568\">\n\u003Ch3 data-section-id=\"12fkzid\" data-start=\"2570\" data-end=\"2618\">Example 2 – Memorandum of Family Arrangement\u003C\u002Fh3>\n\u003Cp data-start=\"2620\" data-end=\"2711\">Members of a family execute a memorandum recording an already completed family arrangement.\u003C\u002Fp>\n\u003Cp data-start=\"2713\" data-end=\"2907\">Where the document merely records a past arrangement and does not itself create or extinguish rights in immovable property, registration may be optional depending on its nature and legal effect.\u003C\u002Fp>","exception":"\u003Cp data-start=\"2929\" data-end=\"2965\" class=\"PDq2pG_selectionAnchorContainer\">Section 18 does \u003Cstrong data-start=\"2945\" data-end=\"2952\">not\u003C\u002Fstrong> apply where:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"2967\" data-end=\"3229\">\n\u003Cli data-section-id=\"jyqtnw\" data-start=\"2967\" data-end=\"3072\">\nThe document falls within the categories listed under \u003Cstrong data-start=\"3023\" data-end=\"3037\">Section 17\u003C\u002Fstrong> requiring compulsory registration.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"6b3wu3\" data-start=\"3073\" data-end=\"3122\">\nAnother law specifically mandates registration.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1gu5l7w\" data-start=\"3123\" data-end=\"3229\">\nThe document itself creates or transfers rights in immovable property requiring compulsory registration.\u003C\u002Fli>\u003C\u002Ful>","caseStudyId":"0"},{"sectionId":"131","actId":"9","sectionNo":"8","chapterName":"CHAPTER I General provisions","bareAct":"Where this Part— (a) refers to the fact that the parties have agreed or that they may agree, or (b) in any other way refers to an agreement of the parties, that agreement shall include any arbitration rules referred to in that agreement.","meaning":"\u003Cp data-start=\"225\" data-end=\"484\" class=\"PDq2pG_selectionAnchorContainer\">Section 8 mandates that a judicial authority \u003Cstrong data-start=\"270\" data-end=\"311\">must refer the parties to arbitration\u003C\u002Fstrong> if the dispute before it is covered by a valid arbitration agreement, provided an application is made before submitting the first statement on the substance of the dispute.\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cp data-start=\"486\" data-end=\"639\">This provision reinforces the principle that courts should respect the parties' agreement to resolve disputes through arbitration rather than litigation.\u003C\u002Fp>","objective":"\u003Cp data-start=\"660\" data-end=\"692\" class=\"PDq2pG_selectionAnchorContainer\">The objectives of Section 8 are:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"694\" data-end=\"903\">\n\u003Cli data-section-id=\"1mysoym\" data-start=\"694\" data-end=\"745\">\nTo uphold the sanctity of arbitration agreements.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"cubmqx\" data-start=\"746\" data-end=\"794\">\nTo minimize unnecessary judicial intervention.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"pypu2z\" data-start=\"795\" data-end=\"848\">\nTo promote speedy and efficient dispute resolution.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"11e7q1i\" data-start=\"849\" data-end=\"903\">\nTo encourage party autonomy in choosing arbitration.\u003C\u002Fli>\u003C\u002Ful>","illustration":"\u003Ch3 data-section-id=\"1r63plu\" data-start=\"927\" data-end=\"962\" class=\"PDq2pG_selectionAnchorContainer\">Example 1 – Commercial Contract\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fh3>\n\u003Cp data-start=\"964\" data-end=\"1040\">A and B enter into a construction contract containing an arbitration clause.\u003C\u002Fp>\n\u003Cp data-start=\"1042\" data-end=\"1106\">A later files a civil suit against B regarding payment disputes.\u003C\u002Fp>\n\u003Cp data-start=\"1108\" data-end=\"1218\">Before filing its written statement, B requests the court to refer the dispute to arbitration under Section 8.\u003C\u002Fp>\n\u003Cp data-start=\"1220\" data-end=\"1309\">The court refers the parties to arbitration because a valid arbitration agreement exists.\u003C\u002Fp>\n\u003Chr data-start=\"1311\" data-end=\"1314\">\n\u003Ch3 data-section-id=\"baj0wq\" data-start=\"1316\" data-end=\"1348\">Example 2 – Supply Agreement\u003C\u002Fh3>\n\u003Cp data-start=\"1350\" data-end=\"1434\">A company sues its supplier despite an arbitration clause in their supply agreement.\u003C\u002Fp>\n\u003Cp data-start=\"1436\" data-end=\"1467\">The supplier invokes Section 8.\u003C\u002Fp>\n\u003Cp data-start=\"1469\" data-end=\"1573\">The court directs the parties to resolve the dispute through arbitration instead of continuing the suit.\u003C\u002Fp>","exception":"\u003Cp data-start=\"1595\" data-end=\"1626\" class=\"PDq2pG_selectionAnchorContainer\">Section 8 does not apply where:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"1628\" data-end=\"1938\">\n\u003Cli data-section-id=\"15leks4\" data-start=\"1628\" data-end=\"1668\">\nNo valid arbitration agreement exists.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"em9oka\" data-start=\"1669\" data-end=\"1724\">\nThe dispute is not covered by the arbitration clause.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"3xgdw8\" data-start=\"1725\" data-end=\"1820\">\nThe application is made after submitting the first statement on the substance of the dispute.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"pujrrv\" data-start=\"1821\" data-end=\"1938\">\nThe subject matter is non-arbitrable under Indian law (e.g., certain criminal, matrimonial, or insolvency matters).\u003C\u002Fli>\u003C\u002Ful>","caseStudyId":"0"},{"sectionId":"132","actId":"9","sectionNo":"34","chapterName":"CHAPTER VII Recourse against arbitral award","bareAct":"Application for setting aside arbitral award.—(1) Recourse to a Court against an arbitral award may be made only by an application for setting aside such award in accordance with sub-section (2) and sub-section (3).","meaning":"Section 34 provides the legal remedy for challenging an arbitral award before a competent court. It does \u003Cstrong data-start=\"2123\" data-end=\"2130\">not\u003C\u002Fstrong> permit an appeal on the merits; instead, the award may be set aside only on the limited grounds specified in the Act.","objective":"\u003Cp data-start=\"2269\" data-end=\"2302\" class=\"PDq2pG_selectionAnchorContainer\">The objectives of Section 34 are:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"2304\" data-end=\"2558\">\n\u003Cli data-section-id=\"yhi4nx\" data-start=\"2304\" data-end=\"2349\">\nTo ensure fairness in arbitral proceedings.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"o60xs3\" data-start=\"2350\" data-end=\"2420\">\nTo protect parties against awards affected by serious legal defects.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"18a230g\" data-start=\"2421\" data-end=\"2506\">\nTo maintain the finality of arbitral awards while allowing limited judicial review.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"735xt\" data-start=\"2507\" data-end=\"2558\">\nTo promote confidence in the arbitration process.\u003C\u002Fli>\u003C\u002Ful>","illustration":"\u003Ch3 data-section-id=\"18d931\" data-start=\"2582\" data-end=\"2614\" class=\"PDq2pG_selectionAnchorContainer\">Example 1 – No Proper Notice\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fh3>\n\u003Cp data-start=\"2616\" data-end=\"2724\">A party was not given proper notice of the appointment of the arbitrator and was unable to present its case.\u003C\u002Fp>\n\u003Cp data-start=\"2726\" data-end=\"2774\">The party files an application under Section 34.\u003C\u002Fp>\n\u003Cp data-start=\"2776\" data-end=\"2857\">If the court finds that natural justice was violated, it may set aside the award.\u003C\u002Fp>\n\u003Chr data-start=\"2859\" data-end=\"2862\">\n\u003Ch3 data-section-id=\"t7kzps\" data-start=\"2864\" data-end=\"2914\">Example 2 – Award Beyond Arbitration Agreement\u003C\u002Fh3>\n\u003Cp data-start=\"2916\" data-end=\"3008\">An arbitrator decides disputes that were never referred for arbitration under the agreement.\u003C\u002Fp>\n\u003Cp data-start=\"3010\" data-end=\"3067\">The affected party challenges the award under Section 34.\u003C\u002Fp>\n\u003Cp data-start=\"3069\" data-end=\"3163\">The court may set aside the award to the extent that it exceeds the arbitrator's jurisdiction.\u003C\u002Fp>","exception":"\u003Cp data-start=\"3185\" data-end=\"3238\" class=\"PDq2pG_selectionAnchorContainer\">An arbitral award cannot be set aside merely because:\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003Cul data-start=\"3240\" data-end=\"3399\">\n\u003Cli data-section-id=\"8h09in\" data-start=\"3240\" data-end=\"3301\">\nThe court disagrees with the arbitrator's findings of fact.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"14mqxb6\" data-start=\"3302\" data-end=\"3355\">\nAnother interpretation of the contract is possible.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"139e6ha\" data-start=\"3356\" data-end=\"3399\">\nA party is dissatisfied with the outcome.\n\u003C\u002Fli>\n\u003C\u002Ful>\n\u003Cp data-start=\"3401\" data-end=\"3473\">The award may generally be challenged only on statutory grounds such as:\u003C\u002Fp>\n\u003Cul data-start=\"3475\" data-end=\"3765\">\n\u003Cli data-section-id=\"lur9f6\" data-start=\"3475\" data-end=\"3507\">\nInvalid arbitration agreement.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"jxu2rj\" data-start=\"3508\" data-end=\"3565\">\nLack of proper notice or inability to present the case.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"eq5qox\" data-start=\"3566\" data-end=\"3612\">\nArbitrator exceeding the scope of authority.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1wk29g3\" data-start=\"3613\" data-end=\"3667\">\nProcedural irregularities affecting the proceedings.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"ungg3s\" data-start=\"3668\" data-end=\"3711\">\nConflict with the public policy of India.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"61uewo\" data-start=\"3712\" data-end=\"3765\">\nPatent illegality (where applicable under the Act).\u003C\u002Fli>\u003C\u002Ful>","caseStudyId":"0"}],"h":{},"s":200,"st":"OK","u":"https:\u002F\u002Femployeesapi.runasp.net\u002Fapi\u002FActSectionDtls","rt":"json"},"__nghData__":[{"t":{"0":"t0","3":"t1"},"c":{"0":[{"i":"t0","r":1}],"3":[]},"n":{"3":"hfn4"}},{},{"n":{"2":"hfn2"},"t":{"2":"t5"},"c":{"2":[]}},{"n":{"1":"0fn2","3":"1f2","13":"0fn3","14":"13f","15":"14f","39":"38fn"},"t":{"9":"t2","32":"t3","36":"t4"},"c":{"9":[],"32":[],"36":[]}},{"t":{"22":"t11","23":"t12"},"c":{"22":[{"i":"t11","r":1}],"23":[]}},{"c":{"30":[{"i":"c1978968470","r":1}]}}]}</script></body></html>

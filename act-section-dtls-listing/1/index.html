preserving the right to performance. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide continuity in the performance of joint contracts.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Joint Loan\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A, B, and C jointly borrow ?12,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">They must jointly repay the amount.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> All are jointly liable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Death of One Borrower\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A, B, and C jointly borrow money.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A dies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B, C, and A's legal representative remain\njointly responsible.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Joint Sale Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A and B jointly agree to sell a property to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A dies before registration.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B and A's legal representative must complete\nthe sale.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Construction Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A, B, and C jointly agree to construct a building.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B dies during construction.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A, C, and B's legal representative must\ncontinue the obligation, unless the contract is personal in nature.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Death of All Promisors\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A and B jointly promise to deliver machinery to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Both die before delivery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Their legal representatives must jointly\nperform the obligation, subject to the law and the nature of the contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Contrary Intention in the Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract specifically provides that only the original\npromisors must perform or excludes legal representatives, that intention\nprevails.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A contract expressly states that the obligation ends on the\ndeath of any promisor.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Section 42 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Personal Contracts\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract depends on the personal skill, talent, or\nqualifications of a joint promisor, the obligation may come to an end on their\ndeath.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Two famous musicians jointly agree to perform at a concert.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">One musician dies before the performance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract may be discharged because it\nrequired personal performance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Performance Excused by Law\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract is discharged under the Indian Contract Act\n(e.g., by impossibility under Section 56), Section 42 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"48","actId":"2","sectionNo":"43","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Any one of joint promisors may be compelled to perform. Each promisor may compel contribution. Sharing of loss by default in contribution.","meaning":"\u003Cblockquote data-start=\"885\" data-end=\"1158\">\u003Cp data-start=\"887\" data-end=\"1158\" class=\"PDq2pG_selectionAnchorContainer\">\u003Cstrong data-start=\"887\" data-end=\"1158\">If two or more people jointly promise to perform a contract, the promisee can recover the entire performance from any one or more of them. After one joint promisor performs more than their fair share, they can recover the excess amount from the other joint promisors.\u003C\u002Fstrong>\u003Cspan aria-hidden=\"true\" class=\"PDq2pG_selectionAnchor\">\u003C\u002Fspan>\u003C\u002Fp>\n\u003C\u002Fblockquote>\n\u003Cp data-start=\"1160\" data-end=\"1187\">This section protects both:\u003C\u002Fp>\n\u003Cul data-start=\"1188\" data-end=\"1378\">\n\u003Cli data-section-id=\"12yt65b\" data-start=\"1188\" data-end=\"1282\">\n\u003Cstrong data-start=\"1190\" data-end=\"1206\">The promisee\u003C\u002Fstrong>, by allowing them to recover the entire amount from any one joint promisor.\n\u003C\u002Fli>\n\u003Cli data-section-id=\"1k0wbet\" data-start=\"1283\" data-end=\"1378\">\n\u003Cstrong data-start=\"1285\" data-end=\"1316\">The joint promisor who paid\u003C\u002Fstrong>, by giving them a right to seek contribution from the others.&nbsp;\u003C\u002Fli>\n\u003C\u002Ful>","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 43 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     protect the promisee by making every joint promisor liable for the whole\n     obligation. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     simplify recovery of contractual obligations. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure fairness among joint promisors through the principle of\n     contribution. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     distribute losses fairly if one joint promisor cannot contribute.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Loan\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A, B, and C jointly borrow ?12,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">D sues only A.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A must pay the full amount.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Later, A may recover ?4,00,000 each from B and C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Construction Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Three contractors jointly agree to construct a building.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The employer recovers the full compensation from one\ncontractor after breach.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">That contractor can recover proportionate shares from the\nothers.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – One Joint Promisor Insolvent\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A, B, and C jointly owe ?6,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A pays the full amount.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B pays his ?2,00,000 share.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C is insolvent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The remaining loss is shared equally by A and B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Express Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A, B, and C agree that A alone will be liable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The contract specifically limits liability.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Section 43 does not apply because the parties\nagreed otherwise.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Partnership Debt\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Partners jointly borrow money for the business.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The creditor may recover the entire amount from any one\npartner.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">That partner may recover contribution from the other\npartners according to law.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Contrary Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract expressly limits the liability of any joint\npromisor, that agreement prevails.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Several (Separate) Promises\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the parties make separate promises rather than a joint\npromise, Section 43 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Personal Contracts\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract is personal in nature and cannot legally\ncontinue, Section 43 may not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"49","actId":"2","sectionNo":"44","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Effect of release of one joint promisor","meaning":"\u003Cblockquote data-start=\"576\" data-end=\"745\">\u003Cp data-start=\"578\" data-end=\"745\">\u003Cstrong data-start=\"578\" data-end=\"745\">If two or more people jointly make a promise, and the promisee releases (forgives) one of them, the other joint promisors are still liable to perform the contract.\u003C\u002Fstrong>\u003C\u002Fp>\n\u003C\u002Fblockquote>\n\u003Cp data-start=\"747\" data-end=\"752\">Also,\u003C\u002Fp>\n\u003Cblockquote data-start=\"754\" data-end=\"920\">\n\u003Cp data-start=\"756\" data-end=\"920\">\u003Cstrong data-start=\"756\" data-end=\"920\">The joint promisor who has been released by the promisee may still be required to contribute to the other joint promisors if they perform more than their share.\u003C\u002Fstrong>\u003C\u002Fp>\n\u003C\u002Fblockquote>","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 44 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     protect the rights of the promisee against the remaining joint promisors. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent the discharge of all joint promisors merely because one has been\n     released. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     preserve the right of contribution among joint promisors. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure fairness in the distribution of liability.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Joint Loan\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A, B, and C jointly borrow ?12,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The lender releases A.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The lender may still recover the balance from B and C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Sale Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A, B, and C jointly promise to deliver goods.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The buyer releases A.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B and C remain responsible for delivery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Contribution\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A, B, and C jointly owe ?6,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The creditor releases A.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B pays the full amount.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B may recover A's and C's shares from them, according to the\nlaw of contribution.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Partnership Debt\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Three partners jointly owe money.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The creditor releases one partner.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The other partners remain liable for the debt.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Express Release of All\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The creditor expressly releases A, B, and C from liability.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The entire obligation is discharged.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) All Joint Promisors Are Released\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the promisee releases \u003Cb>all\u003C\u002Fb> joint promisors, the\ncontract is discharged.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Novation (Section 62)\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If a new contract replaces the old contract, the original\nliability comes to an end.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Express Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract specifically states that releasing one joint\npromisor also releases the others, that agreement will prevail.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"50","actId":"2","sectionNo":"45","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Devolution of joint rights.","meaning":"If a promise is made to two or more people together (joint promisees), they must jointly claim performance during their lifetime. If one of them dies, the surviving promisee(s) and the deceased's legal representative jointly get the right to enforce the contract. If all the promisees die, their legal representatives jointly inherit that right.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 45 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     determine who has the legal right to enforce a joint promise. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure continuity of contractual rights after the death of a joint\n     promisee. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect the interests of the surviving promisees and legal\n     representatives. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid disputes regarding ownership of contractual rights.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Joint Loan\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A borrows ?10,00,000 jointly from B and C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Both B and C can jointly demand repayment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Death of One Promisee\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell land jointly to B and C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B dies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C and B's legal representative jointly may\nenforce the sale.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Insurance Claim\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">An insurance company promises to pay compensation jointly to\ntwo nominees.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">One nominee dies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The surviving nominee and the deceased\nnominee's legal representative jointly become entitled to claim the amount.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Sale of Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to deliver goods jointly to B, C, and D.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">D dies before delivery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B, C, and D's legal representative jointly\nhave the right to demand delivery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Death of All Promisees\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes money jointly to B and C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Both B and C die.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Their legal representatives jointly may\nrecover the money.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Contrary Intention in the Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract expressly provides a different arrangement,\nthat arrangement prevails.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The contract states that on the death of one promisee, the\nsurvivor alone shall have the right to enforce the contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Section 45 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Separate Rights\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If each promisee has a separate and independent right\ninstead of a joint right, Section 45 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Personal Rights\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Where the right is personal and cannot legally pass to legal\nrepresentatives, Section 45 may not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"51","actId":"2","sectionNo":"46","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Time for performance of promise, when no application is to be made and no time is specified","meaning":"If a contract does not mention when a promise must be performed, and the promisor is expected to perform without being asked, the promisor must perform within a reasonable time.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 46 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     prevent unnecessary delay in performing contracts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure contracts are performed even when no time is specified. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect the interests of both the promisor and the promisee. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     allow courts to determine a reasonable time based on the facts of each\n     case.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Sale of Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell 100 bags of rice to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">No delivery date is mentioned.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A must deliver the rice within a reasonable\ntime.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Construction Work\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to repair B's house.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The contract does not specify the completion date.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A must complete the repairs within a\nreasonable time considering the nature of the work.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Machinery Supply\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to supply machinery to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">No delivery date is fixed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Delivery must be made within a reasonable\ntime according to normal business practice.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Property Documents\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to hand over property documents to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">No date is specified.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A must deliver the documents within a\nreasonable time.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Commercial Transaction\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to supply perishable fruits to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">No time is specified.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Since the goods are perishable, a reasonable\ntime would be much shorter than for non-perishable goods.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Time is Expressly Mentioned\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract specifies a time for performance, \u003Cb>Section\n46 does not apply\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Instead, the contract must be performed at the agreed time.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Promisee Must Make a Demand\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract requires the promisee to request or demand\nperformance, \u003Cb>Section 47\u003C\u002Fb> applies instead.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to repay a loan whenever B asks for it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Section 47 applies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Performance Excused by Law\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If performance is legally excused (e.g., under Section 56\ndue to impossibility), Section 46 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"52","actId":"2","sectionNo":"47","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Time and place for performance of promise, where time is specified and no application to be made.","meaning":"If a contract fixes a specific date for performance, the promisor must perform on that date without waiting for the promisee to ask. The promisor may perform at any reasonable time during normal business hours at the proper place.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 47 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     clarify the time and place of performance when a specific date is fixed. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid disputes regarding the exact time of performance. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that the promisor performs without waiting for a request from the\n     promisee. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide certainty in commercial transactions.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Delivery of Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to deliver goods to B on \u003Cb>1st July\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A delivers the goods at \u003Cb>2:00 p.m.\u003C\u002Fb> on that day.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The performance is valid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Repayment of Loan\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises to repay ?5,00,000 to B on \u003Cb>30th September\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A offers payment at B's office during business hours.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The performance is proper.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Property Documents\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to hand over title deeds to B on \u003Cb>10th October\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A hands them over at B's office during working hours.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract is properly performed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Late Night Delivery\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A attempts to deliver goods at \u003Cb>11:30 p.m.\u003C\u002Fb> on the\nspecified date.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B refuses to accept them.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B is justified in refusing because the\ndelivery was not made during the usual business hours.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Wrong Place\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to deliver machinery at B's factory.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Instead, A takes it to B's residence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is not proper performance unless B\nagrees.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Promisee Must Make a Demand\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract requires the promisee to request\nperformance, \u003Cb>Section 48\u003C\u002Fb> applies instead.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) No Time Specified\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If no date for performance is specified, \u003Cb>Section 46\u003C\u002Fb>\napplies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Different Time Agreed by Parties\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the parties agree to perform at a different time or\nplace, that agreement prevails.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"53","actId":"2","sectionNo":"48","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Application for performance on certain day to be at proper time and place","meaning":"If the contract says that the promisee must ask for performance on a particular day, then it is the promisee's responsibility to make that request at the proper place and during normal business hours.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 48 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     define the duty of the promisee when performance depends on a request. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that the promisor gets a fair opportunity to perform. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid disputes arising from the promisee's failure to ask for performance.\n     \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     fix the proper time and place for making such a request.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Collection of Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell machinery to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The contract states that B must collect it on \u003Cb>1st August\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B visits A's warehouse during business hours and requests\ndelivery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A must deliver the machinery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Repayment on Demand\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to repay a loan on \u003Cb>30th September\u003C\u002Fb>, provided\nB comes to collect it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B visits A's office on that day during business hours.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A must make the payment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Failure to Apply\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A is ready to deliver goods.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B never comes to collect them.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A is not liable for non-performance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Wrong Place\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B requests delivery at A's home instead of A's business\npremises.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The application may not be valid unless the\ncontract allows it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Late Request\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B requests performance after business hours.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A refuses.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A's refusal is justified because the request\nwas not made at the proper time.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Promisor Must Perform Without Application\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the promisor has agreed to perform without any request\nfrom the promisee, \u003Cb>Section 47\u003C\u002Fb> applies instead.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) No Time Specified\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If no date for performance is specified, \u003Cb>Section 46\u003C\u002Fb>\napplies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Parties Agree Otherwise\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract provides a different procedure for\nrequesting performance, that agreement prevails.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"54","actId":"2","sectionNo":"49","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Place for performance of promise, where no application to be made and no place fixed for performance.","meaning":"If the contract does not mention where the promise should be performed, and the promisor has to perform without being asked, the promisor must contact the promisee and ask them to choose a reasonable place for performance. The promisor must then perform at that place.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 49 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     determine the place of performance when the contract is silent. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid disputes about where performance should take place. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     place the responsibility on the promisor to initiate the process of fixing\n     a place. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure smooth and fair performance of contracts.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Delivery of Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell 100 bags of rice to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The contract does not specify the delivery location.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A asks B to choose a place.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B chooses his warehouse.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A must deliver the rice to B's warehouse.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Payment of Money\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to repay ?5,00,000 to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">No place of payment is mentioned.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A asks B where payment should be made.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B asks A to pay at B's office.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A should pay at B's office.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Delivery of Property Documents\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to hand over title deeds to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">No place is specified.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A requests B to nominate a place.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B chooses a lawyer's office.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A must deliver the documents there.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Machinery Supply\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to supply machinery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">No delivery place is mentioned.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A asks B to specify a reasonable location.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B selects his factory.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Delivery should be made at the factory.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Failure to Ask\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A simply keeps the goods at his own warehouse without asking\nB to appoint a place.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A has not complied with Section 49 and cannot\nclaim proper performance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Place Already Specified\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract clearly mentions the place of performance,\nSection 49 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Promisee Must Make an Application\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract requires the promisee to request\nperformance, Section 48 applies instead.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Place Fixed by Law or Trade Usage\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the place of performance is determined by law,\nestablished trade practice, or the nature of the contract, Section 49 may not\napply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"55","actId":"2","sectionNo":"50","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Performance in manner or at time prescribed or sanctioned by promisee.","meaning":"If the promisee agrees to a different method of performance or allows performance at a different time, the promisor can perform accordingly, and such performance is legally valid.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 50 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     give flexibility to the parties in performing contracts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     allow the promisee to waive strict compliance with the original terms. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     recognize that contractual obligations can be performed in a mutually\n     accepted alternative manner or time. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid unnecessary disputes where the promisee voluntarily accepts a\n     different performance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Change of Delivery Place\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to deliver machinery to B's factory.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B later requests delivery to another warehouse.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A delivers to the new warehouse.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Valid performance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Extension of Time\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to complete construction by \u003Cb>30th June\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B grants an extension until \u003Cb>15th July\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A completes the work on \u003Cb>10th July\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The performance is valid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Different Mode of Payment\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to pay B by cheque.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B later requests payment by bank transfer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers the money electronically.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The payment is valid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Acceptance of Late Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A delivers goods three days late.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B accepts the delivery without protest.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B has sanctioned the delayed performance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Early Performance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to supply furniture on \u003Cb>20th August\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B asks A to deliver it on \u003Cb>15th August\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A complies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The performance is valid because B prescribed\nan earlier time.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Promisee Does Not Consent\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the promisee does not prescribe or sanction a different\nmanner or time, the promisor must follow the original contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Illegal or Impossible Performance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The promisee cannot authorize an illegal or impossible\nmethod of performance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A contract requires lawful delivery of goods.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B cannot approve delivery by an illegal means.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Rights of Third Parties\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If changing the manner or time of performance would\nadversely affect the legal rights of a third party, Section 50 may not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"56","actId":"2","sectionNo":"51","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Promisor not bound to perform, unless reciprocal promisee ready and willing to perform.","meaning":"\u003Cp class=\"MsoNormal\">If both parties have to perform their promises at the same\ntime, one party is not required to perform unless the other party is also ready\nand willing to perform their part.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 51 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     ensure fairness in contracts involving mutual obligations. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent one party from taking advantage of the other. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     require both parties to be ready and willing to perform simultaneously. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     reduce the risk of one party performing without receiving the agreed\n     return.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Sale of Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell 100 bags of rice to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Payment and delivery are to occur simultaneously.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B refuses to pay.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A need not deliver the rice.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Property Sale\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell land to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The sale deed and payment are to be completed on the same\nday.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B does not bring the purchase money.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A is not bound to execute the sale deed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Construction Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to construct a warehouse.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B agrees to make payment as construction reaches agreed\nstages.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B is not ready to make the agreed payment at a particular\nstage, A may suspend work corresponding to that stage, subject to the contract\nterms.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Exchange of Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to exchange machinery for B's vehicle.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Both deliveries are to occur simultaneously.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B does not bring the vehicle, A need not deliver the\nmachinery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Cash on Delivery\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to supply furniture on a \"cash on\ndelivery\" basis.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B refuses to pay on delivery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A is not bound to hand over the furniture.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Promises Are Not Simultaneous\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract requires one party to perform first and the\nother later, Section 51 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to construct a building first.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B agrees to pay after completion.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Here, the obligations are \u003Cb>successive\u003C\u002Fb>, not\nsimultaneous.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) One Party Waives Simultaneous Performance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If one party voluntarily performs first or agrees to a\ndifferent arrangement, Section 51 may not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Contract Provides Otherwise\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract expressly specifies a different sequence of\nperformance, that sequence must be followed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"57","actId":"2","sectionNo":"52","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Order of performance of reciprocal promises.","meaning":"If a contract states which party must perform first, the parties must follow that order. If the contract does not specify the order, the order will be decided based on the nature of the transaction and common business practice.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 52 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     determine the correct sequence of performance in contracts containing\n     reciprocal promises. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid disputes about who must perform first. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that contractual obligations are performed in a logical and\n     practical order. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     give effect to the intention of the parties or the nature of the\n     transaction.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Construction Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to build a warehouse for B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B agrees to pay after completion.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A performs first.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Printing Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to print books for B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B agrees to pay after receiving the books.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A prints and delivers the books first.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Repair Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to repair B's machinery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B agrees to pay after the repairs.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A must repair the machinery before demanding\npayment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Property Registration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to execute a sale deed after B obtains the\nnecessary government approval.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B must obtain the approval first because the\nnature of the transaction requires it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Software Development\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to develop software for B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The contract states that B will pay the balance after\ndelivery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A must deliver the software before becoming\nentitled to the balance payment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Simultaneous Performance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If both promises are to be performed at the same time, \u003Cb>Section\n51\u003C\u002Fb> applies instead.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Independent Promises\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the promises are independent and not reciprocal, Section\n52 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Different Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the parties later agree to change the order of\nperformance, that agreement prevails.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"58","actId":"2","sectionNo":"53","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Liability of party preventing event on which the contract is to take effect.","meaning":"If one party stops or obstructs the other party from performing their obligation, the affected party can either cancel (avoid) the contract or continue with it. The affected party can also claim compensation for any loss caused by such prevention.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 53 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     protect a party who is prevented from performing a contract. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent a party from benefiting from their own wrongful conduct. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     allow the innocent party to avoid the contract if desired. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide compensation for losses suffered due to the prevention.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Construction Work\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to build a warehouse for B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B refuses to hand over possession of the land.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A may cancel the contract and claim\ncompensation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Sale of Machinery\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to install machinery at B's factory.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B does not permit A to enter the factory.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A is excused from performance and may claim\ndamages.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Event Management\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A contracts to organize B's wedding.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B cancels the venue without informing A, making performance\nimpossible.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A may avoid the contract and claim\ncompensation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Repair Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to repair B's vehicle.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B refuses to hand over the vehicle.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A is not liable for non-performance and may\nclaim compensation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Software Installation\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to install software at B's office.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B repeatedly denies access to the office.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A may treat the contract as voidable and\nrecover losses.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) No Prevention by the Other Party\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If non-performance occurs due to the promisor's own fault or\nnegligence, Section 53 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Prevention by a Third Party\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If performance is prevented by someone other than the\ncontracting party, Section 53 generally does not apply. Other legal provisions\nmay be relevant depending on the circumstances.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Mutual Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If both parties mutually agree not to perform the contract,\nSection 53 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"59","actId":"2","sectionNo":"54","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Effect of default as to that promise which should be first performed, in contract consisting of reciprocal promises.","meaning":"If one party is required to perform first but fails to do so, they cannot demand performance from the other party. They must also compensate the other party for any loss caused by their failure.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 54 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     ensure that parties perform their obligations in the agreed order. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent a defaulting party from enforcing the contract against the\n     innocent party. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     compensate the innocent party for losses caused by the default. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     promote fairness in contracts involving reciprocal promises.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Construction Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to construct a house.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B agrees to pay after construction.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A abandons the work midway.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A cannot demand payment, and B may claim\ncompensation for any loss.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Sale of Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to deliver 500 bags of cement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B agrees to pay upon delivery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A fails to deliver.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A cannot recover the price from B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Printing Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to print books.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B agrees to pay after delivery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A never prints the books.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A has no right to demand payment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Software Development\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to develop software.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B agrees to pay after installation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A fails to install the software.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A cannot claim the contract price.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Interior Design\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to complete interior work before B pays the balance\namount.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A leaves the work incomplete.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cb>\u003Cspan style=\"font-size:12.0pt;line-height:115%;font-family:&quot;Calibri&quot;,sans-serif;\nmso-ascii-theme-font:minor-latin;mso-fareast-font-family:Calibri;mso-fareast-theme-font:\nminor-latin;mso-hansi-theme-font:minor-latin;mso-bidi-font-family:&quot;Times New Roman&quot;;\nmso-bidi-theme-font:minor-bidi;mso-ansi-language:EN-US;mso-fareast-language:\nEN-US;mso-bidi-language:AR-SA\">Result:\u003C\u002Fspan>\u003C\u002Fb>\u003Cspan style=\"font-size:12.0pt;\nline-height:115%;font-family:&quot;Calibri&quot;,sans-serif;mso-ascii-theme-font:minor-latin;\nmso-fareast-font-family:Calibri;mso-fareast-theme-font:minor-latin;mso-hansi-theme-font:\nminor-latin;mso-bidi-font-family:&quot;Times New Roman&quot;;mso-bidi-theme-font:minor-bidi;\nmso-ansi-language:EN-US;mso-fareast-language:EN-US;mso-bidi-language:AR-SA\"> A\ncannot demand the balance payment and may be liable to compensate B for losses.\u003C\u002Fspan>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Simultaneous Promises\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If both promises are to be performed at the same time, \u003Cb>Section\n51\u003C\u002Fb> applies instead.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Wrongful Prevention by the Other Party\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the party who should perform first is prevented from\nperforming by the other party, \u003Cb>Section 53\u003C\u002Fb> may apply instead.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Contract Provides Otherwise\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract specifies a different consequence for\nnon-performance, the contractual terms generally prevail, subject to applicable\nlaw.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"60","actId":"2","sectionNo":"55","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Effect of failure to perform at fixed time, in contract in which time is essential. Effect of such failure when time is not essential. Effect of acceptance of performance at time other than that agreed upon","meaning":"\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">\u003Cb>If\n     time is an essential part of the contract\u003C\u002Fb>, and the promisor fails to\n     perform on time, the promisee may cancel the contract. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u00

3Cli class=\"MsoNormal\">\u003Cb>If\n     time is not essential\u003C\u002Fb>, the contract continues, but the promisee can\n     claim compensation for the delay. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">\u003Cb>If\n     the promisee accepts late performance\u003C\u002Fb>, they generally cannot claim\n     compensation for the delay \u003Cb>unless they reserve that right by giving\n     notice when accepting the delayed performance\u003C\u002Fb>.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 55 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     determine the consequences of delayed performance. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     distinguish between contracts where time is essential and where it is not.\n     \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect the promisee from losses caused by delay. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent unfair claims after accepting delayed performance without\n     reservation.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Wedding Decorations\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to decorate B's wedding hall on \u003Cb>15th December\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A completes the work on \u003Cb>16th December\u003C\u002Fb>, after the\nwedding.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B may cancel the contract because time was\nessential.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Office Furniture\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to supply office furniture by \u003Cb>1st August\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A delivers it on \u003Cb>5th August\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The delay causes B to incur additional expenses.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> If time was not essential, B may claim\ncompensation but cannot cancel the contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Factory Machinery\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to install machinery by \u003Cb>30th September\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A installs it on \u003Cb>10th October\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B accepts the installation but gives written notice that\ncompensation for delay will be claimed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B may claim compensation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Sale of Land\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell land to B by \u003Cb>1st June\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The agreement does not show that time is essential.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The sale is completed on \u003Cb>15th June\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract remains valid, though B may\nclaim compensation if the delay caused loss.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Perishable Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to deliver fresh fruits to B on \u003Cb>10th May\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The fruits are delivered on \u003Cb>12th May\u003C\u002Fb> and have\nspoiled.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Time is of the essence. B may avoid the\ncontract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) No Time Fixed\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract does not specify any time for performance,\nSection 55 does not apply. Instead, \u003Cb>Section 46\u003C\u002Fb> applies (performance\nwithin a reasonable time).\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Delay Caused by the Promisee\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the promisee causes or contributes to the delay, the\npromisor may not be liable under Section 55.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Performance Excused by Law\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If performance is excused due to supervening impossibility\nor another legal excuse, Section 55 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"61","actId":"2","sectionNo":"56","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Agreement to do impossible act. Contract to do an act afterwards becoming impossible or unlawful. Compensation for loss through non-performance of act known to be impossible or unlawful.","meaning":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Initial Impossibility\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>If the act is impossible from the very beginning, the\nagreement is void.\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Example:\u003Cbr>\nA agrees to bring a person back from the dead.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">This is impossible.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The agreement is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Supervening Impossibility (Doctrine of Frustration)\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>If a valid contract later becomes impossible or unlawful\ndue to an event beyond the control of the parties, the contract automatically\nbecomes void from the time of that event.\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Example:\u003Cbr>\nA agrees to organize a concert.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Before the concert, the Government bans all public\ngatherings because of a pandemic.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The contract becomes void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Knowledge of Impossibility\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>If the promisor knew (or ought to have known) that the\nact was impossible or unlawful, but the promisee did not know, the promisor\nmust compensate the promisee for the loss suffered.\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Example:\u003Cbr>\nA promises to sell land that A already knows has been legally acquired by the\nGovernment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B does not know this.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A must compensate B for the loss.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 56 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     prevent enforcement of impossible agreements. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     discharge parties when performance becomes impossible after the contract\n     is made. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that no one is forced to perform an impossible or unlawful act. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect innocent parties from losses caused by a promisor who knew of the\n     impossibility or illegality.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Destruction of Subject Matter\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to rent a hall to B for a wedding.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Before the wedding, the hall is destroyed by fire without\nanyone's fault.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes void due to supervening\nimpossibility.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Government Ban\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A contracts to import a product.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Before import, the Government bans its import.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes void because performance\nhas become unlawful.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Death in Personal Service Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A famous singer agrees to perform at B's event.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Before the event, the singer dies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes void because personal\nperformance has become impossible.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Pandemic Restrictions\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to organize a public exhibition.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Before the event, emergency regulations prohibit public\ngatherings.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes void due to supervening\nimpossibility.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Known Impossibility\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell a vehicle that A already knows has been\npermanently destroyed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B is unaware of this.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A must compensate B for the loss.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Mere Commercial Difficulty\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A contract does \u003Cb>not\u003C\u002Fb> become void merely because it has\nbecome more expensive, less profitable, or commercially difficult to perform.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The cost of raw materials doubles.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract does not become void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Self-Induced Impossibility\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the promisor's own act causes the impossibility, Section\n56 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells machinery needed to perform the contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A remains liable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Foreseeable Events Covered by the Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract already provides for a particular event\n(such as force majeure or extension clauses), the rights of the parties are\ngoverned primarily by those contractual terms rather than Section 56.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(D) Temporary Difficulty\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A temporary delay that does not fundamentally defeat the\ncontract may not amount to frustration.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"62","actId":"2","sectionNo":"57","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Reciprocal promise to do things legal, and also other things illegal.","meaning":"If a contract contains two reciprocal promises—one that is legal and another that is illegal under certain circumstances—the legal promise remains valid and enforceable, but the illegal promise is void and cannot be enforced.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 57 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     distinguish between legal and illegal reciprocal promises. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     enforce lawful promises while refusing to enforce unlawful ones. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent parties from obtaining legal recognition for illegal agreements. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     preserve the valid portion of a contract where possible.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Sale of Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell furniture to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">They also agree that if customs duties increase, A will\nillegally import additional goods.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">Sale\n     of furniture – \u003Cb>Valid\u003C\u002Fb> \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Illegal\n     import agreement – \u003Cb>Void\u003C\u002Fb> \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Construction Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to build a warehouse.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">They further agree that, if permission is refused, A will\nconstruct the building without approval.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">Construction\n     according to law – \u003Cb>Valid\u003C\u002Fb> \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Illegal\n     construction – \u003Cb>Void\u003C\u002Fb> \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Transport Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to transport goods lawfully.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If stopped by authorities, A promises to bribe the\nofficials.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">Lawful\n     transport – \u003Cb>Valid\u003C\u002Fb> \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Promise\n     to bribe – \u003Cb>Void\u003C\u002Fb> \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Export Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to export textiles legally.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If export restrictions are imposed, A agrees to smuggle\nthem.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">Legal\n     export – \u003Cb>Valid\u003C\u002Fb> \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Smuggling\n     agreement – \u003Cb>Void\u003C\u002Fb> \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Business Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to supply licensed products.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the licence expires, A promises to continue supplying\nthem illegally.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">Supply\n     with a valid licence – \u003Cb>Valid\u003C\u002Fb> \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Illegal\n     supply – \u003Cb>Void\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Entire Contract is Illegal\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the whole object or consideration of the contract is\nillegal, the \u003Cb>entire contract is void\u003C\u002Fb> under Section 23.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell prohibited narcotic drugs.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The whole agreement is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Legal and Illegal Parts Cannot Be Separated\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the lawful and unlawful promises are so closely connected\nthat they cannot be separated, the entire agreement may become void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Illegal Promise is the Main Object\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the principal purpose of the agreement is illegal,\nSection 57 does not save the legal portion.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"63","actId":"2","sectionNo":"58","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Alternative promise, one branch being illegal.","meaning":"If a contract gives a choice between two alternatives, and one alternative is legal while the other is illegal, only the legal alternative can be enforced by law. The illegal alternative has no legal effect.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 58 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     ensure that only lawful promises are enforceable. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent enforcement of illegal alternatives in a contract. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     preserve the legal part of an alternative promise wherever possible. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     uphold public policy by refusing to recognize illegal acts.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises either:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     deliver rice, or \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     deliver prohibited wildlife products. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">Rice\n     – \u003Cspan style=\"font-family:&quot;Segoe UI Emoji&quot;,sans-serif;mso-bidi-font-family:\n     &quot;Segoe UI Emoji&quot;\">??\u003C\u002Fspan> Enforceable \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Wildlife\n     products – \u003Cspan style=\"font-family:&quot;Segoe UI Emoji&quot;,sans-serif;\n     mso-bidi-font-family:&quot;Segoe UI Emoji&quot;\">?\u003C\u002Fspan> Void \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Property\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises either:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     lease a warehouse, or \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     illegally occupy government land. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">Lease\n     – \u003Cspan style=\"font-family:&quot;Segoe UI Emoji&quot;,sans-serif;mso-bidi-font-family:\n     &quot;Segoe UI Emoji&quot;\">??\u003C\u002Fspan> Valid \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Illegal\n     occupation – \u003Cspan style=\"font-family:&quot;Segoe UI Emoji&quot;,sans-serif;\n     mso-bidi-font-family:&quot;Segoe UI Emoji&quot;\">?\u003C\u002Fspan> Void \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Transport\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises either:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     transport goods lawfully, or \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     smuggle restricted goods. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">Lawful\n     transport – \u003Cspan style=\"font-family:&quot;Segoe UI Emoji&quot;,sans-serif;\n     mso-bidi-font-family:&quot;Segoe UI Emoji&quot;\">??\u003C\u002Fspan> Valid \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Smuggling\n     – \u003Cspan style=\"font-family:&quot;Segoe UI Emoji&quot;,sans-serif;mso-bidi-font-family:\n     &quot;Segoe UI Emoji&quot;\">?\u003C\u002Fspan> Void \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Employment\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises either:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     provide lawful consulting services, or \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     hack a competitor's computer system. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">Consulting\n     – \u003Cspan style=\"font-family:&quot;Segoe UI Emoji&quot;,sans-serif;mso-bidi-font-family:\n     &quot;Segoe UI Emoji&quot;\">??\u003C\u002Fspan> Enforceable \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Hacking\n     – \u003Cspan style=\"font-family:&quot;Segoe UI Emoji&quot;,sans-serif;mso-bidi-font-family:\n     &quot;Segoe UI Emoji&quot;\">?\u003C\u002Fspan> Void \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Construction\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises either:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     build according to approved plans, or \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     construct without mandatory approvals. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">Legal\n     construction – \u003Cspan style=\"font-family:&quot;Segoe UI Emoji&quot;,sans-serif;\n     mso-bidi-font-family:&quot;Segoe UI Emoji&quot;\">??\u003C\u002Fspan> Valid \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Illegal\n     construction – \u003Cspan style=\"font-family:&quot;Segoe UI Emoji&quot;,sans-serif;\n     mso-bidi-font-family:&quot;Segoe UI Emoji&quot;\">?\u003C\u002Fspan> Void&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Both Alternatives are Illegal\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If \u003Cb>both alternatives are illegal\u003C\u002Fb>, the entire\nagreement is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A promises either:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     smuggle gold, or \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     traffic prohibited drugs. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The whole agreement is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Both Alternatives are Legal\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If \u003Cb>both alternatives are lawful\u003C\u002Fb>, Section 58 does not\napply because there is no illegal branch.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Legal Alternative Cannot Be Separated\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the legal and illegal alternatives are inseparable, the\nagreement may be held void depending on the nature of the contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"64","actId":"2","sectionNo":"59","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Application of payment where debt to be discharged is indicated.","meaning":"If you owe someone several different debts and, while making a payment, you specify which debt the payment is for, the creditor must apply the payment to that particular debt, provided the payment is accepted.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 59 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     give the debtor the right to choose which debt they wish to repay. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent the creditor from applying the payment to a different debt against\n     the debtor's wishes. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid disputes regarding the adjustment of payments. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure certainty and fairness in financial transactions.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Two Loans\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes B:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">?1,00,000\n     (Home Loan) \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">?50,000\n     (Car Loan) \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">A pays ?50,000 and states that it is for the car loan.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B must credit the payment to the car loan.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Invoice Number Mentioned\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes B for three invoices.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers ?25,000 mentioning \u003Cb>\"Invoice No.\n102\"\u003C\u002Fb> in the payment reference.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B must apply the payment to Invoice No. 102.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Rent and Loan\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">?30,000\n     as rent. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">?70,000\n     as a loan. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">A pays ?30,000 stating it is towards rent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The payment must be adjusted against the\nrent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – GST Payment\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes B:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">Goods\n     supplied in January. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Goods\n     supplied in February. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">A pays the January invoice amount and mentions \u003Cb>\"January\nInvoice\"\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B must apply the payment to the January\ninvoice.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Cheque with Instructions\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sends a cheque with a covering letter stating:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\"Please adjust this amount against Loan Account No.\n2.\"\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B must apply the payment to Loan Account No.\n2.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) No Indication by Debtor\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the debtor does \u003Cb>not\u003C\u002Fb> specify the debt and the\ncircumstances do not indicate it, \u003Cb>Section 60\u003C\u002Fb> applies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Creditor Rejects the Payment\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the creditor does not accept the payment, Section 59 does\nnot operate.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Only One Debt Exists\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If there is only one debt, there is no question of\nappropriation. Section 59 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"65","actId":"2","sectionNo":"60","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Application of payment where debt to be discharged is not indicated.","meaning":"If you owe several debts and make a payment without telling the creditor which debt you want to repay, the creditor is free to apply that payment to any lawful debt that is due, even if that debt has become time-barred under the Limitation Act.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 60 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     give the creditor the right to appropriate payment when the debtor gives\n     no instructions. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid uncertainty where multiple debts exist. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     allow the creditor to recover any lawful debt that is due. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     recognize that even a time-barred debt may be chosen for appropriation if\n     it is otherwise a lawful debt.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Two Personal Loans\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes B:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">?1,00,000\n     (Loan 1) \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">?2,00,000\n     (Loan 2) \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">A pays ?50,000 without any indication.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B may adjust the payment against either loan.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Trade Debts\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes B for three unpaid invoices.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers ?25,000 without mentioning any invoice number.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B may apply the payment to any unpaid\ninvoice.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Time-Barred Debt\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">?80,000\n     (time-barred debt) \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">?1,20,000\n     (current debt) \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">A makes a payment of ?80,000 without specifying the debt.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B may apply the payment to the time-barred\ndebt.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Rent and Loan\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">?40,000\n     as rent. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">?60,000\n     as a loan. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">A pays ?30,000 without giving any instructions.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B may decide whether to adjust the payment\ntowards the rent or the loan.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Multiple Business Invoices\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes B for five invoices.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A pays ?1,00,000 without mentioning any invoice.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B has the discretion to appropriate the\npayment to any lawful unpaid invoice.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Debtor Gives Instructions\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the debtor specifies the debt to be discharged, \u003Cb>Section\n59\u003C\u002Fb> applies instead.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Circumstances Indicate the Debt\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the circumstances clearly show which debt the payment\nrelates to, the creditor must follow that indication. Section 60 does not\napply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Unlawful Debt\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The creditor cannot apply the payment to an unlawful or\nillegal debt. The debt must be \u003Cb>lawful\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"66","actId":"2","sectionNo":"61","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Application of payment where neither party appropriates.","meaning":"If neither the debtor nor the creditor decides which debt a payment should be adjusted against, the law automatically applies the payment to the oldest debt first. If all the debts arose at the same time, the payment is divided proportionately among them.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 61 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     provide a default rule where neither party appropriates the payment. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid disputes over adjustment of payments. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure payments are applied fairly and consistently. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     clear older debts before newer ones.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Oldest Loan\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes three loans taken in different years.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Neither party appropriates a payment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The oldest loan is discharged first.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Business Invoices\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes five invoices dated January to May.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A pays ?50,000 without any instructions.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B also gives no appropriation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The payment is adjusted against the earliest\ninvoice.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Equal Loans\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">?1,00,000\n     \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">?2,00,000\n     \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">Both loans were granted on the same day.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A pays ?60,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">?20,000\n     towards the first loan. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">?40,000\n     towards the second loan. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Time-Barred Debt\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">?30,000\n     (time-barred) \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">?70,000\n     (current) \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">Neither party makes any appropriation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The payment is first applied to the older,\ntime-barred debt.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Multiple Rent Arrears\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes rent for January, February, and March.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A pays one month's rent without specifying the month.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The landlord also makes no appropriation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The payment is adjusted against the \u003Cb>January\nrent\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Debtor Makes an Appropriation\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the debtor specifies the debt, \u003Cb>Section 59\u003C\u002Fb> applies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Creditor Makes an Appropriation\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the debtor is silent but the creditor chooses the debt, \u003Cb>Section\n60\u003C\u002Fb> applies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Only One Debt Exists\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If there is only one debt, there is no issue of\nappropriation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"67","actId":"2","sectionNo":"62","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Effect of novation, rescission, and alteration of contract.","meaning":"If both parties agree to replace the old contract with a new one, cancel the old contract, or change its terms, then the original contract no longer has to be performed.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 62 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     allow parties to modify their contractual relationship by mutual\n     agreement. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     recognize the freedom of parties to substitute, cancel, or alter\n     contracts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid unnecessary enforcement of an old contract that both parties no\n     longer wish to perform. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide legal certainty regarding the effect of a new agreement.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Loan Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A borrows ?10,00,000 from B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Later, both agree that A will transfer a car instead of\nrepaying the loan.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The original loan agreement is replaced by a\nnew contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Sale Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to sell 500 bags of rice to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Both later agree to cancel the transaction.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract is rescinded.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Construction Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to construct a warehouse for ?50,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Later, both agree to increase the contract price to\n?55,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract is altered.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Change of Parties (Novation)\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes B ?2,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">With the consent of all parties, C agrees to pay B instead\nof A.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A new contract is created, and A is\ndischarged from the original obligation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Supply Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to supply 1,000 units by \u003Cb>30th June\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Both parties later agree to reduce the quantity to 800\nunits.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The original contract continues with the\naltered quantity.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) No Mutual Consent\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If only one party wants to change or cancel the contract,\nSection 62 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Invalid New Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the substituted contract is void or illegal, the original\ncontract may continue unless the parties intended otherwise and the law\npermits.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Change by Operation of Law\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Changes arising automatically by law (such as insolvency or\nstatutory provisions) are not novation under Section 62.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"68","actId":"2","sectionNo":"63","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Promisee may dispense with or remit performance of promise.","meaning":"\u003Cp class=\"MsoNormal\">\u003Cb>The promisee can voluntarily:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">\u003Cb>Forgive\u003C\u002Fb>\n     the whole or part of the performance. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">\u003Cb>Reduce\u003C\u002Fb>\n     the obligation. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">\u003Cb>Give\n     extra time\u003C\u002Fb> to perform. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">\u003Cb>Accept\n     something different\u003C\u002Fb> instead of what was originally promised.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 63 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     allow the promisee to relax or waive contractual rights. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     encourage settlement and compromise between parties. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide flexibility in the performance of contracts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     recognize that a promisee may voluntarily accept less or something\n     different.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Waiver of Delivery\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to supply machinery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B later informs A that delivery is no longer required.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A need not perform.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Reduced Payment\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes B ?5,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B accepts ?4,50,000 as full settlement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A's liability ends.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Extension of Deadline\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to complete construction by \u003Cb>30th June\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B extends the deadline to \u003Cb>31st July\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A may complete the work within the extended\ntime.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Different Property Accepted\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes B ?10,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Instead of money, B accepts a plot of land.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The debt is discharged.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Partial Waiver\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A agrees to supply 1,000 bags of cement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B agrees to accept only 900 bags.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A need supply only 900 bags.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) No Voluntary Consent\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the promisee's consent is obtained by fraud, coercion,\nundue influence, or misrepresentation, Section 63 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Rights of Third Parties\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The promisee cannot waive obligations in a manner that\nunlawfully affects the rights of third parties.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Statutory Obligations\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A statutory duty or obligation imposed by law cannot\nordinarily be waived merely under Section 63.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"69","actId":"2","sectionNo":"64","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Consequences of rescission of voidable contract.","meaning":"\u003Cp class=\"MsoNormal\">\u003Cb>If a person has the legal right to cancel a voidable\ncontract (for example, because of coercion, fraud, undue influence, or\nmisrepresentation) and decides to cancel it, then:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Col style=\"margin-top:0cm\" start=\"1\" type=\"1\">\n \u003Cli class=\"MsoNormal\">\u003Cb>The\n     other party is no longer required to perform the contract.\u003C\u002Fb> \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">\u003Cb>The\n     person cancelling the contract must return any benefit received under the\n     contract, as far as possible.\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Fol>","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 64 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     provide the legal consequences of rescinding a voidable contract. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent unjust enrichment by requiring restoration of benefits. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure fairness between the parties after rescission. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     restore the parties, as far as possible, to their original position.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Fraudulent Sale\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A fraudulently sells a car to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B pays ?5,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">After discovering the fraud, B rescinds the contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">B\n     returns the car. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">A\n     refunds ?5,00,000. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Coercion\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A forces B to sign an agreement and pays B ?1,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B later rescinds the contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B must return the ?1,00,000 received, as far\nas possible.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Undue Influence\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A obtains B's consent through undue influence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B transfers jewellery to A.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B later rescinds the contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A must return the jewellery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Misrepresentation\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells machinery by misrepresenting its capacity.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B rescinds the contract after discovering the truth.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The machinery is returned, and the purchase\nprice is refunded.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Lease Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A obtains B's consent to a lease by fraud.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B takes possession but later rescinds the lease.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B returns possession, and A returns any\nadvance rent, subject to lawful adjustments.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Contract Is Not Voidable\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract is \u003Cb>valid\u003C\u002Fb> or \u003Cb>void\u003C\u002Fb> (rather than\nvoidable), Section 64 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Contract Not Rescinded\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the party entitled to rescind chooses to \u003Cb>affirm\u003C\u002Fb>\nthe contract instead, Section 64 has no application.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Restoration Impossible Due to the Rescinding Party's\nConduct\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the benefit cannot be restored because of the rescinding\nparty's own actions (for example, the goods have been destroyed or\nsubstantially altered through that party's fault), rescission may not be\navailable or may be subject to equitable conditions.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"70","actId":"2","sectionNo":"65","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Obligation of person who has received advantage under void agreement, or contract that becomes void.","meaning":"If two people enter into an agreement believing it is valid, but later discover that it was void from the beginning, or if a valid contract later becomes void, then anyone who has received a benefit under that agreement or contract must return it or compensate the other party.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 65 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     prevent unjust enrichment. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     restore the parties, as far as possible, to the position they were in\n     before the agreement or contract. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure fairness when a contract is found to be void or subsequently\n     becomes void. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     require restitution of benefits received.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Advance Payment\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A pays ?2,00,000 in advance for machinery.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Before delivery, the contract becomes void due to a legal\nprohibition.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B must return the ?2,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Mistake of Fact\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A purchases land from B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Later, both discover that B never had title to the land.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> B must refund the purchase price.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Contract Frustrated\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A hires B's hall for a concert.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The hall is destroyed by fire before the concert without\neither party's fault.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Any advance received by B must be restored,\nsubject to applicable legal principles.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Export Ban\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A contracts to export goods.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">After receiving advance payment, the Government bans\nexports.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The contract becomes void, and the advance\nmust be returned.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Illegal Agreement Discovered\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A and B enter into an agreement believing it is lawful.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Later, they discover that the law prohibited such a\ntransaction.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If B has received money from A, B must restore it, provided\nSection 65 applies to the facts and the parties were not knowingly entering\ninto an illegal agreement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Agreement Known to Be Void or Illegal\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If both parties knew from the beginning that the agreement\nwas void or illegal, Section 65 generally does not apply because the law does\nnot assist parties who knowingly engage in illegal transactions.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Illegal Agreements Under Section 23\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Where the agreement is illegal because its object or\nconsideration is unlawful and the parties are \u003Cb>in pari delicto\u003C\u002Fb> (equally\nat fault), restitution may not be available.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) No Advantage Received\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If neither party has received any benefit, there is nothing\nto restore.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"71","actId":"2","sectionNo":"66","chapterName":"CHAPTER IV OF THE PERFORMANCE OF CONTRACTS","bareAct":"Mode of communicating or revoking rescission of voidable contract.","meaning":"If a person has the right to cancel (rescind) a voidable contract, they must communicate that decision to the other party. If they later wish to withdraw (revoke) that rescission before it becomes effective, it must also be communicated according to the same rules that apply to offers (proposals) under Sections 3, 4, and 5 of the Indian Contract Act.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 66 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     ensure certainty in the cancellation of voidable contracts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     require proper communication of rescission. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid disputes regarding whether a contract has been rescinded. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     apply the established rules of communication under Sections 3, 4, and 5 to\n     rescission.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Fraud\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A purchases machinery from B based on fraudulent statements.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sends a notice rescinding the contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The rescission is validly communicated.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Coercion\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A signs a contract under coercion.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">After the coercion ends, A emails B cancelling the contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The rescission is communicated in accordance\nwith Section 66.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Misrepresentation\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A enters into a contract because of B's misrepresentation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sends a registered letter rescinding the contract.\u003Co:p>\u003C\

003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Business Loan\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees a business loan obtained by B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The lender disburses the loan.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The guarantee is supported by valid\nconsideration.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Educational Loan\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A's parent guarantees an educational loan.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The bank sanctions the loan.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The sanction of the loan to the student is\nsufficient consideration for the parent's guarantee.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) No Benefit to the Principal Debtor\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If nothing is done or promised for the benefit of the\nprincipal debtor, there may be no valid consideration for the guarantee.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Past Consideration Without Connection\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the guarantee is given after the transaction is complete\nand there is no fresh consideration or legal basis supporting it, the guarantee\nmay not be enforceable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A has already borrowed money from B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Several months later, C voluntarily guarantees the already\nexisting debt without any new consideration, such as an extension of time or\nfurther credit.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The guarantee may not be enforceable for want\nof consideration.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Invalid Under General Contract Law\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the guarantee is otherwise void (e.g., due to coercion,\nfraud, or an unlawful object), Section 127 cannot validate it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"85","actId":"2","sectionNo":"128","chapterName":"CHAPTERVIII OF INDEMNITY AND GUARANTEE","bareAct":"Surety’s liability.","meaning":"The surety is liable to the same extent as the principal debtor, unless the contract of guarantee specifically limits the surety's liability. If the principal debtor fails to perform or repay, the creditor can recover the amount directly from the surety.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 128 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     define the extent of the surety's liability. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect the interests of the creditor. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that the surety stands in the place of the principal debtor upon\n     default. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     allow parties to limit the surety's liability by agreement.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Bank Loan\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A takes a housing loan.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B guarantees repayment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A defaults.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The bank may recover the outstanding amount\nfrom B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Goods Sold on Credit\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A buys goods on credit.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C guarantees payment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A fails to pay.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The seller can recover the amount from C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Limited Guarantee\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A obtains a business loan of ?50,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C's guarantee is restricted to ?10,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A defaults.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C is liable only up to ?10,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Immediate Liability\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A defaults in repaying a loan.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The creditor directly sues the surety.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The suit is maintainable under Section 128.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Multiple Sureties\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A's loan is guaranteed by B and C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A defaults.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The creditor may proceed against one or both\nsureties, subject to the terms of the guarantee and the law relating to\nco-sureties.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Limited Guarantee\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the guarantee expressly limits the surety's liability,\nthe surety is liable only to that extent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Invalid Guarantee\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the contract of guarantee is void or unenforceable,\nSection 128 does not apply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Discharge of Surety\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The surety may be discharged under other provisions of the\nAct (such as Sections 133 to 139) if the legal requirements for discharge are\nsatisfied.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"86","actId":"2","sectionNo":"129","chapterName":"CHAPTERVIII OF INDEMNITY AND GUARANTEE","bareAct":"“Continuing guarantee”.","meaning":"A continuing guarantee is a guarantee that covers more than one transaction. Instead of applying to a single debt or obligation, it remains effective for a series of future transactions between the principal debtor and the creditor until it is revoked or otherwise terminated according to law.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 129 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     define the concept of a continuing guarantee. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     facilitate ongoing commercial and banking transactions. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     provide security to creditors for multiple transactions. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     distinguish guarantees covering a series of transactions from guarantees\n     relating to a single transaction.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Supply of Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees payment for all goods that B purchases from C\nduring one year.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B makes ten separate purchases.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The guarantee covers all ten transactions.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Bank Overdraft\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees B's overdraft facility with a bank.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The bank allows B to draw funds repeatedly.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The guarantee continues to cover successive\nwithdrawals within its terms.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Credit Purchases\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees payment for future credit purchases made by B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B purchases goods every month.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The guarantee applies to every purchase until\nrevoked.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Construction Materials\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees payment for cement supplied by C to B over six\nmonths.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Several deliveries are made.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Each delivery is covered by the continuing\nguarantee.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Business Transactions\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees all future business debts incurred by B up to \u003Cb>?20,00,000\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B enters into several transactions.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The guarantee covers those transactions up to\nthe agreed limit.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Single Transaction Guarantee\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the guarantee relates only to one specific transaction,\nit is \u003Cb>not\u003C\u002Fb> a continuing guarantee.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Example\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees repayment of one loan of ?5,00,000 taken by B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is an ordinary guarantee, not a\ncontinuing guarantee.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Revocation\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A continuing guarantee may be revoked for future\ntransactions under \u003Cb>Section 130\u003C\u002Fb>, or may come to an end in other ways\nrecognized by law.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Expiry by Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the guarantee is limited by time, amount, or specific\nconditions, it ends according to those contractual terms.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"87","actId":"2","sectionNo":"130","chapterName":"CHAPTERVIII OF INDEMNITY AND GUARANTEE","bareAct":"Revocation of continuing guarantee.","meaning":"A surety who has given a continuing guarantee can withdraw (revoke) it at any time by giving notice to the creditor. However, the revocation affects only future transactions. The surety remains liable for transactions that took place before the notice of revocation.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 130 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     give the surety the right to revoke a continuing guarantee. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect the surety from unlimited future liability. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     safeguard the creditor's rights regarding transactions already completed. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cspan style=\"font-size:12.0pt;line-height:115%;font-family:&quot;Calibri&quot;,sans-serif;\nmso-ascii-theme-font:minor-latin;mso-fareast-font-family:Calibri;mso-fareast-theme-font:\nminor-latin;mso-hansi-theme-font:minor-latin;mso-bidi-font-family:&quot;Times New Roman&quot;;\nmso-bidi-theme-font:minor-bidi;mso-ansi-language:EN-US;mso-fareast-language:\nEN-US;mso-bidi-language:AR-SA\">To provide certainty regarding the liability of\nthe surety after revocation\u003C\u002Fspan>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Supply of Goods\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees payment for goods supplied by C to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">After six months, A revokes the guarantee.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Goods supplied before the revocation remain covered.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A is liable only for those earlier supplies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Bank Credit Facility\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees future advances made by a bank to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A later gives notice revoking the guarantee.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The bank grants another loan after receiving the notice.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A is not liable for the new loan.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Business Transactions\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees future business purchases by B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Notice of revocation is given.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B continues purchasing goods afterward.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A is liable only for purchases made before\nthe notice.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Overdraft Facility\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees B's overdraft account.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The bank receives notice of revocation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The bank later allows further withdrawals.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> A is not liable for withdrawals made after\nthe notice.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Credit Purchases\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees all future purchases by B from C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Notice of revocation is delivered on \u003Cb>1st July\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Goods supplied before \u003Cb>1st July\u003C\u002Fb> remain covered.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Goods supplied after \u003Cb>1st July\u003C\u002Fb> are not covered.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Ordinary Guarantee\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the guarantee relates to only one transaction, Section\n130 does not apply because it is not a continuing guarantee.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Liability Already Incurred\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Revocation does not discharge liability for transactions\ncompleted before the notice.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Contract Providing Otherwise\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the guarantee contains lawful terms governing its\nduration or revocation, those terms may affect how the guarantee operates,\nprovided they are consistent with the law.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"88","actId":"2","sectionNo":"131","chapterName":"CHAPTERVIII OF INDEMNITY AND GUARANTEE","bareAct":"Revocation of continuing guarantee by surety’s death.","meaning":"If a surety dies, the continuing guarantee is automatically revoked for future transactions, unless the contract expressly provides otherwise. However, the surety's estate remains liable for transactions that took place before the surety's death.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 131 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     determine the effect of a surety's death on a continuing guarantee. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect the estate of the deceased surety from unlimited future liability.\n     \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     preserve the creditor's rights regarding transactions completed before the\n     surety's death. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     allow parties to agree otherwise by contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Credit Purchases\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees B's future credit purchases.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A dies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The seller supplies more goods after A's death.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The estate is not liable for the later\nsupplies unless the contract provides otherwise.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Bank Overdraft\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees B's overdraft facility.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A dies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The bank allows further withdrawals.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The estate is not liable for withdrawals made\nafter A's death, unless the contract states otherwise.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Business Transactions\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees future business debts of B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Several debts arise before A's death.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Additional debts arise afterward.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The estate is liable only for debts incurred\nbefore A's death, unless the guarantee provides otherwise.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Loan Guarantee\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantees future loans to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The lender grants one loan before A's death and another\nafterward.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The estate is liable for the first loan but\nnot for the second, unless the contract extends liability beyond death.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Express Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A guarantee expressly provides that the liability shall\ncontinue despite the death of the surety.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A dies.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The guarantee continues according to the\ncontractual terms, subject to law.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Contract to the Contrary\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the guarantee expressly states that it will continue\ndespite the surety's death, the automatic revocation under Section 131 does not\napply.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Ordinary Guarantee\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Section 131 applies only to \u003Cb>continuing guarantees\u003C\u002Fb>. It\ndoes not affect a guarantee relating to a single completed transaction.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Transactions Before Death\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The death of the surety does not discharge liability already\nincurred before death.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"89","actId":"2","sectionNo":"132","chapterName":"CHAPTERVIII OF INDEMNITY AND GUARANTEE","bareAct":"Liability of two persons, primarily liable, not affected by arrangement between them that one shall be surety on other’s default.","meaning":"If two persons jointly promise to pay or perform an obligation for a third person, they cannot reduce or change their liability towards that third person merely by making a private agreement between themselves that one will be liable only if the other defaults. Unless the third person is a party to that agreement, both remain fully liable to the third person.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 132 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     protect the rights of the creditor (third person). \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that private arrangements between joint promisors do not prejudice\n     the creditor. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     preserve the original liability created under the primary contract. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     distinguish internal arrangements from obligations owed to third parties.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Joint Loan\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A and B jointly obtain a loan from C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">They privately agree that B is only a guarantor.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C is not a party to that agreement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C may recover the debt from either A or B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Business Debt\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A and B jointly purchase goods from C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Between themselves, A agrees to bear the entire liability.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C is aware but does not consent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C may sue both A and B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Construction Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A and B jointly contract to complete construction work for\nC.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">They privately agree that A alone will perform the work.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C can enforce the contract against both A and\nB.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Joint Borrowers\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A and B jointly borrow money from a bank.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Their internal agreement provides that B will be liable only\nupon A's default.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The bank does not join that agreement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The bank may proceed against either borrower.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Supplier Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A and B jointly promise to pay C for goods supplied.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">They later execute a private agreement changing their\ninternal responsibilities.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The supplier's rights remain unchanged.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Creditor Is a Party to the New Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the creditor agrees to the revised arrangement, the\nrights and liabilities will be governed by the new agreement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Novation Under Section 62\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the original contract is substituted by a new contract\nwith the creditor's consent, Section 132 will not apply because the original\nliability has been replaced.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Contract Expressly Provides Otherwise\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the original contract itself limits or defines the\nliability differently, the contractual terms will prevail.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"90","actId":"2","sectionNo":"133","chapterName":"CHAPTERVIII OF INDEMNITY AND GUARANTEE","bareAct":"Discharge of surety by variance in terms of contract.","meaning":"A surety agrees to guarantee a particular contract. If that contract is changed without the surety's approval, the surety cannot be made liable for obligations arising under the altered contract.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 133 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     protect the surety from unauthorized changes in the guaranteed contract. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that the surety is bound only by the contract they originally\n     agreed to guarantee. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent the creditor and principal debtor from increasing or changing the\n     surety's risk without consent. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     maintain fairness in contracts of guarantee.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Increase in Loan Amount\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A obtains a loan guaranteed by C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Without C's consent, the bank increases the loan amount.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C is discharged regarding the increased\nliability.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Extension of Performance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A contracts to supply goods to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C guarantees A's performance.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A and B extend the delivery period without C's consent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C is discharged from liability for\nobligations arising after the variation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Change in Interest Rate\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A borrows money from B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C guarantees repayment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A and B increase the interest rate without C's approval.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C is discharged as to the varied obligation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Change in Payment Terms\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A and B change the instalment schedule without consulting C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C is discharged regarding future liabilities\nresulting from the altered terms.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Surety Consents\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A and B revise the contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C signs the revised agreement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The guarantee continues because the surety\nconsented.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Surety Gives Consent\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the surety agrees to the variation, the guarantee remains\nvalid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) No Material Variation\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Minor or insignificant changes that do not alter the\nsurety's risk may not discharge the surety.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Variation Expressly Permitted\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the guarantee itself authorizes certain changes without\nrequiring the surety's further consent, Section 133 may not discharge the\nsurety.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"91","actId":"2","sectionNo":"134","chapterName":"CHAPTERVIII OF INDEMNITY AND GUARANTEE","bareAct":"Discharge of surety by release or discharge of principal debtor.","meaning":"A surety's liability depends upon the liability of the principal debtor. Therefore, if the creditor voluntarily releases the principal debtor or does something that legally discharges the principal debtor, the surety is also released from liability.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 134 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     protect the rights of the surety. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent the creditor from releasing the principal debtor while still\n     claiming against the surety. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     preserve the surety's right to recover from the principal debtor after\n     making payment. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure fairness in contracts of guarantee.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Debt Waiver\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A borrows money from B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C guarantees repayment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B later waives the entire debt.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C is discharged because A has been released.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Settlement Agreement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A and B enter into a settlement under which B releases A\nfrom all liabilities.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C is the surety.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C is also discharged.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Legal Discharge\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A becomes legally discharged due to the creditor's act.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">C had guaranteed A's liability.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C is discharged.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Written Release\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The creditor executes a written release in favour of the\nprincipal debtor.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The surety is also released.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Novation\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A new agreement is entered into between the creditor and the\nprincipal debtor replacing the original contract, thereby discharging the\noriginal obligation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The surety under the original contract is\ndischarged unless they consent to the new arrangement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Discharge by Operation of Law\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the principal debtor is discharged by operation of law\n(for example, insolvency proceedings), the surety is \u003Cb>not necessarily\ndischarged\u003C\u002Fb>. The surety's liability may continue under the law governing\nguarantees.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Surety Consents to the New Arrangement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the surety agrees to the release or substitution, the\nguarantee may continue according to its terms.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Mere Forbearance to Sue\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Merely delaying or refraining from suing the principal\ndebtor does \u003Cb>not\u003C\u002Fb> discharge the surety. This is specifically provided\nunder \u003Cb>Section 137\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"92","actId":"2","sectionNo":"135","chapterName":"CHAPTERVIII OF INDEMNITY AND GUARANTEE","bareAct":"Discharge of surety when creditor compounds with, gives time to, or agrees not to sue, principal debtor.","meaning":"A surety guarantees a particular obligation. If the creditor changes the legal position of the principal debtor by giving concessions without the surety's approval, the surety is released from liability.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 135 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     protect the surety from unauthorized agreements between the creditor and\n     the principal debtor. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     preserve the surety's right to recover from the principal debtor after\n     payment. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent the creditor from increasing the surety's risk without consent. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure fairness in contracts of guarantee.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Settlement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owes ?15,00,000.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B accepts ?12,00,000 in full satisfaction without C's\nconsent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C is discharged.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Extension of Time\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A requests six more months to repay.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B agrees without informing C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> C is discharged.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Promise Not to Sue\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The creditor agrees not to institute legal proceedings for\ntwo years.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The surety is unaware of the agreement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The surety is discharged.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Consent of Surety\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The surety signs the extension agreement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The guarantee continues.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Business Loan\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A company obtains a loan.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The lender restructures the repayment schedule without the\nguarantor's consent.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The guarantor is discharged under Section\n135.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Surety Consents\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">If the surety expressly or impliedly agrees to the\narrangement, the guarantee continues.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Reservation of Surety's Rights\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Under \u003Cb>Section 137\u003C\u002Fb> and related principles, \u003Cb>mere\nforbearance to sue\u003C\u002Fb> (simply delaying legal action without any binding\nagreement) does not discharge the surety. Section 135 applies only where there\nis a \u003Cb>binding contract\u003C\u002Fb> to give time, compound, or not sue.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Agreement with a Third Person\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Under \u003Cb>Section 136\u003C\u002Fb>, an agreement by the creditor with\na third person to grant time to the principal debtor does \u003Cb>not\u003C\u002Fb> discharge\nthe surety.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"93","actId":"3","sectionNo":"5","chapterName":"CHAPTER II OF TRANSFERS OF PROPERTY BY ACT OF PARTIES","bareAct":"“Transfer of property” defined.","meaning":"A transfer of property is an act by which one living person voluntarily conveys ownership or an interest in property to another living person, either immediately (in the present) or at a future date. The transfer can also be made by a person to themselves jointly with another person.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 5 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     define the meaning of \"transfer of property.\" \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     specify that the Act applies only to transfers between \u003Cb>living persons\u003C\u002Fb>\n     (inter vivos transfers). \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     recognize that transfers may take effect immediately or in the future. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     include legal entities such as companies and associations within the\n     meaning of \"living person.\"\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Sale of Land\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells agricultural land to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Property is transferred from one living\nperson to another.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Gift\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A gifts a residential house to his daughter B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> This is a transfer of property.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Mortgage\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A mortgages his property to a bank as security for a loan.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> An interest in the property is transferred to\nthe bank.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Transfer by a Company\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">ABC Ltd. transfers office premises to XYZ Ltd.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Companies are included within the definition\nof \"living person.\"\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Joint Ownership\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers his property to himself and his wife jointly.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Such a transfer is recognized under Section\n5.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Transfer by Operation of Law\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Section 5 applies only to \u003Cb>voluntary acts\u003C\u002Fb> of transfer.\nIt does not apply to transfers that occur automatically by law.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Examples\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">Inheritance\n     (succession) \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Insolvency\n     \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Court\n     decrees \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">Statutory\n     vesting \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Testamentary Transfers\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Transfers made by a \u003Cb>will\u003C\u002Fb> are not governed by Section\n5 because they take effect only after the death of the testator. They are\ngoverned by the \u003Cb>Indian Succession Act, 1925\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Transfer to a Deceased Person\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfer cannot be made to a person who is already dead\nbecause Section 5 requires the transferee to be a \u003Cb>living person\u003C\u002Fb>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"94","actId":"3","sectionNo":"6","chapterName":"CHAPTER II OF TRANSFERS OF PROPERTY BY ACT OF PARTIES","bareAct":"What may be transferred.","meaning":"As a general rule, all property can be transferred. However, certain rights and interests that are personal, uncertain, speculative, or prohibited by law cannot be transferred.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 6 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     declare the general rule that property is transferable. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     specify the types of property and rights that cannot be transferred. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect personal rights and public interests. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     prevent trafficking in speculative or purely personal rights. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure transfers are lawful and consistent with public policy.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Valid Sale\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells his house to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Valid transfer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Sale of Expected Inheritance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells property he merely expects to inherit from his\nliving father.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Transfer of Right to Sue\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells only his claim for damages.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Transfer of Easement\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers only the right of way without transferring the\nland.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Invalid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Transfer of Pension\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A assigns his government pension.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Spes Successionis – Mere Expectation (Section 6(a))\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A mere chance of succeeding to property is not transferable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A is the son of B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">B is alive.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A expects to inherit B's house after B's death.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells this future expectation to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The transfer is \u003Cb>void\u003C\u002Fb> because it is\nmerely a \u003Cb>spes successionis\u003C\u002Fb> (expectation of succession).\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Mere Right of Re-entry (Section 6(b))\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A right to re-enter property for breach of a condition\ncannot be transferred separately.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A leases land to B with a condition that A may re-enter if\nrent is unpaid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells only the right of re-entry to C.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The transfer is invalid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Easement (Section 6(c))\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">An easement cannot be transferred separately from the\ndominant heritage.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A owns land with a right of way over B's land.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells only the right of way.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Invalid because an easement must pass with\nthe dominant property.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(D) Personal Interest (Section 6(d))\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A personal right that is restricted to the owner cannot be\ntransferred.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A receives the right to occupy a house only during his\nlifetime.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A attempts to transfer that right.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Invalid because the right is personal.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(E) Right to Future Maintenance (Section 6(dd))\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A right to receive future maintenance cannot be transferred.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A receives monthly maintenance under a family settlement.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells that right to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The transfer is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(F) Mere Right to Sue (Section 6(e))\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A mere right to file a lawsuit cannot be transferred.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A has a claim for damages against B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells only the right to sue B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The transfer is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(G) Public Office and Salary (Section 6(f))\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A public office cannot be transferred, nor can the salary\nattached to it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A, a government officer, agrees to transfer his office or\nfuture salary to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Such a transfer is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(H) Government Pensions (Section 6(g))\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Government pensions and certain stipends cannot be\ntransferred.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A, a retired government servant, assigns his pension to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The assignment is invalid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(I) Transfers Opposed to Law (Section 6(h))\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfer is invalid if:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">it\n     is opposed to the nature of the interest, \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">it\n     has an unlawful object or consideration, or \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">it\n     is made to a legally disqualified person. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers property to enable an illegal activity.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The transfer is void.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(J) Certain Occupancy Rights (Section 6(i))\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Certain occupancy rights and interests specifically declared\nuntransferable by law cannot be assigned.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A tenant with a legally non-transferable occupancy right\nassigns it to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The assignment is invalid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"95","actId":"3","sectionNo":"7","chapterName":"CHAPTER II OF TRANSFERS OF PROPERTY BY ACT OF PARTIES","bareAct":"Persons competent to transfer.","meaning":"A person can validly transfer property if they are legally competent to enter into a contract, have the right to transfer the property, or are legally authorized to transfer someone else's property. The transfer may be complete or partial, absolute or conditional, provided it is permitted by law.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 7 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     identify who is legally competent to transfer property. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that only persons with legal capacity or authority can make valid\n     transfers. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     protect the interests of both transferors and transferees. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     recognize transfers made by authorized representatives, trustees,\n     guardians, executors, and other persons empowered by law.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Sale by Owner\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells his own house to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Valid transfer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Sale by Minor\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A, aged 16 years, sells his land.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The transfer is void because a minor is not\ncompetent to contract.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Sale by Trustee\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A trustee sells trust property as authorized by the trust\ndeed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Valid transfer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Sale by Agent\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A's attorney sells property under a valid Power of Attorney.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Valid transfer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Partial Transfer\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A transfers only his one-half share in jointly owned\nproperty.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> Valid transfer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","exception":"\u003Cp class=\"MsoNormal\">\u003Cb>(A) Minor\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A minor is not competent to contract and therefore cannot\nvalidly transfer property.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(B) Person of Unsound Mind\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A person incapable of understanding the nature of the\ntransaction cannot make a valid transfer.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(C) Person Disqualified by Law\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Certain persons may be prohibited by law from transferring\nparticular property or interests.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>(D) Unauthorized Person\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A person having neither ownership nor legal authority cannot\ntransfer another person's property.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","caseStudyId":"0"},{"sectionId":"96","actId":"3","sectionNo":"8","chapterName":"CHAPTER II OF TRANSFERS OF PROPERTY BY ACT OF PARTIES","bareAct":"Operation of transfer.","meaning":"When property is transferred, the transferee receives all the rights, interests, and legal benefits that the transferor is capable of transferring, unless the transfer document clearly states otherwise or a different intention is implied.","objective":"\u003Cp class=\"MsoNormal\">The objectives of Section 8 are:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\n \u003Cli class=\"MsoNormal\">To\n     determine the legal effect of a transfer of property. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     ensure that all transferable rights and interests pass with the property\n     unless excluded. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     avoid disputes regarding incidental rights attached to the property. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n \u003Cli class=\"MsoNormal\">To\n     establish a presumption that the entire transferable interest passes to\n     the transferee.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\n\u003C\u002Ful>","illustration":"\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 1 – Sale of Agricultural Land\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells land to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The land includes irrigation rights.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The irrigation rights pass automatically.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 2 – Sale of House\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells his residential house.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">The deed does not mention the doors and windows.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> They pass with the house.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 3 – Sale of Rental Property\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells a rented building.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">Rent becomes due after the sale.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The future rent belongs to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 4 – Assignment of Debt\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A assigns a secured debt to B.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The mortgage security also passes.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\n\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\n\n\u003C\u002Fdiv>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Illustration 5 – Reserved Rights\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">A sells land but expressly reserves the right to remove\ntimber within six months.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\n\n\u003Cp class=\"MsoNormal\">\u003Cb>Result:\u003C\u002Fb> The reserved ri

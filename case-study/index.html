<script id="ng-state" type="application/json">{"9dac046f7ffd09b24c495a68c4f1f4cdee0601b70e57b28f690ab7def20d7118":{"b":[{"id":"2","caseTitleAndCitation":"\u003Cp class=\"MsoNormal\">\u003C\u002Fp>\u003Cp class=\"MsoNormal\">\u003C\u002Fp>\u003Cdiv>\u003Cp class=\"MsoNormal\">\u003Cb>Case Study: K.M. Nanavati v. State of Maharashtra\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>1. Case Title and Citation\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Case\r\n     Name:\u003C\u002Fb> K.M. Nanavati v. State of Maharashtra \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Citation:\u003C\u002Fb>\r\n     AIR 1962 SC 605; 1962 SCR Supl. (1) 567 \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Court:\u003C\u002Fb>\r\n     Supreme Court of India \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Date\r\n     of Judgment:\u003C\u002Fb> 24 November 1961 \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Bench:\u003C\u002Fb>\r\n     Justice K. Subba Rao, Justice S.K. Das, and Justice Raghubar Dayal \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Nature\r\n     of Case:\u003C\u002Fb> Criminal Appeal (Murder under Section 302 of the Indian Penal\r\n     Code, 1860)&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>\u003C\u002Fdiv>\u003Cul type=\"disc\">\r\n\u003C\u002Ful>","factsOfTheCase":"\u003Cp class=\"MsoNormal\">\u003Cb>2. Facts of the Case\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">Kawas Manekshaw Nanavati was a Commander in the Indian Navy.\r\nDue to his naval duties, he frequently remained away from home for extended\r\nperiods. During one such absence, his wife, Sylvia Nanavati, developed an\r\nextramarital relationship with Prem Bhagwandas Ahuja, a wealthy businessman in\r\nBombay (now Mumbai).\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">On \u003Cb>27 April 1959\u003C\u002Fb>, Nanavati returned home and sensed\r\nthat Sylvia was emotionally distant. After persistent questioning, Sylvia\r\nadmitted her affair with Ahuja. Distressed by the revelation, Nanavati took his\r\nwife and three children to a cinema, stating that he would join them later.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">Instead, he drove to INS Mysore, where he obtained a\r\nrevolver and ammunition from the naval armoury on the pretext of requiring it\r\nfor self-protection during a journey. He then visited Ahuja's office but did\r\nnot find him there. Subsequently, Nanavati went to Ahuja's residence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">At Ahuja's bedroom, an altercation took place. Nanavati\r\nlater claimed that he asked Ahuja whether he intended to marry Sylvia and care\r\nfor the children. According to Nanavati, Ahuja responded dismissively, leading\r\nto a struggle during which the revolver accidentally discharged. Three bullets\r\nstruck Ahuja, resulting in his death.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cspan style=\"font-size:12.0pt;line-height:115%;font-family:&quot;Calibri&quot;,sans-serif;\r\nmso-ascii-theme-font:minor-latin;mso-fareast-font-family:Calibri;mso-fareast-theme-font:\r\nminor-latin;mso-hansi-theme-font:minor-latin;mso-bidi-font-family:&quot;Times New Roman&quot;;\r\nmso-bidi-theme-font:minor-bidi;mso-ansi-language:EN-US;mso-fareast-language:\r\nEN-US;mso-bidi-language:AR-SA\">Nanavati immediately surrendered to his superior\r\nnaval officer and later to the police. He was charged with murder under Section\r\n302 of the Indian Penal Code.\u003C\u002Fspan>","proceduralHistory":"\u003Cp class=\"MsoNormal\">\u003Cb>&nbsp;3. Procedural History\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cspan>·\u003Cspan>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\r\n\u003C\u002Fspan>\u003C\u002Fspan>Nanavati was tried before the \u003Cb>Bombay Sessions\r\nCourt\u003C\u002Fb> by a \u003Cb>jury\u003C\u002Fb>. \u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cspan>·\u003Cspan>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\r\n\u003C\u002Fspan>\u003C\u002Fspan>The jury returned a verdict of \u003Cb>8:1 in favour\r\nof acquittal\u003C\u002Fb>, accepting the defence of grave and sudden provocation. \u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cspan>·\u003Cspan>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\r\n\u003C\u002Fspan>\u003C\u002Fspan>The Sessions Judge considered the verdict\r\nunreasonable and referred the matter to the \u003Cb>Bombay High Court\u003C\u002Fb> under\r\nSection 307 of the Code of&nbsp; &nbsp; &nbsp;Criminal Procedure, 1898. \u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cspan>·\u003Cspan>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\r\n\u003C\u002Fspan>\u003C\u002Fspan>The Bombay High Court rejected the jury's\r\nverdict, convicted Nanavati under Section 302 IPC, and sentenced him to \u003Cb>life\r\nimprisonment\u003C\u002Fb>. \u003C\u002Fp>\r\n\r\n\u003Cspan>Nanavati appealed before the \u003Cb>Supreme Court of\r\nIndia\u003C\u002Fb>, which upheld the High Court's conviction.&nbsp;\u003C\u002Fspan>","legalIssues":"\u003Cp class=\"MsoNormal\">\u003Cb>4. Legal Issues\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The Supreme Court considered the following legal issues:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Col style=\"margin-top:0cm\" start=\"1\" type=\"1\">\r\n \u003Cli class=\"MsoNormal\">Whether\r\n     Nanavati's act was protected by \u003Cb>Exception 1 to Section 300 IPC (grave\r\n     and sudden provocation)\u003C\u002Fb>. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Whether\r\n     sufficient time had elapsed between Sylvia's confession and the shooting\r\n     for Nanavati's emotions to cool down. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Whether\r\n     the Sessions Judge correctly referred the jury verdict to the High Court. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Whether\r\n     the Bombay High Court was justified in setting aside the jury's verdict. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Whether\r\n     the prosecution had established the offence of murder beyond reasonable\r\n     doubt.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Fol>","argumentsOfTheParties":"\u003Cp class=\"MsoNormal\">\u003Cb>5. Arguments of the Parties\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>Arguments by the Appellant (Nanavati)\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">Sylvia's\r\n     confession caused intense emotional shock amounting to grave and sudden\r\n     provocation. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Nanavati\r\n     went to meet Ahuja only to seek clarification regarding his intentions\r\n     towards Sylvia. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">During\r\n     the confrontation, a struggle ensued, causing the revolver to fire\r\n     accidentally. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Therefore,\r\n     at most, the offence amounted to culpable homicide not amounting to murder\r\n     under Section 304 IPC. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     jury's verdict deserved respect because it had assessed witness\r\n     credibility directly. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>Arguments by the Respondent (State of Maharashtra)\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">Nanavati\r\n     acted with premeditation. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">He\r\n     deliberately obtained a loaded revolver from the naval ship before\r\n     visiting Ahuja. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">He\r\n     visited multiple locations before reaching Ahuja's residence,\r\n     demonstrating that sufficient time existed for his anger to cool. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Medical\r\n     and forensic evidence contradicted Nanavati's claim of an accidental\r\n     struggle. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Therefore,\r\n     Exception 1 to Section 300 IPC was not applicable, making the offence\r\n     murder under Section 302 IPC.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>","relevantLaw":"\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\r\n\r\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\r\n\r\n\u003C\u002Fdiv>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>B. Constitutional Provisions\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">Although no constitutional issue was directly involved, the\r\ncase concerned:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Article\r\n     136\u003C\u002Fb> – Special Leave to Appeal before the Supreme Court. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>\r\n\r\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\r\n\r\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\r\n\r\n\u003C\u002Fdiv>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>C. Important Precedents\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The Court relied upon principles from English criminal law\r\nregarding:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">The\r\n     doctrine of \u003Cb>grave and sudden provocation\u003C\u002Fb>. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     \"reasonable person\" test. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Cooling-off\r\n     period principles. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Judicial\r\n     powers over jury verdicts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>\r\n\r\n\u003Cp class=\"MsoNormal\">The judgment itself later became an important precedent on\r\nthe interpretation of Exception 1 to Section 300 IPC.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cdiv class=\"MsoNormal\" align=\"center\" style=\"text-align:center\">\r\n\r\n\u003Chr size=\"2\" width=\"100%\" align=\"center\">\r\n\r\n\u003C\u002Fdiv>\u003Cp class=\"MsoNormal\">\u003Cb>6. Relevant Law\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>A. Statutes\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>Indian Penal Code, 1860\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cul type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Section\r\n     299\u003C\u002Fb> – Culpable Homicide \u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Section\r\n     300\u003C\u002Fb> – Murder \u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Exception\r\n     1 to Section 300\u003C\u002Fb> – Grave and Sudden Provocation \u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Section\r\n     302\u003C\u002Fb> – Punishment for Murder \u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Section\r\n     304\u003C\u002Fb> – Punishment for Culpable Homicide Not Amounting to Murder \u003C\u002Fli>\r\n\u003C\u002Ful>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>Code of Criminal Procedure, 1898\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cul type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Section\r\n     307\u003C\u002Fb> – Power of the Sessions Judge to refer an unreasonable jury\r\n     verdict to the High Court.&nbsp;\u003C\u002Fli>\u003Cli class=\"MsoNormal\">\u003Cbr>\u003C\u002Fli>\r\n\u003C\u002Ful>","courtsAnalysis":"\u003Cp class=\"MsoNormal\">\u003Cb>7. Court's Analysis\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The Supreme Court carefully analysed the sequence of events.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The Court held that the defence of grave and sudden\r\nprovocation was unavailable because:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">Nanavati\r\n     had enough time after Sylvia's confession to regain self-control. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">He\r\n     first dropped his family at the cinema. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">He\r\n     travelled to the naval ship. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">He\r\n     collected a loaded revolver. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">He\r\n     searched for Ahuja at his office. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Finally,\r\n     he reached Ahuja's residence. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>\r\n\r\n\u003Cp class=\"MsoNormal\">These actions demonstrated planning rather than an immediate\r\nloss of self-control.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The Court further observed that:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">Medical\r\n     evidence contradicted Nanavati's version of an accidental struggle. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     burden of proving Exception 1 rested upon the accused. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Nanavati\r\n     failed to establish that he acted under continuing grave and sudden\r\n     provocation. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>\r\n\r\n\u003Cp class=\"MsoNormal\">Regarding the jury verdict, the Supreme Court agreed that it\r\nignored material evidence and was therefore unreasonable. Consequently, the\r\nSessions Judge was justified in referring the matter to the High Court under\r\nSection 307 CrPC.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","judgment_Holding":"\u003Cp class=\"MsoNormal\">\u003Cb>8. Judgment \u002F Holding\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The Supreme Court dismissed Nanavati's appeal.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">It held that:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">The\r\n     killing constituted \u003Cb>murder under Section 302 IPC\u003C\u002Fb>. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     plea of grave and sudden provocation failed. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     Bombay High Court correctly overturned the jury's verdict. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Nanavati's\r\n     conviction and sentence of \u003Cb>life imprisonment\u003C\u002Fb> were affirmed.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>","criticalAnalysis":"\u003Cp class=\"MsoNormal\">\u003Cb>9. Critical Analysis\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The judgment is regarded as one of the most significant\r\ndecisions in Indian criminal law.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>Strengths\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">Clarified\r\n     the legal meaning of \"grave and sudden provocation.\" \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Reinforced\r\n     that emotional distress alone does not reduce murder to culpable homicide\r\n     if sufficient cooling time exists. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Upheld\r\n     the importance of objective judicial reasoning over emotional public\r\n     opinion. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Strengthened\r\n     the standard for reviewing jury verdicts. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>Criticism\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">Some\r\n     commentators argue that the Court gave insufficient consideration to the\r\n     psychological trauma experienced by Nanavati immediately after discovering\r\n     his wife's infidelity. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     extensive media coverage and public sympathy for Nanavati highlighted the\r\n     risk of external influence on jury trials. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>\r\n\r\n\u003Cp class=\"MsoNormal\">Overall, the judgment balanced individual emotions against\r\nthe rule of law and reinforced that personal revenge cannot be justified under\r\ncriminal law.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","impactOfTheJudgment":"\u003Cp class=\"MsoNormal\">\u003Cb>10. Impact of the Judgment\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The Nanavati case had a profound impact on Indian criminal\r\njurisprudence:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">It\r\n     became the \u003Cb>most famous jury trial\u003C\u002Fb> in India. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">It\r\n     exposed the vulnerability of jury trials to media influence and public\r\n     sentiment. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     case accelerated the abolition of the jury system in India, leading to\r\n     exclusive reliance on judge-based trials. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">It\r\n     remains the leading authority on the interpretation of \u003Cb>grave and sudden\r\n     provocation\u003C\u002Fb> under Section 300 IPC. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     judgment continues to be cited in cases involving homicide, provocation,\r\n     and criminal intent.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>","conclusion":"\u003Cp class=\"MsoNormal\">\u003Cb>11. Conclusion\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>K.M. Nanavati v. State of Maharashtra\u003C\u002Fb> is one of the\r\nmost influential judgments in Indian legal history. The Supreme Court held that\r\nthe defense of grave and sudden provocation cannot succeed where there has been\r\nsufficient time for passions to cool and where the accused's conduct demonstrates\r\nplanning. The case not only clarified the distinction between murder and\r\nculpable homicide but also reshaped India's criminal justice system by\r\nhighlighting the shortcomings of jury trials. Today, it remains a foundational\r\nprecedent in the study of criminal law and judicial procedure.\u003C\u002Fp>","references":"\u003Cp class=\"MsoNormal\">\u003Cb>12. References\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Col style=\"margin-top:0cm\" start=\"1\" type=\"1\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>K.M.\r\n     Nanavati v. State of Maharashtra\u003C\u002Fb>, AIR 1962 SC 605; 1962 SCR (Supp.) 1\r\n     567. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Indian\r\n     Penal Code, 1860 – Sections 299, 300, 302, and 304. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Code\r\n     of Criminal Procedure, 1898 – Section 307. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">M.P.\r\n     Jain, \u003Ci>Indian Constitutional Law\u003C\u002Fi> (LexisNexis). \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">K.D.\r\n     Gaur, \u003Ci>Textbook on Indian Penal Code\u003C\u002Fi>. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Ratanlal\r\n     &amp; Dhirajlal, \u003Ci>The Indian Penal Code\u003C\u002Fi>. \u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Supreme\r\n     Court judgment available through Indian Kanoon.&nbsp;\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Fol>","caseName":"K.M. Nanavati v. State of Maharashtra","imagePath":"\u002Fuploads\u002Flegal-case-studies\u002F35fceae83d224c769073be5db7462feb_NanavatiCase.jpg","caseImage":"null","createdOn":"2026-07-23T09:20:02.1045464","updatedOn":"2026-07-24T05:04:41.4167638"},{"id":"3","caseTitleAndCitation":"\u003Cp class=\"MsoNormal\">\u003Cb>Case Study: \u003Ci>Bachan Singh v. State of Punjab\u003C\u002Fi>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Col style=\"margin-top:0cm\" start=\"1\" type=\"1\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>1.\r\n     Case Title and Citation\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Case\r\n     Title:\u003C\u002Fb> \u003Ci>Bachan Singh v. State of Punjab\u003C\u002Fi>\u003Cbr>\r\n     \u003Cb>Citation:\u003C\u002Fb> (1980) 2 SCC 684\u003Cbr>\r\n     \u003Cb>Court:\u003C\u002Fb> Supreme Court of India\u003Cbr>\r\n     \u003Cb>Bench:\u003C\u002Fb> Justice Y.V. Chandrachud (C.J.), Justice A.C. Gupta, Justice\r\n     N.L. Untwalia, Justice P.N. Bhagwati (dissent), and Justice R.S. Sarkaria\u003Cbr>\r\n     \u003Cb>Date of Judgment:\u003C\u002Fb> 9 May 1980\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Fol>","factsOfTheCase":"\u003Col start=\"1\" type=\"1\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>&nbsp;Facts of the Case\u003C\u002Fb>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Bachan\r\n     Singh had previously been convicted of murder and sentenced to life\r\n     imprisonment. After his release, he was involved in another incident in\r\n     which he murdered three individuals. He was prosecuted under Section 302\r\n     of the Indian Penal Code (IPC). Given his previous conviction and the\r\n     gravity of the offence, the trial court sentenced him to death.\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     case raised an important constitutional question regarding whether the\r\n     death penalty prescribed under Section 302 IPC and the sentencing\r\n     procedure under Section 354(3) of the Code of Criminal Procedure, 1973\r\n     (CrPC) violated Articles 14, 19, and 21 of the Constitution of India.\u003C\u002Fli>\r\n\u003C\u002Fol>","proceduralHistory":"\u003Col start=\"1\" type=\"1\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>&nbsp;Procedural History\u003C\u002Fb>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     Sessions Court convicted Bachan Singh for murder under Section 302 IPC and\r\n     imposed the death penalty.\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     Punjab and Haryana High Court affirmed both the conviction and the\r\n     sentence.\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Bachan\r\n     Singh appealed before the Supreme Court, challenging not only the\r\n     conviction but also the constitutional validity of capital punishment.\u003C\u002Fli>\r\n\u003C\u002Fol>","legalIssues":"\u003Col style=\"margin-top:0cm\" start=\"1\" type=\"1\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Legal\r\n     Issues\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Whether\r\n     the death penalty under Section 302 IPC is unconstitutional.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Whether\r\n     capital punishment violates Articles 14, 19, and 21 of the Constitution.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Whether\r\n     Section 354(3) CrPC provides adequate safeguards against arbitrary\r\n     sentencing.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Under\r\n     what circumstances should the death penalty be imposed.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Fol>","argumentsOfTheParties":"\u003Col style=\"margin-top:0cm\" start=\"1\" type=\"1\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Arguments\r\n     of the Parties\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Appellant\r\n     (Bachan Singh)\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     death penalty violates the fundamental right to life guaranteed under\r\n     Article 21.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">It\r\n     is arbitrary and discriminatory, violating Article 14.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Capital\r\n     punishment is cruel, inhuman, and disproportionate.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Life\r\n     imprisonment is a sufficient punishment for murder.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Respondent\r\n     (State of Punjab)\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Parliament\r\n     has the authority to prescribe punishments for criminal offences.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     death penalty is constitutionally valid where imposed through a fair\r\n     judicial process.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Section\r\n     354(3) CrPC requires courts to record \"special reasons\" before\r\n     awarding the death sentence, thereby preventing arbitrary exercise of\r\n     discretion.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Certain\r\n     exceptionally grave offences justify the imposition of capital punishment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Fol>","relevantLaw":"\u003Col style=\"margin-top:0cm\" start=\"1\" type=\"1\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Relevant\r\n     Law\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Statutes\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Indian\r\n     Penal Code, 1860\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Section\r\n     302 – Punishment for Murder\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Code\r\n     of Criminal Procedure, 1973\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Section\r\n     354(3) – Special reasons for awarding the death sentence\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Constitutional\r\n     Provisions\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Article\r\n     14 – Equality before law\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Article\r\n     19 – Protection of certain freedoms\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Article\r\n     21 – Protection of life and personal liberty\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Judicial\r\n     Precedents\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Ci>Jagmohan\r\n     Singh v. State of Uttar Pradesh\u003C\u002Fi> (1973) 1 SCC 20\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Ci>Rajendra\r\n     Prasad v. State of Uttar Pradesh\u003C\u002Fi> (1979) 3 SCC 646\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Fol>","courtsAnalysis":"\u003Col style=\"margin-top:0cm\" start=\"1\" type=\"1\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Court's\r\n     Analysis\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     Supreme Court examined whether capital punishment is compatible with the\r\n     Constitution. The Court observed that Article 21 permits deprivation of\r\n     life provided it occurs according to a \"procedure established by\r\n     law.\" Since the death penalty was imposed through a fair judicial\r\n     process established by statute, it did not violate Article 21.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     Court also considered the sentencing framework introduced by Section\r\n     354(3) CrPC, which makes life imprisonment the normal rule and requires\r\n     courts to record \"special reasons\" before imposing the death\r\n     penalty. This statutory safeguard reduced the possibility of arbitrary\r\n     sentencing.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     Court emphasized that sentencing must balance aggravating and mitigating\r\n     circumstances. Relevant factors include the nature of the crime, the\r\n     manner of its commission, the offender's background, and the possibility\r\n     of reform and rehabilitation.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Fol>\r\n\r\n\u003Cspan style=\"font-size:12.0pt;line-height:115%;font-family:&quot;Calibri&quot;,sans-serif;\r\nmso-ascii-theme-font:minor-latin;mso-fareast-font-family:Calibri;mso-fareast-theme-font:\r\nminor-latin;mso-hansi-theme-font:minor-latin;mso-bidi-font-family:&quot;Times New Roman&quot;;\r\nmso-bidi-theme-font:minor-bidi;mso-ansi-language:EN-US;mso-fareast-language:\r\nEN-US;mso-bidi-language:AR-SA\">The Court concluded that capital punishment\r\nshould be reserved only for exceptional cases where life imprisonment would be\r\ninadequate.\u003C\u002Fspan>","judgment_Holding":"\u003Col style=\"margin-top:0cm\" start=\"1\" type=\"1\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Judgment\r\n     \u002F Holding\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">By a\r\n     majority of 4:1, the Supreme Court upheld the constitutional validity of\r\n     the death penalty under Section 302 IPC.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     Court held that:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Capital\r\n     punishment is constitutionally valid.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Life\r\n     imprisonment is the normal punishment for murder.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     death penalty should be imposed only in the \u003Cb>\"rarest of rare\r\n     cases\"\u003C\u002Fb> where the alternative option of life imprisonment is\r\n     unquestionably inadequate.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Courts\r\n     must record special reasons before awarding the death sentence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Justice\r\n     P.N. Bhagwati delivered a dissenting opinion, expressing the view that the\r\n     death penalty was unconstitutional because of its arbitrary application.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Fol>","criticalAnalysis":"\u003Col style=\"margin-top:0cm\" start=\"1\" type=\"1\">\r\n \u003Cli class=\"MsoNormal\">The\r\n     judgment represents a landmark balance between individual rights and the\r\n     State's interest in maintaining public order. Rather than abolishing the\r\n     death penalty, the Supreme Court significantly restricted its application\r\n     through the \"rarest of rare\" doctrine.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     decision enhanced judicial accountability by requiring courts to carefully\r\n     evaluate aggravating and mitigating circumstances before imposing capital\r\n     punishment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">However,\r\n     the expression \"rarest of rare\" is not precisely defined,\r\n     leaving substantial discretion with judges. This has resulted in varying\r\n     interpretations by different courts, leading to debates regarding\r\n     consistency and fairness in capital sentencing.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     case continues to generate scholarly debate on whether capital punishment\r\n     effectively deters crime and whether it is compatible with evolving\r\n     constitutional values and international human rights standards.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Fol>","impactOfTheJudgment":"\u003Col style=\"margin-top:0cm\" start=\"1\" type=\"1\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Impact\r\n     of the Judgment\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     decision has had a profound influence on Indian criminal jurisprudence.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Established\r\n     the \u003Cb>\"rarest of rare\" doctrine\u003C\u002Fb>, which remains the\r\n     governing principle for death penalty cases.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Made\r\n     life imprisonment the ordinary punishment for murder.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Required\r\n     sentencing courts to consider mitigating and aggravating circumstances.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Influenced\r\n     subsequent Supreme Court decisions on capital punishment.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Strengthened\r\n     procedural safeguards in death sentence cases.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     judgment remains the leading authority on sentencing in capital cases in\r\n     India.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Fol>","conclusion":"\u003Col style=\"margin-top:0cm\" start=\"1\" type=\"1\">\r\n \u003Cli class=\"MsoNormal\">\u003Ci>Bachan\r\n     Singh v. State of Punjab\u003C\u002Fi> is one of the most significant constitutional\r\n     and criminal law decisions delivered by the Supreme Court of India. While\r\n     affirming the constitutional validity of the death penalty, the Court\r\n     imposed strict limitations on its use through the \"rarest of\r\n     rare\" doctrine. The judgment reflects the Court's attempt to\r\n     reconcile the constitutional protection of life with society's interest in\r\n     punishing exceptionally grave crimes. It continues to guide courts in\r\n     determining when capital punishment is legally justified.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Fol>","references":"\u003Col style=\"margin-top:0cm\" start=\"1\" type=\"1\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>References\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Ci>Bachan\r\n     Singh v. State of Punjab\u003C\u002Fi>, (1980) 2 SCC 684.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Indian\r\n     Penal Code, 1860.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Code\r\n     of Criminal Procedure, 1973.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Constitution\r\n     of India.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Ci>Jagmohan\r\n     Singh v. State of Uttar Pradesh\u003C\u002Fi>, (1973) 1 SCC 20.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Ci>Rajendra\r\n     Prasad v. State of Uttar Pradesh\u003C\u002Fi>, (1979) 3 SCC 646.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">M.P.\r\n     Jain, \u003Ci>Indian Constitutional Law\u003C\u002Fi>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">K.D.\r\n     Gaur, \u003Ci>Textbook on Indian Penal Code\u003C\u002Fi>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Fol>","caseName":"Bachan Singh v. State of Punjab","imagePath":"\u002Fuploads\u002Flegal-case-studies\u002F948fedf813fd4f4baca7c6bd380328be_bacchan.jpg","caseImage":"null","createdOn":"2026-07-24T05:24:23.1009388","updatedOn":"2026-07-24T05:32:14.1184373"},{"id":"4","caseTitleAndCitation":"\u003Cp class=\"MsoNormal\">\u003Cb>Case Title and Citation\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>Case Title:\u003C\u002Fb> \u003Ci>Kedar Nath Bhattacharjee v. Gorie\r\nMohamed\u003C\u002Fi>\u003Cbr>\r\n\u003Cb>Citation:\u003C\u002Fb> (1886) ILR 14 Cal 64\u003Cbr>\r\n\u003Cb>Court:\u003C\u002Fb> High Court of Calcutta\u003Cbr>\r\n\u003Cb>Year of Judgment:\u003C\u002Fb> 1886\u003Cbr>\r\n\u003Cb>Subject:\u003C\u002Fb> Indian Contract Act, 1872 – Consideration and Promise to\r\nSubscribe\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","factsOfTheCase":"\u003Cp class=\"MsoNormal\">\u003Cb>Facts of the Case\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The defendants, including Gorie Mohamed, subscribed specific\r\namounts of money towards the construction of a town hall in Howrah. Relying on\r\nthese subscriptions, the plaintiff, Kedar Nath Bhattacharjee, entered into\r\ncontracts with builders and suppliers for the construction of the town hall and\r\nincurred financial obligations.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">After the construction work had commenced, Gorie Mohamed\r\nrefused to pay the amount he had promised. Consequently, the plaintiff filed a\r\nsuit seeking recovery of the subscribed amount.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The dispute centered on whether the defendant's promise was\r\nlegally enforceable despite there being no direct exchange of consideration\r\nbetween the parties.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","proceduralHistory":"\u003Cp class=\"MsoNormal\">\u003Cb>Procedural History\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">The\r\n     plaintiff instituted a suit before the Calcutta High Court seeking\r\n     recovery of the promised subscription amount.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     High Court was required to determine whether the promise was supported by\r\n     valid consideration under the Indian Contract Act, 1872.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>","legalIssues":"\u003Cp class=\"MsoNormal\">\u003Cb>Legal Issues\u003C\u002Fb>\u003C\u002Fp>\u003Cp class=\"MsoNormal\">Whether\r\n     a promise to contribute money for a public purpose becomes enforceable\r\n     when the promisee has acted upon it.\u003C\u002Fp>\u003Cp class=\"MsoNormal\">Whether\r\n     expenditure incurred by the promisee in reliance on the defendant's\r\n     promise constitutes valid consideration.\u003C\u002Fp>\r\n\r\n\u003Cspan>Whether the defendant could withdraw the promise\r\nafter the plaintiff had altered his position based on that promise.\u003C\u002Fspan>","argumentsOfTheParties":"\u003Cp class=\"MsoNormal\">\u003Cb>Arguments of the Parties\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>Plaintiff (Kedar Nath Bhattacharjee)\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">The\r\n     subscriptions were made voluntarily to finance the construction of the\r\n     town hall.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Acting\r\n     on the defendants' promises, the plaintiff entered into construction\r\n     contracts and incurred liabilities.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     plaintiff's actions constituted valid consideration under Section 2(d) of\r\n     the Indian Contract Act.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Since\r\n     the plaintiff had altered his position based on the promise, the defendant\r\n     was legally bound to honor the subscription.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>Defendant (Gorie Mohamed)\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">The\r\n     subscription was merely a gratuitous promise without consideration.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">No\r\n     enforceable contract existed between the parties.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Since\r\n     the promise lacked consideration, it could not be legally enforced.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>","relevantLaw":"\u003Cp class=\"MsoNormal\">\u003Cb>Relevant Law\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>Statutes\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>Indian Contract Act, 1872\u003C\u002Fb>\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Section\r\n     2(d)\u003C\u002Fb> – Definition of Consideration\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Section\r\n     10\u003C\u002Fb> – Essentials of a Valid Contract\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">\u003Cb>Section\r\n     25\u003C\u002Fb> – Agreements without consideration are void, subject to specified\r\n     exceptions\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>Judicial Principles\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">Consideration\r\n     may consist of an act performed at the promisor's request or in reliance\r\n     upon the promise.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">A\r\n     promise may become enforceable where the promisee changes their position\r\n     based on that promise.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>\r\n\r\n\u003Cp class=\"MsoNormal\">\u003Cb>Subsequent Relevance\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The principles established in this case have influenced\r\nlater Indian decisions involving subscriptions, charitable promises, and\r\nreliance-based contractual obligations.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","courtsAnalysis":"\u003Cp class=\"MsoNormal\">\u003Cb>Court's Analysis\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The Calcutta High Court examined whether the plaintiff's\r\nexpenditure and contractual commitments constituted sufficient consideration\r\nunder Section 2(d) of the Indian Contract Act.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The Court observed that after receiving the subscriptions,\r\nthe plaintiff entered into contractual obligations and incurred liabilities for\r\nconstructing the town hall. These actions were undertaken in reliance upon the\r\ndefendants' promises and therefore amounted to legal detriment suffered by the\r\nplaintiff.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The Court reasoned that once the promisee has altered his\r\nposition and assumed obligations relying upon the promise, valid consideration\r\nexists. Consequently, the promise ceases to be merely gratuitous and becomes\r\nlegally enforceable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The Court emphasized that the enforceability arose not\r\nmerely from the subscription itself but from the reliance placed upon it by the\r\nplaintiff.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","judgment_Holding":"\u003Cp class=\"MsoNormal\">\u003Cb>Judgment \u002F Holding\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The Calcutta High Court held that the defendant's promise\r\nwas legally enforceable.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The Court ruled that:\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">The\r\n     plaintiff had incurred liabilities relying upon the defendant's promise.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Such\r\n     reliance constituted sufficient consideration under Section 2(d) of the\r\n     Indian Contract Act.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">The\r\n     defendant could not revoke the promise after the plaintiff had altered his\r\n     position based upon it.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>\r\n\r\n\u003Cspan style=\"font-size:12.0pt;line-height:115%;font-family:&quot;Calibri&quot;,sans-serif;\r\nmso-ascii-theme-font:minor-latin;mso-fareast-font-family:Calibri;mso-fareast-theme-font:\r\nminor-latin;mso-hansi-theme-font:minor-latin;mso-bidi-font-family:&quot;Times New Roman&quot;;\r\nmso-bidi-theme-font:minor-bidi;mso-ansi-language:EN-US;mso-fareast-language:\r\nEN-US;mso-bidi-language:AR-SA\">Accordingly, the defendant was liable to pay the\r\nsubscribed amount.\u003C\u002Fspan>","criticalAnalysis":"\u003Cp class=\"MsoNormal\">\u003Cb>Critical Analysis\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\u003Cp class=\"MsoNormal\">The decision is regarded as one of the earliest Indian\r\nauthorities recognizing the practical importance of reliance in determining\r\ncontractual consideration.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\u003Cp class=\"MsoNormal\">The judgment demonstrates that consideration need not always\r\nconsist of a direct exchange of money or goods between the parties. Where the\r\npromisee undertakes obligations or incurs expenses based on the promisor's\r\nassurance, the law recognizes those actions as valuable consideration.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\u003Cp class=\"MsoNormal\">The case also promotes commercial certainty by protecting\r\nindividuals who act in reliance upon promises made by others.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\u003Cp class=\"MsoNormal\">\r\n\r\n\r\n\r\n\r\n\r\n\r\n\r\n\u003C\u002Fp>\u003Cp class=\"MsoNormal\">However, the judgment should not be interpreted as making\r\nevery charitable subscription enforceable. Enforceability depends upon the\r\npromisee having altered their legal position or incurred liability because of\r\nthe promise.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>","impactOfTheJudgment":"\u003Cp class=\"MsoNormal\">\u003Cb>Impact of the Judgment\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Cp class=\"MsoNormal\">The judgment has had a lasting influence on Indian contract\r\nlaw.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fp>\r\n\r\n\u003Cul style=\"margin-top:0cm\" type=\"disc\">\r\n \u003Cli class=\"MsoNormal\">Clarified\r\n     the scope of consideration under Section 2(d) of the Indian Contract Act.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Established\r\n     that reliance resulting in legal detriment may constitute valid\r\n     consideration.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Frequently\r\n     cited in discussions concerning subscriptions, promises, and charitable\r\n     contributions.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Reinforced\r\n     the principle that contractual liability may arise where a promise induces\r\n     action by the promisee.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Continues\r\n     to be discussed in law schools, judicial examinations, and academic\r\n     commentaries on the doctrine of consideration.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Ful>","conclusion":"\u003Cp class=\"MsoNormal\">\u003Cb>Conclusion\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Ci>\u003Cspan style=\"font-size:12.0pt;line-height:115%;font-family:&quot;Calibri&quot;,sans-serif;\r\nmso-ascii-theme-font:minor-latin;mso-fareast-font-family:Calibri;mso-fareast-theme-font:\r\nminor-latin;mso-hansi-theme-font:minor-latin;mso-bidi-font-family:&quot;Times New Roman&quot;;\r\nmso-bidi-theme-font:minor-bidi;mso-ansi-language:EN-US;mso-fareast-language:\r\nEN-US;mso-bidi-language:AR-SA\">Kedar Nath Bhattacharjee v. Gorie Mohamed\u003C\u002Fspan>\u003C\u002Fi>\u003Cspan style=\"font-size:12.0pt;line-height:115%;font-family:&quot;Calibri&quot;,sans-serif;\r\nmso-ascii-theme-font:minor-latin;mso-fareast-font-family:Calibri;mso-fareast-theme-font:\r\nminor-latin;mso-hansi-theme-font:minor-latin;mso-bidi-font-family:&quot;Times New Roman&quot;;\r\nmso-bidi-theme-font:minor-bidi;mso-ansi-language:EN-US;mso-fareast-language:\r\nEN-US;mso-bidi-language:AR-SA\"> remains a landmark decision on the doctrine of\r\nconsideration under the Indian Contract Act, 1872. The Calcutta High Court held\r\nthat a promise becomes enforceable when the promisee, relying upon it,\r\nundertakes obligations or incurs liabilities. The judgment illustrates that\r\nconsideration may consist not only of a benefit to the promisor but also of a\r\ndetriment suffered by the promisee. It continues to be a leading authority on\r\nreliance-based consideration in Indian contract law.\u003C\u002Fspan>","references":"\u003Cp class=\"MsoNormal\">\u003Cb>References\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fb>\u003C\u002Fp>\r\n\r\n\u003Col style=\"margin-top:0cm\" start=\"1\" type=\"1\">\r\n \u003Cli class=\"MsoNormal\">\u003Ci>Kedar\r\n     Nath Bhattacharjee v. Gorie Mohamed\u003C\u002Fi>, (1886) ILR 14 Cal 64.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Indian\r\n     Contract Act, 1872.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Pollock\r\n     &amp; Mulla, \u003Ci>The Indian Contract and Specific Relief Acts\u003C\u002Fi>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">Avtar\r\n     Singh, \u003Ci>Law of Contract and Specific Relief\u003C\u002Fi>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">R.K.\r\n     Bangia, \u003Ci>Law of Contract\u003C\u002Fi>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n \u003Cli class=\"MsoNormal\">M.C.\r\n     Kuchhal &amp; Vivek Kuchhal, \u003Ci>Business Law\u003C\u002Fi>.\u003Co:p>\u003C\u002Fo:p>\u003C\u002Fli>\r\n\u003C\u002Fol>","caseName":"Kedar Nath Bhattacharjee v. Gorie Mohamed","imagePath":"\u002Fuploads\u002Flegal-case-studies\u002Fadd8a5344afc46a4a7dd1dbc6c655608_kedarnath.jpeg","caseImage":"null","createdOn":"2026-07-24T05:29:23.0590327","updatedOn":"2026-07-24T05:35:20.7284017"},{"id":"1","caseTitleAndCitation":"Suraj Lamp & Industries Pvt. Ltd. v. State of Haryana & Another, (2012) 1 SCC 656, Supreme Court of India","factsOfTheCase":"The case concerned the widespread practice of transferring immovable property through General Power of Attorney (GPA), Agreement to Sell, and Will (commonly known as GPA Sales), instead of executing a registered sale deed. The petitioners challenged the validity of directions issued by the State of Haryana regarding registration of such transactions.","proceduralHistory":"The matter originated from challenges before the High Court concerning the legality of GPA transactions. Due to conflicting practices across various states and their impact on property transactions, the matter was ultimately decided by the Supreme Court of India.","legalIssues":"1. Whether ownership of immovable property can be legally transferred through GPA, Agreement to Sell, and Will. 2. Whether such transactions constitute a valid sale under the Transfer of Property Act, 1882. 3. Whether such documents create any ownership rights in favour of the purchaser.","argumentsOfTheParties":"The petitioners argued that GPA Sales had become a common commercial practice and should be recognized as valid transfers. The respondents contended that Section 54 of the Transfer of Property Act requires a registered sale deed for transferring ownership and that GPA transactions facilitate tax evasion, fraud, and title disputes.","relevantLaw":"Transfer of Property Act, 1882 - Sections 5 and 54; Registration Act, 1908 - Sections 17 and 49; Indian Stamp Act, 1899; Supreme Court precedents relating to transfer of immovable property.","courtsAnalysis":"The Supreme Court examined the statutory framework governing transfers of immovable property. It held that a General Power of Attorney merely authorizes an agent to act on behalf of the principal and does not itself transfer ownership. Likewise, an Agreement to Sell creates only contractual rights and not title. A Will operates only after the death of the testator and remains revocable during the testator's lifetime. Therefore, none of these instruments individually or collectively constitute a valid conveyance of ownership. The Court emphasized that Section 54 of the Transfer of Property Act mandates a registered sale deed for the legal transfer of ownership.","judgment_Holding":"The Supreme Court held that immovable property can ordinarily be transferred only through a duly executed and registered sale deed. GPA Sales do not convey ownership and cannot be treated as valid transfers of title. However, genuine powers of attorney executed for lawful purposes remain valid.","criticalAnalysis":"The judgment significantly strengthened certainty in property transactions by reinforcing statutory requirements under the Transfer of Property Act and the Registration Act. It reduced opportunities for fraudulent transactions and protected bona fide purchasers. However, the decision also affected numerous transactions that had historically relied upon GPA Sales, creating practical difficulties for many property holders.","impactOfTheJudgment":"The decision transformed property law in India by discouraging informal property transfers and promoting compulsory registration. It improved transparency, strengthened land records, reduced fraudulent transactions, and became a leading precedent on transfer of immovable property under the Transfer of Property Act, 1882.","conclusion":"The Suraj Lamp judgment reaffirmed that ownership of immovable property can only be transferred through a registered conveyance as required by Section 54 of the Transfer of Property Act. The decision remains one of the most authoritative rulings governing property transfers in India.","references":"1. Suraj Lamp & Industries Pvt. Ltd. v. State of Haryana & Another, (2012) 1 SCC 656. 2. Transfer of Property Act, 1882. 3. Registration Act, 1908. 4. Indian Stamp Act, 1899.","caseName":"Suraj Lamp & Industries Pvt. Ltd. v. State of Haryana","imagePath":"\u002Fuploads\u002Flegal-case-studies\u002Ff7318acac4094f0bb63cf5dc91193485_Lamp.jpg","caseImage":"null","createdOn":"2026-07-23T08:19:31.433","updatedOn":"2026-07-24T05:07:45.8496636"}],"h":{},"s":200,"st":"OK","u":"https:\u002F\u002Femployeesapi.runasp.net\u002Fapi\u002FLegalCaseStudies","rt":"json"},"__nghData__":[{"t":{"0":"t0","3":"t1"},"c":{"0":[{"i":"t0","r":1}],"3":[]},"n":{"3":"hfn4"}},{},{"n":{"2":"hfn2"},"t":{"2":"t5"},"c":{"2":[]}},{"n":{"1":"0fn2","3":"1f2","13":"0fn3","14":"13f","15":"14f","39":"38fn"},"t":{"9":"t2","32":"t3","36":"t4"},"c":{"9":[],"32":[],"36":[]}},{"t":{"2":"t7","3":"t8","4":"t9"},"c":{"2":[{"i":"t7","r":1}],"3":[],"4":[]}},{"c":{"30":[{"i":"c1786704220","r":1}]}}]}</script></body></html>

                            <h2>Contact Us</h2>

            <!-- Contact Start -->
            <div class="contact">
                <div class="container">
                    <div class="section-header">
                        <h2>Contact Us</h2>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="contact-info">
                                <div class="contact-item">
                                    <i class="fa fa-map-marker-alt"></i>
                                    <div class="contact-text">
                                        <h2>Location</h2>
                                        <p>Bhujauli Road, Deoria Khas, Deoria Uttar Pradesh India</p>
                                    </div>
                                </div>
                                <div class="contact-item">
                                    <i class="fa fa-phone-alt"></i>
                                    <div class="contact-text">
                                        <h2>Phone</h2>
                                        <p>+917652074782</p>
                                    </div>
                                </div>
                                <div class="contact-item">
                                    <i class="fa fa-envelope"></i>
                                    <div class="contact-text">
                                        <h2>Email</h2>
                                        <p>arifaParveen@gmail.com</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="contact-form">
                                <form (ngSubmit)="submitForm()">
                                    <div class="form-group">
                                        <input type="text" class="form-control" placeholder="Your Name" [(ngModel)]="clientName" name="clientName" required="required" />
                                    </div>
                                    <div class="form-group">
                                        <input type="email" class="form-control" placeholder="Your Email" [(ngModel)]="clientEmail" name="clientEmail" required="required" />
                                    </div>
                                    <div class="form-group">
                                        <input type="text" class="form-control" placeholder="Subject" [(ngModel)]="subject" name="subject" required="required" />
                                    </div>
                                    <div class="form-group">
                                        <textarea class="form-control" placeholder="Message" [(ngModel)]="message" name="message" required="required" ></textarea>
                                    </div>
                                    <div>
                                        <button class="btn" type="submit" [disabled]="isSubmitting">{{ isSubmitting ? 'Sending...' : 'Send Message' }}</button>
                                    </div>
                                    <div *ngIf="successMessage" class="alert alert-success mt-3">{{ successMessage }}</div>
                                    <div *ngIf="errorMessage" class="alert alert-danger mt-3">{{ errorMessage }}</div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Contact End -->
<app-footer></app-footer>
